              private EditText inputBox(String hint) {
                  EditText e = new EditText(this); e.setHint(hint); e.setTextColor(Color.WHITE); e.setHintTextColor(Color.rgb(148, 163, 184)); e.setTextSize(16);
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(Color.rgb(17, 24, 39)); bg.setStroke(1, Color.rgb(55, 65, 81)); bg.setCornerRadius(20);
                  e.setBackground(bg); e.setPadding(16, 12, 16, 12);
