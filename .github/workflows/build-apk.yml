          package com.trae.phonehelper;
          
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          
          import org.json.JSONArray;
          import org.json.JSONObject;
          
          import java.util.Calendar;
          
          public class BootReceiver extends BroadcastReceiver {
              private static final String PREF = "phone_helper_pref";
          
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (intent == null) return;
                  String action = intent.getAction();
                  if (action == null) return;
                  if (!action.equals("android.intent.action.BOOT_COMPLETED")) return;
          
                  try {
                      SharedPreferences pref = context.getSharedPreferences(PREF, Context.MODE_PRIVATE);
                      JSONArray alarms = new JSONArray(pref.getString("systemAlarms", "[]"));
                      for (int i = 0; i < alarms.length(); i++) {
                          JSONObject alarm = alarms.getJSONObject(i);
                          if (alarm.optBoolean("enabled", false)) {
                              long nextAt = alarm.optLong("nextAt", 0);
                              if (nextAt == 0) {
                                  nextAt = computeNextAt(alarm.optInt("hour", 7), alarm.optInt("minute", 0));
                                  alarm.put("nextAt", nextAt);
                              }
                              AlarmReceiver.scheduleExactAlarm(context, alarm);
                          }
                      }
                  } catch (Exception ignored) {}
              }
          
              private long computeNextAt(int hour, int minute) {
                  Calendar c = Calendar.getInstance();
                  c.set(Calendar.HOUR_OF_DAY, hour);
                  c.set(Calendar.MINUTE, minute);
                  c.set(Calendar.SECOND, 0);
                  c.set(Calendar.MILLISECOND, 0);
                  if (c.getTimeInMillis() <= System.currentTimeMillis()) {
                      c.add(Calendar.DAY_OF_MONTH, 1);
                  }
                  return c.getTimeInMillis();
              }
          }
          
