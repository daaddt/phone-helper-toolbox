              private Button quickTimerButton(String label, int minutes) {
                  Button b = button(label);
                  b.setOnClickListener(v -> {
                      timerMode = "countdown";
                      countdownDuration = minutes * 60 * 1000L;
                      countdownElapsed = 0;
                      countdownRunning = false;
                      updateTimerDisplay();
                      saveTimerState();
                  });
                  return b;
              }
          
              private void setCountdownFromInput() {
                  int minutes = parseInt(timerMinuteInput.getText().toString(), 5);
                  int seconds = Math.max(0, Math.min(59, parseInt(timerSecondInput.getText().toString(), 0)));
                  countdownDuration = Math.max(1000L, (minutes * 60L + seconds) * 1000L);
                  countdownElapsed = 0;
                  countdownRunning = false;
                  timerMode = "countdown";
                  updateTimerDisplay();
                  saveTimerState();
              }
          
              private void toggleTimer() {
                  if ("stopwatch".equals(timerMode)) {
                      if (stopwatchRunning) {
                          stopwatchElapsed = getStopwatchElapsed();
                          stopwatchRunning = false;
                      } else {
                          stopwatchRunning = true;
                          stopwatchStartedAt = SystemClock.elapsedRealtime();
                      }
                  } else {
                      if (countdownRunning) {
                          countdownElapsed = getCountdownElapsed();
                          countdownRunning = false;
                      } else {
                          if (getCountdownRemaining() <= 0) countdownElapsed = 0;
                          countdownRunning = true;
                          countdownStartedAt = SystemClock.elapsedRealtime();
                      }
                  }
                  updateTimerDisplay();
                  saveTimerState();
              }
          
              private void resetTimer() {
                  if ("stopwatch".equals(timerMode)) {
                      stopwatchRunning = false;
                      stopwatchElapsed = 0;
                  } else {
                      countdownRunning = false;
                      countdownElapsed = 0;
                  }
                  updateTimerDisplay();
                  saveTimerState();
              }
          
              private long getStopwatchElapsed() {
                  return stopwatchRunning ? stopwatchElapsed + SystemClock.elapsedRealtime() - stopwatchStartedAt : stopwatchElapsed;
              }
          
              private long getCountdownElapsed() {
                  return countdownRunning ? Math.min(countdownDuration, countdownElapsed + SystemClock.elapsedRealtime() - countdownStartedAt) : countdownElapsed;
              }
          
              private long getCountdownRemaining() {
                  return Math.max(0, countdownDuration - getCountdownElapsed());
              }
          
              private void updateTimerDisplay() {
                  if (timerDisplay == null) return;
                  if (countdownRunning && getCountdownRemaining() <= 0) {
                      countdownRunning = false;
                      countdownElapsed = countdownDuration;
                      buzz();
                      showStatus("倒计时结束");
                  }
                  boolean stopwatch = "stopwatch".equals(timerMode);
                  stopwatchTab.setAlpha(stopwatch ? 1f : 0.55f);
                  countdownTab.setAlpha(stopwatch ? 0.55f : 1f);
                  if (stopwatch) {
                      timerDisplay.setText(formatTenths(getStopwatchElapsed()));
                      timerStartPause.setText(stopwatchRunning ? "暂停" : getStopwatchElapsed() > 0 ? "继续" : "开始");
                  } else {
                      timerDisplay.setText(formatTenths(getCountdownRemaining()));
                      timerStartPause.setText(countdownRunning ? "暂停" : getCountdownElapsed() > 0 && getCountdownRemaining() > 0 ? "继续" : "开始");
                  }
              }
          
              private void applyPomoSettings() {
                  int focusMin = Math.max(1, Math.min(180, parseInt(pomoFocusInput.getText().toString(), 25)));
                  int restMin = Math.max(1, Math.min(60, parseInt(pomoRestInput.getText().toString(), 5)));
                  pref.edit()
                          .putInt("pomoFocusMin", focusMin)
                          .putInt("pomoRestMin", restMin)
                          .putBoolean("pomoLoop", pomoLoopCheck == null || pomoLoopCheck.isChecked())
                          .apply();
                  pomoFocus = true;
                  pomoRunning = false;
                  pomoDuration = focusMin * 60 * 1000L;
                  pomoElapsed = 0;
                  updatePomoDisplay();
                  showStatus("番茄钟设置已应用");
              }
          
              private void togglePomo() {
                  if (pomoRunning) {
                      pomoElapsed = getPomoElapsed();
                      pomoRunning = false;
                  } else {
                      if (getPomoRemaining() <= 0) pomoElapsed = 0;
                      pomoRunning = true;
                      pomoStartedAt = SystemClock.elapsedRealtime();
                  }
                  updatePomoDisplay();
                  savePomoState();
              }
          
              private void resetPomo() {
                  pomoRunning = false;
                  pomoFocus = true;
                  pomoDuration = pref.getInt("pomoFocusMin", 25) * 60 * 1000L;
                  pomoElapsed = 0;
                  updatePomoDisplay();
                  savePomoState();
              }
          
              private void finishOnePomo() {
                  increasePomoCount();
                  pomoFocus = false;
                  pomoRunning = false;
                  pomoDuration = pref.getInt("pomoRestMin", 5) * 60 * 1000L;
                  pomoElapsed = 0;
                  updatePomoDisplay();
                  savePomoState();
                  showStatus("已记录完成 1 个番茄");
              }
          
              private long getPomoElapsed() {
                  return pomoRunning ? Math.min(pomoDuration, pomoElapsed + SystemClock.elapsedRealtime() - pomoStartedAt) : pomoElapsed;
              }
          
              private long getPomoRemaining() {
                  return Math.max(0, pomoDuration - getPomoElapsed());
              }
          
              private void updatePomoDisplay() {
                  if (pomoDisplay == null) return;
                  if (pomoRunning && getPomoRemaining() <= 0) {
                      pomoElapsed = pomoDuration;
                      buzz();
                      if (pomoFocus) {
                          increasePomoCount();
                          pomoFocus = false;
                          pomoDuration = pref.getInt("pomoRestMin", 5) * 60 * 1000L;
                          pomoElapsed = 0;
                          pomoRunning = true;
                          pomoStartedAt = SystemClock.elapsedRealtime();
                          showStatus("专注完成，开始休息吧");
                      } else {
                          boolean autoLoop = pref.getBoolean("pomoLoop", true);
                          pomoFocus = true;
                          pomoDuration = pref.getInt("pomoFocusMin", 25) * 60 * 1000L;
                          pomoElapsed = 0;
                          pomoRunning = autoLoop;
                          if (autoLoop) pomoStartedAt = SystemClock.elapsedRealtime();
                          showStatus(autoLoop ? "休息结束，已开始下一轮专注" : "休息结束，等待手动开始下一轮");
                      }
                      savePomoState();
                  }
                  pomoDisplay.setText(formatMinutes(getPomoRemaining()));
                  pomoStateText.setText((pomoFocus ? "专注" : "休息") + (pomoRunning ? "中" : "已暂停/待开始"));
                  pomoCountText.setText("今日完成 " + getTodayPomoCount() + " 个番茄");
              }
          
              private void increasePomoCount() {
                  String today = today();
                  String savedDay = pref.getString("pomoDay", "");
                  int count = today.equals(savedDay) ? pref.getInt("pomoCount", 0) : 0;
                  pref.edit().putString("pomoDay", today).putInt("pomoCount", count + 1).apply();
              }
          
              private int getTodayPomoCount() {
                  String today = today();
                  return today.equals(pref.getString("pomoDay", "")) ? pref.getInt("pomoCount", 0) : 0;
              }
          
              private String today() {
                  return new SimpleDateFormat("yyyy-MM-dd", Locale.getDefault()).format(new Date());
              }
          
              private void restoreTimerState() {
                  timerMode = pref.getString("timerMode", "stopwatch");
                  stopwatchElapsed = pref.getLong("stopwatchElapsed", 0);
                  stopwatchRunning = pref.getBoolean("stopwatchRunning", false);
                  countdownDuration = pref.getLong("countdownDuration", 5 * 60 * 1000L);
                  countdownElapsed = pref.getLong("countdownElapsed", 0);
                  countdownRunning = pref.getBoolean("countdownRunning", false);
                  long savedAt = pref.getLong("timerSavedAt", SystemClock.elapsedRealtime());
                  long delta = Math.max(0, SystemClock.elapsedRealtime() - savedAt);
                  if (stopwatchRunning) {
                      stopwatchElapsed += delta;
                      stopwatchStartedAt = SystemClock.elapsedRealtime();
                  }
                  if (countdownRunning) {
                      countdownElapsed = Math.min(countdownDuration, countdownElapsed + delta);
                      if (countdownElapsed >= countdownDuration) countdownRunning = false;
                      countdownStartedAt = SystemClock.elapsedRealtime();
                  }
              }
          
              private void saveTimerState() {
                  pref.edit()
                          .putString("timerMode", timerMode)
                          .putLong("stopwatchElapsed", getStopwatchElapsed())
                          .putBoolean("stopwatchRunning", stopwatchRunning)
                          .putLong("countdownDuration", countdownDuration)
                          .putLong("countdownElapsed", getCountdownElapsed())
                          .putBoolean("countdownRunning", countdownRunning)
                          .putLong("timerSavedAt", SystemClock.elapsedRealtime())
                          .apply();
              }
          
              private void restorePomoState() {
                  int focusMin = pref.getInt("pomoFocusMin", 25);
                  int restMin = pref.getInt("pomoRestMin", 5);
                  pomoFocus = pref.getBoolean("pomoFocus", true);
                  pomoDuration = pref.getLong("pomoDuration", (pomoFocus ? focusMin : restMin) * 60 * 1000L);
                  pomoElapsed = pref.getLong("pomoElapsed", 0);
                  pomoRunning = pref.getBoolean("pomoRunning", false);
                  long savedAt = pref.getLong("pomoSavedAt", SystemClock.elapsedRealtime());
                  long delta = Math.max(0, SystemClock.elapsedRealtime() - savedAt);
                  if (pomoRunning) {
                      pomoElapsed = Math.min(pomoDuration, pomoElapsed + delta);
                      if (pomoElapsed >= pomoDuration) pomoRunning = false;
                      pomoStartedAt = SystemClock.elapsedRealtime();
                  }
              }
          
              private void savePomoState() {
                  pref.edit()
                          .putBoolean("pomoFocus", pomoFocus)
                          .putLong("pomoDuration", pomoDuration)
                          .putLong("pomoElapsed", getPomoElapsed())
                          .putBoolean("pomoRunning", pomoRunning)
                          .putLong("pomoSavedAt", SystemClock.elapsedRealtime())
                          .apply();
              }
          
              private String formatTenths(long ms) {
                  long tenths = Math.max(0, ms) / 100;
                  long tenth = tenths % 10;
                  long totalSeconds = tenths / 10;
                  long seconds = totalSeconds % 60;
                  long minutes = totalSeconds / 60;
                  return String.format(Locale.getDefault(), "%02d:%02d.%d", minutes, seconds, tenth);
              }
          
              private String formatMinutes(long ms) {
                  long totalSeconds = Math.max(0, ms + 999) / 1000;
                  long seconds = totalSeconds % 60;
                  long minutes = totalSeconds / 60;
                  return String.format(Locale.getDefault(), "%02d:%02d", minutes, seconds);
              }
          
          
