              }
          
              private void refreshDefaultContentFor17() {
                  if (pref.getBoolean("defaultsV17Ready", false)) return;
                  JSONArray oldTexts = loadArray("texts");
                  JSONArray newTexts = new JSONArray();
                  for (int i = 0; i < oldTexts.length(); i++) {
                      try {
                          JSONObject obj = oldTexts.getJSONObject(i);
                          String title = obj.optString("title", ""); String content = obj.optString("content", "");
                          if (title.contains("\u6dfb\u52a0 APK \u6253\u5305\u6d41\u7a0b") || title.contains("\u5347\u7ea7\u7248\u672c")) continue;
                          if ("\u6dfb\u52a0\u5b89\u5353APK\u6253\u5305\u6d41\u7a0b".equals(content) || "\u5347\u7ea7\u7248\u672c".equals(content)) continue;
                          newTexts.put(obj);
                      } catch (Exception ignored) {}
                  }
                  saveArray("texts", newTexts);
                  JSONArray links = loadArray("links");
                  addLinkIfMissing(links, "Netlify", "https://www.netlify.com");
                  addLinkIfMissing(links, "WebIntoApp \u7f51\u9875\u5c01\u88c5", "https://www.webintoapp.com");
                  saveArray("links", links);
                  pref.edit().putBoolean("defaultsV17Ready", true).apply();
              }
          
              private void refreshDefaultContentFor171() {
                  if (pref.getBoolean("defaultsV171Ready", false)) return;
                  JSONArray oldLinks = loadArray("links");
                  JSONArray newLinks = new JSONArray();
                  for (int i = 0; i < oldLinks.length(); i++) {
                      try {
                          JSONObject obj = oldLinks.getJSONObject(i);
                          String title = obj.optString("title", ""); String url = obj.optString("url", "");
                          if ("Netlify".equals(title) || "https://www.netlify.com".equalsIgnoreCase(url)) continue;
                          if (title.contains("WebIntoApp") || "https://www.webintoapp.com".equalsIgnoreCase(url)) continue;
                          newLinks.put(obj);
                      } catch (Exception ignored) {}
                  }
                  addLinkIfMissing(newLinks, "Netlify Drop", "https://app.netlify.com/drop");
                  saveArray("links", newLinks);
                  pref.edit().putBoolean("defaultsV171Ready", true).apply();
              }
          
              private void addLinkIfMissing(JSONArray array, String title, String url) {
                  for (int i = 0; i < array.length(); i++) {
                      try { JSONObject obj = array.getJSONObject(i); if (url.equalsIgnoreCase(obj.optString("url", "")) || title.equals(obj.optString("title", ""))) return; } catch (Exception ignored) {}
                  }
                  addDefaultLink(array, title, url);
              }
          
              private void addDefaultText(JSONArray array, String title, String content) { try { JSONObject obj = new JSONObject(); obj.put("title", title); obj.put("content", content); array.put(obj); } catch (Exception ignored) {} }
              private void addDefaultLink(JSONArray array, String title, String url) { try { JSONObject obj = new JSONObject(); obj.put("title", title); obj.put("url", url); array.put(obj); } catch (Exception ignored) {} }
          
              private JSONArray loadArray(String key) { try { return new JSONArray(pref.getString(key, "[]")); } catch (Exception e) { return new JSONArray(); } }
              private void saveArray(String key, JSONArray array) { pref.edit().putString(key, array.toString()).apply(); }
          
              private void removeItem(String key, int index) {
                  JSONArray source = loadArray(key); JSONArray result = new JSONArray();
                  for (int i = 0; i < source.length(); i++) { if (i == index) continue; try { result.put(source.getJSONObject(i)); } catch (Exception ignored) {} }
                  saveArray(key, result);
              }
          
              private void moveItem(String key, int from, int to, String type) {
                  if ("text".equals(type) && editingTextIndex >= 0) { showStatus("\u8bf7\u5148\u4fdd\u5b58\u6216\u53d6\u6d88\u7f16\u8f91"); return; }
                  if ("link".equals(type) && editingLinkIndex >= 0) { showStatus("\u8bf7\u5148\u4fdd\u5b58\u6216\u53d6\u6d88\u7f16\u8f91"); return; }
                  JSONArray source = loadArray(key);
                  if (from < 0 || to < 0 || from >= source.length() || to >= source.length()) return;
                  JSONArray result = new JSONArray();
                  try {
                      JSONObject moving = source.getJSONObject(from);
                      for (int i = 0; i < source.length(); i++) {
                          if (i == from) continue;
                          if (i == to && from > to) result.put(moving);
                          result.put(source.getJSONObject(i));
                          if (i == to && from < to) result.put(moving);
                      }
                      saveArray(key, result);
                      if ("text".equals(type)) { renderSavedTexts(); showStatus("\u5df2\u8c03\u6574\u5e38\u7528\u6587\u672c\u987a\u5e8f"); }
                      else { renderLinks(); showStatus("\u5df2\u8c03\u6574\u5feb\u6377\u94fe\u63a5\u987a\u5e8f"); }
                  } catch (Exception ignored) {}
              }
          
              private String preview(String value) { String cleaned = value.trim(); return cleaned.length() <= 120 ? cleaned : cleaned.substring(0, 120) + "..."; }
          
              private void showPage(String pageName) {
                  currentPage = pageName; hideKeyboard(); hideStatus();
                  boolean aiVisible = "ai".equals(pageName);
                  rootScroll.setVisibility(aiVisible ? View.GONE : View.VISIBLE);
                  homePage.setVisibility("home".equals(pageName) ? View.VISIBLE : View.GONE);
                  splitPage.setVisibility("split".equals(pageName) ? View.VISIBLE : View.GONE);
                  textPage.setVisibility("text".equals(pageName) ? View.VISIBLE : View.GONE);
                  linkPage.setVisibility("link".equals(pageName) ? View.VISIBLE : View.GONE);
                  timerPage.setVisibility("timer".equals(pageName) ? View.VISIBLE : View.GONE);
                  pomoPage.setVisibility("pomo".equals(pageName) ? View.VISIBLE : View.GONE);
                  alarmPage.setVisibility("alarm".equals(pageName) ? View.VISIBLE : View.GONE);
                  aiPage.setVisibility(aiVisible ? View.VISIBLE : View.GONE);
                  aiSettingsPage.setVisibility("aiSettings".equals(pageName) ? View.VISIBLE : View.GONE);
                  backupPage.setVisibility("backup".equals(pageName) ? View.VISIBLE : View.GONE);
                  if (aiVisible && aiMessageScroll != null) { aiMessageScroll.post(() -> aiMessageScroll.smoothScrollTo(0, aiMessageList.getBottom())); }
                  else if (rootScroll != null) { rootScroll.post(() -> rootScroll.smoothScrollTo(0, 0)); }
              }
          
              @Override
              public void onBackPressed() {
                  if (!"home".equals(currentPage)) { showPage("home"); }
                  else {
                      long now = SystemClock.elapsedRealtime();
                      if (now - lastBackPressedAt < 1800) { super.onBackPressed(); }
                      else { lastBackPressedAt = now; showStatus("\u518d\u6309\u4e00\u6b21\u9000\u51fa"); }
                  }
              }
          
              private void showStatus(String message) { toast(message); }
              private void hideStatus() { if (statusText == null) return; statusText.setVisibility(View.GONE); }
          
              private TextView text(String value, int sp, int color) {
                  TextView tv = new TextView(this); tv.setText(value); tv.setTextSize(sp); tv.setTextColor(color); tv.setPadding(0, 10, 0, 10); return tv;
              }
          
              private TextView sectionTitle(String value) { TextView tv = text(value, 22, Color.WHITE); tv.setTypeface(Typeface.DEFAULT_BOLD); tv.setPadding(0, 28, 0, 10); return tv; }
          
              private TextView infoCard(String value) {
