              private void callAi(boolean testMode) {
                  aiSending = true; updateAiSendingUi();
                  showStatus(testMode ? "\u6b63\u5728\u6d4b\u8bd5 AI \u8fde\u63a5..." : "AI \u6b63\u5728\u601d\u8003...");
                  final String requestBody;
                  try { requestBody = buildAiRequestBody(); } catch (Exception e) {
                      showStatus("AI \u8bbe\u7f6e\u6709\u95ee\u9898\uff1a" + shortError(e.getMessage()));
                      aiSending = false; updateAiSendingUi(); return;
                  }
                  final int streamingIdx = appendAiMessage("assistant", "\u6b63\u5728\u601d\u8003...");
                  new Thread(() -> {
                      try {
                          String reply = requestAiCompletionStream(requestBody, delta -> runOnUiThread(() -> {
                              if (streamingIdx >= 0 && !delta.trim().isEmpty()) updateAiMessage(streamingIdx, "assistant", delta);
                          }));
                          runOnUiThread(() -> {
                              boolean hadContent = streamingIdx >= 0 && aiMessages.length() > streamingIdx && !aiMessages.optJSONObject(streamingIdx).optString("content", "").trim().isEmpty();
                              if (streamingIdx >= 0) {
                                  if (reply != null && !reply.trim().isEmpty()) updateAiMessage(streamingIdx, "assistant", reply);
                                  else if (!hadContent) updateAiMessage(streamingIdx, "assistant", "AI \u56de\u590d\u5f02\u5e38\uff1a\u6a21\u578b\u8fd4\u56de\u4e86\u7a7a\u5185\u5bb9\u3002\u53ef\u80fd\u539f\u56e0\uff1a\u989d\u5ea6\u4e0d\u8db3\u3001\u6a21\u578b\u9650\u6d41\u6216\u7f51\u7edc\u5f02\u5e38\u3002\u5efa\u8bae\u68c0\u67e5 API \u8bbe\u7f6e\u6216\u7a0d\u540e\u91cd\u8bd5\u3002");
                              }
                              showStatus((reply == null || reply.trim().isEmpty()) && !hadContent ? "AI \u56de\u590d\u5f02\u5e38\uff0c\u8bf7\u68c0\u67e5 API \u72b6\u6001" : "AI \u56de\u590d\u5b8c\u6210");
                              aiSending = false; updateAiSendingUi(); renderAiMessages();
                          });
                      } catch (Exception e) {
                          runOnUiThread(() -> {
                              String fail = "\u8bf7\u6c42\u5931\u8d25\uff1a" + shortError(e.getMessage());
                              if (streamingIdx >= 0) updateAiMessage(streamingIdx, "assistant", fail);
                              else appendAiMessage("assistant", fail);
                              showStatus("AI \u8bf7\u6c42\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5 API \u8bbe\u7f6e");
                              aiSending = false; streamingAssistantIndex = -1; updateAiSendingUi();
                          });
                      }
                  }).start();
              }
          
              private void updateAiSendingUi() {
                  if (aiSendButton == null) return;
                  aiSendButton.setEnabled(!aiSending);
                  aiSendButton.setText(aiSending ? "\u53d1\u9001\u4e2d..." : "\u53d1\u9001");
                  aiSendButton.setAlpha(aiSending ? 0.55f : 1f);
              }
          
              private String buildAiRequestBody() throws Exception {
                  String apiUrl = pref.getString("aiApiUrl", "").trim();
                  String apiKey = pref.getString("aiApiKey", "").trim();
                  String model = pref.getString("aiModel", "openrouter/free").trim();
                  String systemPrompt = pref.getString("aiSystemPrompt", "").trim();
                  if (apiUrl.isEmpty()) throw new Exception("API \u5730\u5740\u4e3a\u7a7a");
                  if (apiKey.isEmpty()) throw new Exception("API Key \u4e3a\u7a7a");
                  if (model.isEmpty()) throw new Exception("\u6a21\u578b\u540d\u4e3a\u7a7a");
                  JSONObject body = new JSONObject();
                  body.put("model", model);
                  JSONArray apiMessages = new JSONArray();
                  if (!systemPrompt.isEmpty()) {
                      JSONObject sys = new JSONObject();
                      sys.put("role", "system"); sys.put("content", systemPrompt);
                      apiMessages.put(sys);
                  }
                  int start = Math.max(0, aiMessages.length() - 16);
                  for (int i = start; i < aiMessages.length(); i++) apiMessages.put(aiMessages.getJSONObject(i));
                  body.put("messages", apiMessages);
                  body.put("temperature", 0.7);
                  body.put("stream", true);
                  return body.toString();
              }
          
              private String requestAiCompletionStream(String requestBody, AiStreamCallback callback) throws Exception {
                  String apiUrl = pref.getString("aiApiUrl", "").trim();
                  String apiKey = pref.getString("aiApiKey", "").trim();
                  HttpURLConnection conn = (HttpURLConnection) new URL(apiUrl).openConnection();
                  conn.setRequestMethod("POST");
                  conn.setConnectTimeout(30000); conn.setReadTimeout(120000);
                  conn.setDoOutput(true);
                  conn.setRequestProperty("Content-Type", "application/json; charset=utf-8");
                  conn.setRequestProperty("Accept", "text/event-stream");
                  conn.setRequestProperty("Authorization", "Bearer " + apiKey);
                  try (OutputStream os = conn.getOutputStream()) { os.write(requestBody.getBytes(StandardCharsets.UTF_8)); }
                  int code = conn.getResponseCode();
                  InputStream stream = code >= 200 && code < 300 ? conn.getInputStream() : conn.getErrorStream();
                  if (code < 200 || code >= 300) { String response = readAll(stream); throw new Exception("HTTP " + code + "\uff1a" + response); }
                  StringBuilder full = new StringBuilder();
                  int emptyCount = 0, validCount = 0; long lastUi = 0;
                  BufferedReader br = new BufferedReader(new InputStreamReader(stream, StandardCharsets.UTF_8));
                  String line;
                  while ((line = br.readLine()) != null) {
                      line = line.trim();
                      if (line.isEmpty()) continue;
                      if (!line.startsWith("data:")) continue;
                      String data = line.substring(5).trim();
                      if ("[DONE]".equals(data)) break;
                      try {
                          JSONObject json = new JSONObject(data);
                          JSONArray choices = json.optJSONArray("choices");
                          if (choices == null || choices.length() == 0) { emptyCount++; continue; }
                          JSONObject delta = choices.getJSONObject(0).optJSONObject("delta");
                          String piece = delta != null ? delta.optString("content", "") : "";
                          if (!piece.isEmpty()) { full.append(piece); validCount++; long now = SystemClock.elapsedRealtime(); if (now - lastUi > 120) { callback.onDelta(full.toString()); lastUi = now; } }
                      } catch (Exception ignored) {}
                  }
                  String result = full.toString();
                  if (!result.trim().isEmpty()) { callback.onDelta(result); return result; }
                  if (emptyCount > 0 && validCount == 0) throw new Exception("\u6a21\u578b\u8fd4\u56de\u4e86\u7a7a\u5185\u5bb9\u6d41\uff08\u5171 " + emptyCount + " \u4e2a\u7a7a chunk\uff09\u3002\u53ef\u80fd\u539f\u56e0\uff1a\u989d\u5ea6\u4e0d\u8db3\u3001\u6a21\u578b\u9650\u6d41\u6216\u670d\u52a1\u5f02\u5e38\u3002");
                  throw new Exception("\u6ca1\u6709\u6536\u5230 AI \u56de\u590d\u5185\u5bb9");
              }
          
              private interface AiStreamCallback { void onDelta(String fullText); }
          
              private String readAll(InputStream stream) throws Exception {
                  BufferedReader br = new BufferedReader(new InputStreamReader(stream, StandardCharsets.UTF_8));
                  StringBuilder sb = new StringBuilder(); String line; boolean first = true;
                  while ((line = br.readLine()) != null) { if (!first) sb.append('\n'); sb.append(line); first = false; }
                  return sb.toString();
              }
          
              private int appendAiMessage(String role, String content) {
                  try { JSONObject obj = new JSONObject(); obj.put("role", role); obj.put("content", content); aiMessages.put(obj); saveAiMessages(); renderAiMessages(); return aiMessages.length() - 1; } catch (Exception ignored) {}
                  return -1;
              }
          
              private void updateAiMessage(int index, String role, String content) {
                  try { if (index < 0 || index >= aiMessages.length()) return; JSONObject obj = new JSONObject(); obj.put("role", role); obj.put("content", content); aiMessages.put(index, obj); saveAiMessages(); renderAiMessages(); } catch (Exception ignored) {}
              }
          
              private void renderAiMessages() {
                  if (aiMessageList == null) return;
                  aiMessageList.removeAllViews();
                  for (int i = 0; i < aiMessages.length(); i++) {
                      try {
                          JSONObject msg = aiMessages.getJSONObject(i);
                          boolean streaming = aiSending && i == streamingAssistantIndex && "assistant".equals(msg.optString("role"));
                          aiMessageList.addView(aiBubble(msg.optString("role"), msg.optString("content"), streaming));
                      } catch (Exception ignored) {}
                  }
                  if (aiMessageScroll != null) {
                      aiMessageScroll.post(() -> { aiMessageScroll.smoothScrollTo(0, aiMessageList.getBottom()); reapplyAiKeyboardOffset(); });
                  }
              }
          
              private void reapplyAiKeyboardOffset() {
                  if (aiInputArea == null || rootContainer == null) return;
                  if (!"ai".equals(currentPage)) return;
                  rootContainer.post(() -> {
                      Rect visible = new Rect(); rootContainer.getWindowVisibleDisplayFrame(visible);
                      int screenHeight = rootContainer.getRootView().getHeight();
                      int keyboardHeight = screenHeight - visible.bottom;
                      boolean keyboardOpen = keyboardHeight > screenHeight / 5;
                      adjustAiInputForKeyboard(visible, keyboardOpen);
                  });
              }
          
              private View aiBubble(String role, String content, boolean streaming) {
                  boolean user = "user".equals(role);
                  LinearLayout wrap = new LinearLayout(this); wrap.setOrientation(LinearLayout.VERTICAL);
                  TextView tv = text((user ? "\u4f60\uff1a\n" : "\u52a9\u624b\uff1a\n") + content, 15, Color.WHITE);
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(user ? Color.rgb(14, 116, 144) : Color.rgb(30, 41, 59));
                  bg.setCornerRadius(20); tv.setBackground(bg); tv.setPadding(18, 14, 18, 14);
                  wrap.addView(tv);
                  if (!streaming) {
                      Button copy = button(user ? "\u590d\u5236\u6211\u7684\u6d88\u606f" : "\u590d\u5236 AI \u56de\u590d");
                      copy.setOnClickListener(v -> copyText(user ? "\u6211\u7684\u6d88\u606f" : "AI \u56de\u590d", content));
                      wrap.addView(copy);
                  }
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                  lp.setMargins(0, 8, 0, 8); wrap.setLayoutParams(lp);
                  return wrap;
              }
          
