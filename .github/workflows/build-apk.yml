              private void showAddAlarmDialog(int editIndex) {
                  // \u9884\u52a0\u8f7d\uff1a\u7f16\u8f91\u6a21\u5f0f\u4e0b\u586b\u5165\u5df2\u6709\u6570\u503c
                  int initHour = 7, initMinute = 0;
                  String initLabel = "";
                  String initRepeatDays = "";
                  if (editIndex >= 0) {
                      try {
                          JSONObject a = loadArray("systemAlarms").getJSONObject(editIndex);
                          initHour = a.optInt("hour", 7);
                          initMinute = a.optInt("minute", 0);
                          initLabel = a.optString("label", "");
                          initRepeatDays = a.optString("repeatDays", "");
                          if (initRepeatDays.isEmpty() && a.optBoolean("repeatDaily", false)) initRepeatDays = allWeekDays();
                      } catch (Exception ignored) {}
                  }

                  android.app.AlertDialog.Builder b = new android.app.AlertDialog.Builder(this);
                  b.setTitle(editIndex >= 0 ? "\u7f16\u8f91\u95f9\u949f" : "\u6dfb\u52a0\u95f9\u949f");
                  LinearLayout lay = new LinearLayout(this);
                  lay.setOrientation(LinearLayout.VERTICAL);
                  lay.setPadding(32, 16, 32, 16);

                  EditText hInput = new EditText(this);
                  hInput.setHint("\u5c0f\u65f6 0-23");
                  hInput.setInputType(InputType.TYPE_CLASS_NUMBER);
                  hInput.setTextColor(Color.WHITE);
                  hInput.setHintTextColor(Color.rgb(100,100,100));
                  GradientDrawable hbg = new GradientDrawable();
                  hbg.setColor(Color.rgb(15,23,42));
                  hbg.setStroke(2, Color.rgb(51,65,85));
                  hbg.setCornerRadius(18);
                  hInput.setBackground(hbg);
                  hInput.setPadding(16,12,16,12);
                  if (editIndex >= 0) hInput.setText(String.valueOf(initHour));

                  EditText mInput = new EditText(this);
                  mInput.setHint("\u5206\u949f 0-59");
                  mInput.setInputType(InputType.TYPE_CLASS_NUMBER);
                  mInput.setTextColor(Color.WHITE);
                  mInput.setHintTextColor(Color.rgb(100,100,100));
                  GradientDrawable mbg = new GradientDrawable();
                  mbg.setColor(Color.rgb(15,23,42));
                  mbg.setStroke(2, Color.rgb(51,65,85));
                  mbg.setCornerRadius(18);
                  mInput.setBackground(mbg);
                  mInput.setPadding(16,12,16,12);
                  if (editIndex >= 0) mInput.setText(String.valueOf(initMinute));

                  EditText lInput = new EditText(this);
                  lInput.setHint("\u63d0\u9192\u5185\u5bb9");
                  lInput.setTextColor(Color.WHITE);
                  lInput.setHintTextColor(Color.rgb(100,100,100));
                  GradientDrawable lbg = new GradientDrawable();
                  lbg.setColor(Color.rgb(15,23,42));
                  lbg.setStroke(2, Color.rgb(51,65,85));
                  lbg.setCornerRadius(18);
                  lInput.setBackground(lbg);
                  lInput.setPadding(16,12,16,12);
                  if (editIndex >= 0) lInput.setText(initLabel);

                  TextView repeatTitle = text("重复日期（不勾选则只响一次）", 14, Color.LTGRAY);
                  CheckBox[] weekChecks = new CheckBox[7];
                  LinearLayout weekRow1 = new LinearLayout(this);
                  weekRow1.setOrientation(LinearLayout.HORIZONTAL);
                  LinearLayout weekRow2 = new LinearLayout(this);
                  weekRow2.setOrientation(LinearLayout.HORIZONTAL);
                  String[] weekNames = {"周一", "周二", "周三", "周四", "周五", "周六", "周日"};
                  for (int i = 0; i < 7; i++) {
                      CheckBox cb = new CheckBox(this);
                      cb.setText(weekNames[i]);
                      cb.setTextColor(Color.WHITE);
                      cb.setTextSize(13);
                      cb.setChecked(initRepeatDays.contains(String.valueOf(i)));
                      weekChecks[i] = cb;
                      if (i < 4) weekRow1.addView(cb, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f));
                      else weekRow2.addView(cb, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f));
                  }

                  LinearLayout hm = new LinearLayout(this);
                  hm.setOrientation(LinearLayout.HORIZONTAL);
                  hm.addView(hInput, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f));
                  hm.addView(mInput, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f));
                  lay.addView(hm);
                  lay.addView(lInput);
                  if (editIndex < 0) {
                      TextView toneHint = text("铃声：沿用上次选择（" + lastAlarmToneName() + "）", 14, Color.rgb(148, 163, 184));
                      lay.addView(toneHint);
                  }
                  lay.addView(repeatTitle);
                  lay.addView(weekRow1);
                  lay.addView(weekRow2);
                  b.setView(lay);
                  final int finalEditIndex = editIndex;
                  b.setPositiveButton(editIndex >= 0 ? "\u4fdd\u5b58" : "\u786e\u5b9a", (d, w) -> {
                      int hour = Math.max(0, Math.min(23, parseInt(hInput.getText().toString(), 7)));
                      int minute = Math.max(0, Math.min(59, parseInt(mInput.getText().toString(), 0)));
                      String label = lInput.getText().toString().trim();
                      if (label.isEmpty()) label = "\u95f9\u949f";
                      String repeatDays = selectedWeekDays(weekChecks);
                      if (finalEditIndex >= 0) {
                          updateAlarm(finalEditIndex, hour, minute, label, repeatDays);
                      } else {
                          addAlarm(hour, minute, label, repeatDays, pref.getString(KEY_LAST_ALARM_TONE_URI, ""));
                      }
                  });
                  b.setNegativeButton("\u53d6\u6d88", null);
                  b.show();
              }

              private String selectedWeekDays(CheckBox[] checks) {
                  StringBuilder sb = new StringBuilder();
                  for (int i = 0; i < checks.length; i++) {
                      if (checks[i] != null && checks[i].isChecked()) {
                          if (sb.length() > 0) sb.append(",");
                          sb.append(i);
                      }
                  }
                  return sb.toString();
              }

              private String allWeekDays() { return "0,1,2,3,4,5,6"; }

              private String lastAlarmToneName() {
                  String uri = pref.getString(KEY_LAST_ALARM_TONE_URI, "");
                  return uri.isEmpty() ? "系统默认闹钟" : ringtoneTitleOf(uri);
              }

              private String repeatDaysText(String repeatDays) {
                  if (repeatDays == null || repeatDays.trim().isEmpty()) return "只响一次";
                  String[] names = {"周一", "周二", "周三", "周四", "周五", "周六", "周日"};
                  boolean all = true;
                  StringBuilder sb = new StringBuilder();
                  for (int i = 0; i < names.length; i++) {
                      if (repeatDays.contains(String.valueOf(i))) {
                          if (sb.length() > 0) sb.append("、");
                          sb.append(names[i]);
                      } else {
                          all = false;
                      }
                  }
                  return all ? "每天" : sb.toString();
              }

              // \u7f16\u8f91\u5df2\u6709\u95f9\u949f\uff1a\u4fdd\u7559 id / toneUri / enabled\uff0c\u91cd\u65b0\u8c03\u5ea6
              private void updateAlarm(int index, int hour, int minute, String label, String repeatDays) {
                  try {
                      JSONArray alarms = loadArray("systemAlarms");
                      JSONObject a = alarms.getJSONObject(index);
                      // \u5148\u53d6\u6d88\u539f\u8c03\u5ea6
                      try {
                          AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                          Intent intent = new Intent(this, AlarmReceiver.class);
                          intent.setAction("com.trae.phonehelper.ALARM_" + a.optInt("id"));
                          PendingIntent pi = PendingIntent.getBroadcast(this, a.optInt("id", 0), intent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                          if (am != null) am.cancel(pi);
                      } catch (Exception ignored) {}
                      a.put("hour", hour);
                      a.put("minute", minute);
                      a.put("label", label);
                      a.put("repeatDays", repeatDays);
                      a.put("repeatDaily", allWeekDays().equals(repeatDays));
                      a.put("nextAt", AlarmUtils.nextAlarmTime(hour, minute, repeatDays));
                      alarms.put(index, a);
                      saveArray("systemAlarms", alarms);
                      if (a.optBoolean("enabled", true)) AlarmReceiver.scheduleExactAlarm(this, a);
                      renderAlarmList();
                      updateAlarmDisplay();
                      showStatus("\u95f9\u949f\u5df2\u66f4\u65b0\uff1a" + String.format(Locale.getDefault(), "%02d:%02d", hour, minute));
                  } catch (Exception e) { showStatus("\u4fdd\u5b58\u5931\u8d25"); }
              }

              private void addAlarm(int hour, int minute, String label, String repeatDays, String toneUri) {
                  try {
                      JSONArray alarms = loadArray("systemAlarms");
                      JSONObject a = new JSONObject();
                      a.put("id", alarms.length() + 1);
                      a.put("hour", hour);
                      a.put("minute", minute);
                      a.put("label", label);
                      a.put("enabled", true);
                      a.put("repeatDays", repeatDays);
                      a.put("repeatDaily", allWeekDays().equals(repeatDays));
                      a.put("toneUri", toneUri != null ? toneUri : "");
                      a.put("nextAt", AlarmUtils.nextAlarmTime(hour, minute, repeatDays));
                      alarms.put(a);
                      saveArray("systemAlarms", alarms);
                      AlarmReceiver.scheduleExactAlarm(this, a);
                      renderAlarmList();
                      showStatus("\u95f9\u949f\u5df2\u6dfb\u52a0\uff1a" + String.format(Locale.getDefault(), "%02d:%02d", hour, minute));
                  } catch (Exception e) { showStatus("\u6dfb\u52a0\u5931\u8d25"); }
              }

              private void renderAlarmList() {
                  if (alarmList == null) return;
                  alarmList.removeAllViews();
                  try {
                      JSONArray alarms = loadArray("systemAlarms");
                      for (int i = 0; i < alarms.length(); i++) {
                          alarmList.addView(alarmCard(alarms.getJSONObject(i), i));
                      }
                  } catch (Exception ignored) {}
              }

              private void reconcileAlarmSchedules() {
                  try {
                      JSONArray alarms = loadArray("systemAlarms");
                      boolean changed = false;
                      long now = System.currentTimeMillis();
                      for (int i = 0; i < alarms.length(); i++) {
                          JSONObject a = alarms.getJSONObject(i);
                          if (!a.optBoolean("enabled", false)) continue;
                          String rd = a.optString("repeatDays", "");
                          if (rd.isEmpty() && a.optBoolean("repeatDaily", false)) {
                              rd = allWeekDays();
                              a.put("repeatDays", rd);
                              changed = true;
                          }
                          long nextAt = a.optLong("nextAt", 0);
                          if (nextAt <= now) {
                              a.put("nextAt", AlarmUtils.nextAlarmTime(a.optInt("hour", 7), a.optInt("minute", 0), rd));
                              changed = true;
                          }
                          AlarmReceiver.scheduleExactAlarm(this, a);
                          alarms.put(i, a);
                      }
                      if (changed) saveArray("systemAlarms", alarms);
                  } catch (Exception ignored) {}
              }

              private View alarmCard(JSONObject a, int index) {
                  LinearLayout card = card();
                  int hour = a.optInt("hour", 7);
                  int minute = a.optInt("minute", 0);
                  String label = a.optString("label", "\u95f9\u949f");
                  boolean enabled = a.optBoolean("enabled", true);
                  String repeatDays = a.optString("repeatDays", "");
                  if (repeatDays.isEmpty() && a.optBoolean("repeatDaily", false)) repeatDays = allWeekDays();
                  String tone = a.optString("toneUri", "");

                  // \u9876\u90e8\uff1a\u65f6\u95f4 + \u53f3\u4fa7\u5f00\u5173\uff08\u5360\u6ee1\u5bbd\u5ea6\uff0c\u6574\u9f50\uff09
                  LinearLayout topLine = new LinearLayout(this);
                  topLine.setOrientation(LinearLayout.HORIZONTAL);
                  topLine.setGravity(Gravity.CENTER_VERTICAL);
                  TextView time = text(String.format(Locale.getDefault(), "%02d:%02d", hour, minute), 28, Color.WHITE);
                  time.setTypeface(Typeface.DEFAULT_BOLD);
                  topLine.addView(time, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f));

                  CheckBox sw = new CheckBox(this);
                  sw.setChecked(enabled);
                  sw.setOnCheckedChangeListener((btn, chk) -> {
                      try {
                          a.put("enabled", chk);
                          JSONArray alarms = loadArray("systemAlarms");
                          String rd = a.optString("repeatDays", "");
                          if (rd.isEmpty() && a.optBoolean("repeatDaily", false)) {
                              rd = allWeekDays();
                              a.put("repeatDays", rd);
                          }
                          if (chk) a.put("nextAt", AlarmUtils.nextAlarmTime(a.optInt("hour", 7), a.optInt("minute", 0), rd));
                          alarms.put(index, a);
                          saveArray("systemAlarms", alarms);
                          if (chk) { AlarmReceiver.scheduleExactAlarm(MainActivity.this, a); }
                          else {
                              AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                              Intent intent = new Intent(this, AlarmReceiver.class);
                              intent.setAction("com.trae.phonehelper.ALARM_" + a.optInt("id"));
                              PendingIntent pi = PendingIntent.getBroadcast(this, a.optInt("id", 0), intent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                              if (am != null) am.cancel(pi);
                          }
                          showStatus(chk ? "\u95f9\u949f\u5df2\u5f00\u542f" : "\u95f9\u949f\u5df2\u5173\u95ed");
                          updateAlarmDisplay();
                      } catch (Exception ignored) {}
                  });
                  topLine.addView(sw);
                  card.addView(topLine);

                  // \u6807\u7b7e
                  card.addView(text(label, 14, Color.LTGRAY));
                  card.addView(text("重复：" + repeatDaysText(repeatDays), 13, Color.rgb(148, 163, 184)));
                  // \u771f\u5b9e\u94c3\u58f0\u540d\u79f0\uff08\u83b7\u53d6\u4e0d\u5230\u65f6\u9000\u56de\u63cf\u8ff0\uff09
                  String toneName = tone.isEmpty() ? "\u7cfb\u7edf\u9ed8\u8ba4\u95f9\u94c3" : ringtoneTitleOf(tone);
                  card.addView(text("\u94c3\u58f0\uff1a" + toneName, 13, Color.rgb(148, 163, 184)));

                  // \u5e95\u90e8\u4e09\u4e2a\u7b49\u5bbd\u6309\u94ae\uff1a\u7f16\u8f91 / \u9009\u62e9\u94c3\u58f0 / \u5220\u9664
                  LinearLayout btns = new LinearLayout(this);
                  btns.setOrientation(LinearLayout.HORIZONTAL);
                  btns.setPadding(0, 10, 0, 0);

                  Button edit = button("\u7f16\u8f91");
                  edit.setOnClickListener(v -> showAddAlarmDialog(index));
                  Button ringBtn = button("\u9009\u62e9\u94c3\u58f0");
                  ringBtn.setOnClickListener(v -> showRingtoneCenter(index));
                  Button del = button("\u5220\u9664");
                  // \u201c\u5220\u9664\u201d\u6309\u94ae\u6362\u6210\u7ea2\u6a59\u8c03\uff0c\u4e0e\u5176\u4ed6\u6309\u94ae\u533a\u5206\u5f00
                  GradientDrawable delBg = new GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, new int[]{Color.rgb(244, 63, 94), Color.rgb(249, 115, 22)});
                  delBg.setCornerRadius(22);
                  del.setBackground(delBg);
                  del.setOnClickListener(v -> confirmDeleteAlarm(index, a));

                  LinearLayout.LayoutParams lp1 = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f);
                  lp1.setMargins(0, 0, 6, 0);
                  LinearLayout.LayoutParams lp2 = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f);
                  lp2.setMargins(6, 0, 6, 0);
                  LinearLayout.LayoutParams lp3 = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f);
                  lp3.setMargins(6, 0, 0, 0);
                  btns.addView(edit, lp1);
                  btns.addView(ringBtn, lp2);
                  btns.addView(del, lp3);

                  card.addView(btns);
                  return card;
              }

              // \u5220\u9664\u4e8c\u6b21\u786e\u8ba4
              private void confirmDeleteAlarm(int index, JSONObject a) {
                  new android.app.AlertDialog.Builder(this)
                      .setTitle("\u5220\u9664\u95f9\u949f")
                      .setMessage("\u786e\u5b9a\u8981\u5220\u9664\u8fd9\u4e2a\u95f9\u949f\u5417\uff1f")
                      .setPositiveButton("\u5220\u9664", (d, w) -> {
                          try {
                              AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                              Intent intent = new Intent(this, AlarmReceiver.class);
                              intent.setAction("com.trae.phonehelper.ALARM_" + a.optInt("id"));
                              PendingIntent pi = PendingIntent.getBroadcast(this, a.optInt("id", 0), intent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                              if (am != null) am.cancel(pi);
                              JSONArray alarms = loadArray("systemAlarms");
                              JSONArray n = new JSONArray();
                              for (int j = 0; j < alarms.length(); j++) { if (j != index) n.put(alarms.get(j)); }
                              saveArray("systemAlarms", n);
                              renderAlarmList();
                              updateAlarmDisplay();
                              showStatus("\u95f9\u949f\u5df2\u5220\u9664");
