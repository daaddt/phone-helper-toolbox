              private LinearLayout buildFontSizeSection() {
                  LinearLayout card = createCard();
                  RadioGroup radioGroup = new RadioGroup(this);
                  radioGroup.setOrientation(LinearLayout.VERTICAL);

                  String[] sizes = {"小号", "标准", "大号", "特大号"};
                  float[] scales = {0.85f, 1.0f, 1.15f, 1.3f};
                  float currentScale = pref.getFloat(KEY_FONT_SCALE, 1.0f);

                  for (int i = 0; i < sizes.length; i++) {
                      RadioButton btn = new RadioButton(this);
                      btn.setText(sizes[i]);
                      btn.setTextColor(isDarkTheme() ? Color.WHITE : Color.BLACK);
                      btn.setTextSize(16 * currentScale);
                      btn.setChecked(Math.abs(currentScale - scales[i]) < 0.05f);

                      final float scale = scales[i];
                      btn.setOnClickListener(v -> {
                          feedback.click();
                          pref.edit().putFloat(KEY_FONT_SCALE, scale).apply();
                          Toast.makeText(SettingsActivity.this, "字体大小已更新", Toast.LENGTH_SHORT).show();
                          recreate();
                      });

                      radioGroup.addView(btn);
                  }

                  card.addView(radioGroup);
                  return card;
              }

              private LinearLayout buildFeedbackSection() {
                  LinearLayout card = createCard();

                  CheckBox soundCheck = new CheckBox(this);
                  soundCheck.setText("启用音效");
                  soundCheck.setTextColor(isDarkTheme() ? Color.WHITE : Color.BLACK);
                  soundCheck.setTextSize(16);
                  soundCheck.setChecked(pref.getBoolean(KEY_SOUND_ENABLED, true));
                  soundCheck.setOnCheckedChangeListener((buttonView, isChecked) -> {
                      feedback.click();
                      pref.edit().putBoolean(KEY_SOUND_ENABLED, isChecked).apply();
                      feedback.setSoundEnabled(isChecked);
                  });
                  card.addView(soundCheck);

                  CheckBox vibrationCheck = new CheckBox(this);
                  vibrationCheck.setText("启用震动反馈");
                  vibrationCheck.setTextColor(isDarkTheme() ? Color.WHITE : Color.BLACK);
                  vibrationCheck.setTextSize(16);
                  vibrationCheck.setChecked(pref.getBoolean(KEY_VIBRATION_ENABLED, true));
                  vibrationCheck.setOnCheckedChangeListener((buttonView, isChecked) -> {
                      feedback.click();
                      pref.edit().putBoolean(KEY_VIBRATION_ENABLED, isChecked).apply();
                      feedback.setVibrationEnabled(isChecked);
                  });
                  card.addView(vibrationCheck);

                  return card;
              }

              private LinearLayout buildDataManagementSection() {
                  LinearLayout card = createCard();

                  Button clearBtn = createButton("清理所有数据", Color.rgb(244, 63, 94));
                  clearBtn.setText("清理所有数据（常用文本、快捷链接、AI对话）");
                  clearBtn.setOnClickListener(v -> {
                      feedback.click();
                      new android.app.AlertDialog.Builder(SettingsActivity.this)
                          .setTitle("确认清理")
                          .setMessage("确定要删除所有保存的数据吗？此操作不可恢复。")
                          .setPositiveButton("确定", (dialog, which) -> {
                              clearAllData();
                              feedback.success();
                              Toast.makeText(SettingsActivity.this, "数据已清理", Toast.LENGTH_SHORT).show();
                          })
                          .setNegativeButton("取消", null)
                          .show();
                  });
                  card.addView(clearBtn);

                  return card;
              }

              private void clearAllData() {
                  SharedPreferences.Editor editor = pref.edit();
                  editor.remove("texts");
                  editor.remove("links");
                  editor.remove("aiMessages");
                  editor.remove("aiApiUrl");
                  editor.remove("aiApiKey");
                  editor.remove("aiModel");
                  editor.remove("aiSystemPrompt");
                  editor.remove("aiContextRounds");
                  editor.remove("splitInputText");
                  editor.remove("splitInputSize");
                  editor.apply();
              }

              private LinearLayout createCard() {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(20, 18, 20, 18);

                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(isDarkTheme() ? Color.rgb(17, 24, 39) : Color.rgb(248, 250, 252));
                  bg.setStroke(1, isDarkTheme() ? Color.rgb(39, 52, 73) : Color.rgb(226, 232, 240));
                  bg.setCornerRadius(24);
                  card.setBackground(bg);

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                  lp.setMargins(0, 8, 0, 12);
                  card.setLayoutParams(lp);

                  return card;
              }

              private Button createButton(String text, int color) {
                  Button btn = new Button(this);
                  btn.setText(text);
                  btn.setTextSize(16);
                  btn.setAllCaps(false);
                  btn.setTextColor(Color.WHITE);

                  GradientDrawable bg = new GradientDrawable(
                      GradientDrawable.Orientation.LEFT_RIGHT,
                      new int[]{color, adjustColorBrightness(color, -20)});
                  bg.setCornerRadius(22);
                  btn.setBackground(bg);
                  btn.setPadding(24, 16, 24, 16);

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                  lp.setMargins(0, 8, 0, 8);
                  btn.setLayoutParams(lp);

                  return btn;
              }

              private int adjustColorBrightness(int color, int amount) {
                  int r = Math.max(0, Math.min(255, Color.red(color) + amount));
                  int g = Math.max(0, Math.min(255, Color.green(color) + amount));
                  int b = Math.max(0, Math.min(255, Color.blue(color) + amount));
                  return Color.rgb(r, g, b);
              }
          }
