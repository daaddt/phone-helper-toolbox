              private JSONArray loadArray(String key) { try { return new JSONArray(pref.getString(key, "[]")); } catch (Exception e) { return new JSONArray(); } }
              private void saveArray(String key, JSONArray array) { pref.edit().putString(key, array.toString()).apply(); }

              private void removeItem(String key, int index) {
                  JSONArray source = loadArray(key); JSONArray result = new JSONArray();
                  for (int i = 0; i < source.length(); i++) { if (i == index) continue; try { result.put(source.getJSONObject(i)); } catch (Exception ignored) {} }
                  saveArray(key, result);
              }

              private void moveItem(String key, int from, int to, String type) {
                  if ("text".equals(type) && editingTextIndex >= 0) { showStatus("\u8bf7\u5148\u4fdd\u5b58\u6216\u53d6\u6d88\u7f16\u8f91"); return; }
                  if ("link".equals(type) && editingLinkIndex >= 0) { showStatus("\u8bf7\u5148\u4fdd\u5b58\u6216\u53d6\u6d88\u7f16\u8f91"); return; }
                  JSONArray source = loadArray(key);
                  if (from < 0 || to < 0 || from >= source.length() || to >= source.length()) return;
                  JSONArray result = new JSONArray();
                  try {
                      JSONObject moving = source.getJSONObject(from);
                      for (int i = 0; i < source.length(); i++) {
                          if (i == from) continue;
                          if (i == to && from > to) result.put(moving);
                          result.put(source.getJSONObject(i));
                          if (i == to && from < to) result.put(moving);
                      }
                      saveArray(key, result);
                      boolean sorting = isSortMode(key, type);
                      sortDragging = false;
                      if ("text".equals(type)) { renderSavedTexts(); if (!sorting) showStatus("\u5df2\u8c03\u6574\u5e38\u7528\u6587\u672c\u987a\u5e8f"); }
                      else { renderLinks(); if (!sorting) showStatus("\u5df2\u8c03\u6574\u5feb\u6377\u94fe\u63a5\u987a\u5e8f"); }
                  } catch (Exception ignored) {}
              }

              private boolean moveItemSilently(String key, int from, int to) {
                  JSONArray source = loadArray(key);
                  if (from < 0 || to < 0 || from >= source.length() || to >= source.length() || from == to) return false;
                  JSONArray result = new JSONArray();
                  try {
                      JSONObject moving = source.getJSONObject(from);
                      for (int i = 0; i < source.length(); i++) {
                          if (i == from) continue;
                          if (i == to && from > to) result.put(moving);
                          result.put(source.getJSONObject(i));
                          if (i == to && from < to) result.put(moving);
                      }
                      saveArray(key, result);
                      return true;
                  } catch (Exception ignored) { return false; }
              }

              private boolean moveItemToExactIndex(String key, int from, int to) {
                  JSONArray source = loadArray(key);
                  if (from < 0 || to < 0 || from >= source.length() || to > source.length() - 1) return false;
                  if (from == to) return true;
                  JSONArray withoutMoving = new JSONArray();
                  JSONArray result = new JSONArray();
                  try {
                      JSONObject moving = source.getJSONObject(from);
                      for (int i = 0; i < source.length(); i++) {
                          if (i != from) withoutMoving.put(source.getJSONObject(i));
                      }
                      for (int i = 0; i < source.length(); i++) {
                          if (i == to) result.put(moving);
                          if (i < withoutMoving.length()) result.put(withoutMoving.getJSONObject(i));
                      }
                      saveArray(key, result);
                      return true;
                  } catch (Exception ignored) { return false; }
              }

              private boolean moveSortItemAcrossPage(int from, int targetPage, boolean toStart) {
                  JSONArray source = loadArray(sortModeKey);
                  if (from < 0 || from >= source.length()) return false;
                  int pages = pageCount(source.length());
                  targetPage = Math.max(0, Math.min(pages - 1, targetPage));
                  int targetStart = targetPage * PAGE_SIZE;
                  int targetCount = Math.max(0, Math.min(PAGE_SIZE, source.length() - targetStart));
                  int target;
                  if (targetCount < PAGE_SIZE) target = targetStart + targetCount;
                  else target = targetStart + (toStart ? 0 : PAGE_SIZE - 1);
                  target = Math.max(0, Math.min(source.length() - 1, target));
                  return moveItemToExactIndex(sortModeKey, from, target);
              }

              private boolean commitCrossPageDrop(String key, int from, int to, int direction) {
                  JSONArray source = loadArray(key);
                  if (from < 0 || to < 0 || from >= source.length() || to > source.length()) return false;
                  to = Math.max(0, Math.min(to, source.length() - 1));
                  int originPage = Math.max(0, from / PAGE_SIZE);
                  int targetPage = clampPage(sortPageIndex, source.length());
                  if (originPage == targetPage || direction == 0) return moveItemToExactIndex(key, from, to);
                  int targetStart = targetPage * PAGE_SIZE;
                  int targetEnd = Math.min(source.length() - 1, targetStart + PAGE_SIZE - 1);
                  int boundaryIndex = direction > 0 ? targetEnd : targetStart;
                  if (boundaryIndex < 0 || boundaryIndex >= source.length() || boundaryIndex == from) return moveItemToExactIndex(key, from, to);
                  try {
                      JSONObject moving = source.getJSONObject(from);
                      JSONObject boundary = source.getJSONObject(boundaryIndex);
                      java.util.ArrayList<JSONObject> list = new java.util.ArrayList<>();
                      for (int i = 0; i < source.length(); i++) {
                          if (i == from || i == boundaryIndex) continue;
                          list.add(source.getJSONObject(i));
                      }
                      // 计算移除两项后的目标位置
                      int movingTo = to;
                      int removedBefore = 0;
                      if (from < to) removedBefore++;
                      if (boundaryIndex < to) removedBefore++;
                      movingTo = to - removedBefore;
                      movingTo = Math.max(0, Math.min(movingTo, list.size()));
                      list.add(movingTo, moving);
                      // 边界条目放到原页末尾
                      int originLast = Math.min((originPage + 1) * PAGE_SIZE - 1, list.size());
                      list.add(originLast, boundary);
                      JSONArray result = new JSONArray();
                      for (JSONObject obj : list) result.put(obj);
                      saveArray(key, result);
                      return true;
                  } catch (Exception ignored) { return false; }
              }

              private boolean isSortMode(String key, String type) {
                  return key.equals(sortModeKey) && type.equals(sortModeType);
              }

              private void enterSortMode(String key, String type) {
                  if ("text".equals(type) && editingTextIndex >= 0) { showStatus("\u8bf7\u5148\u4fdd\u5b58\u6216\u53d6\u6d88\u7f16\u8f91"); return; }
                  if ("link".equals(type) && editingLinkIndex >= 0) { showStatus("\u8bf7\u5148\u4fdd\u5b58\u6216\u53d6\u6d88\u7f16\u8f91"); return; }
                  sortModeKey = key;
                  sortModeType = type;
                  sortPageIndex = "text".equals(type) ? textPageIndex : linkPageIndex;
                  sortModeEnteredAt = SystemClock.elapsedRealtime();
                  sortDragging = false;
                  sortDragArmed = false;
                  sortDragMoved = false;
                  stopSortAutoScroll();
                  sortActiveView = null;
                  sortDragOriginalIndex = -1;
                  sortDragPendingIndex = -1;
                  sortCrossPagePending = false;
                  sortCrossPageFromIndex = -1;
                  sortResumeDirection = 0;
                  sortDragStartRawY = 0f;
                  sortDragLastRawY = 0f;
                  sortDragItemHeight = 0f;
                  sortSwipeStartX = 0f;
                  sortSwipeStartY = 0f;
                  renderSortPage();
                  showPage("sort");
                  showStatus("\u53ef\u957f\u6309\u62d6\u62fd\u6362\u4f4d");
              }

              private void exitSortMode() {
                  if (sortModeKey.isEmpty()) return;
                  String type = sortModeType;
                  sortModeKey = "";
                  sortModeType = "";
                  sortSwipeStartX = 0f;
                  sortSwipeStartY = 0f;
                  sortModeEnteredAt = 0L;
                  sortDragging = false;
                  sortDragArmed = false;
                  sortDragMoved = false;
                  stopSortAutoScroll();
                  sortActiveView = null;
                  sortDragOriginalIndex = -1;
                  sortDragPendingIndex = -1;
                  sortCrossPagePending = false;
                  sortCrossPageFromIndex = -1;
                  sortResumeDirection = 0;
                  sortDragStartRawY = 0f;
                  sortDragLastRawY = 0f;
                  sortDragItemHeight = 0f;
                  if ("text".equals(type)) { textPageIndex = clampPage(sortPageIndex, loadArray("texts").length()); renderSavedTexts(); showPage("text"); }
                  else { linkPageIndex = clampPage(sortPageIndex, loadArray("links").length()); renderLinks(); showPage("link"); }
                  showStatus("\u6392\u5e8f\u5df2\u4fdd\u5b58");
              }

              private TextView sortModeBanner(String title) {
                  TextView tv = text("\u53ef\u957f\u6309\u62d6\u62fd\u6362\u4f4d", 13, Color.rgb(125, 211, 252));
                  tv.setGravity(Gravity.CENTER);
                  tv.setPadding(16, 14, 16, 14);
                  GradientDrawable bg = new GradientDrawable();
