              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (resultCode != RESULT_OK || data == null || data.getData() == null) return;
                  Uri uri = data.getData();
          
                  if (requestCode == PICK_TEXT_FILE) {
                      try { getContentResolver().takePersistableUriPermission(uri, Intent.FLAG_GRANT_READ_URI_PERMISSION); } catch (Exception ignored) {}
                      try (InputStream is = getContentResolver().openInputStream(uri)) {
                          if (is == null) { toast("\u65e0\u6cd5\u8bfb\u53d6\u6587\u4ef6"); return; }
                          String content = readAll(is);
                          longTextInput.setText(content);
                          showStatus("\u5df2\u5bfc\u5165\u6587\u4ef6\uff0c\u5171 " + content.length() + " \u5b57");
                          showPage("split");
                      } catch (Exception e) { showStatus("\u5bfc\u5165\u5931\u8d25\uff1a" + shortError(e.getMessage())); }
                  } else if (requestCode == CREATE_BACKUP_FILE) {
                      exportBackup(uri);
                  } else if (requestCode == PICK_BACKUP_FILE) {
                      try { getContentResolver().takePersistableUriPermission(uri, Intent.FLAG_GRANT_READ_URI_PERMISSION); } catch (Exception ignored) {}
                      importBackup(uri);
                  } else if (requestCode == PICK_ALARM_RINGTONE) {
                      Uri picked = data.getParcelableExtra(RingtoneManager.EXTRA_RINGTONE_PICKED_URI);
                      String uriStr = picked != null ? picked.toString() : "";
                      applyToneToAlarm(currentEditingAlarmIndex, uriStr);
                  } else if (requestCode == PICK_ALARM_AUDIO) {
                      try { getContentResolver().takePersistableUriPermission(uri, Intent.FLAG_GRANT_READ_URI_PERMISSION); } catch (Exception ignored) {}
                      applyToneToAlarm(currentEditingAlarmIndex, uri.toString());
                  }
              }
          
              private void applyToneToAlarm(int index, String uriStr) {
                  if (index < 0) return;
                  try {
                      JSONArray alarms = loadArray("systemAlarms");
                      JSONObject a = alarms.getJSONObject(index);
                      a.put("toneUri", uriStr != null ? uriStr : "");
                      alarms.put(index, a);
                      saveArray("systemAlarms", alarms);
                      if (a.optBoolean("enabled", false)) AlarmReceiver.scheduleExactAlarm(this, a);
                      renderAlarmList();
                      updateAlarmDisplay();
                      showStatus(uriStr.isEmpty() ? "\u5df2\u6062\u590d\u7cfb\u7edf\u9ed8\u8ba4\u94f3\u58f0" : "\u5df2\u9009\u62e9\u81ea\u5b9a\u4e49\u94f3\u58f0");
                  } catch (Exception ignored) {}
              }
          
              private void exportBackup(Uri uri) {
                  try (OutputStream os = getContentResolver().openOutputStream(uri)) {
                      if (os == null) { toast("\u65e0\u6cd5\u521b\u5efa\u5907\u4efd\u6587\u4ef6"); return; }
                      JSONObject backup = new JSONObject();
                      backup.put("version", 1);
                      backup.put("texts", loadArray("texts"));
                      backup.put("links", loadArray("links"));
                      backup.put("systemAlarms", loadArray("systemAlarms"));
                      os.write(backup.toString(2).getBytes(StandardCharsets.UTF_8));
                      showStatus("\u5907\u4efd\u5df2\u5bfc\u51fa");
                  } catch (Exception e) { showStatus("\u5bfc\u51fa\u5931\u8d25\uff1a" + shortError(e.getMessage())); }
              }
          
              private void importBackup(Uri uri) {
                  try (InputStream is = getContentResolver().openInputStream(uri)) {
                      if (is == null) { toast("\u65e0\u6cd5\u8bfb\u53d6\u5907\u4efd\u6587\u4ef6"); return; }
                      JSONObject backup = new JSONObject(readAll(is));
                      JSONArray texts = backup.optJSONArray("texts");
                      JSONArray links = backup.optJSONArray("links");
                      JSONArray alarms = backup.optJSONArray("systemAlarms");
                      if (texts != null) saveArray("texts", texts);
                      if (links != null) saveArray("links", links);
                      if (alarms != null) {
                          saveArray("systemAlarms", alarms);
                          for (int i = 0; i < alarms.length(); i++) {
                              JSONObject a = alarms.getJSONObject(i);
                              if (a.optBoolean("enabled", false)) AlarmReceiver.scheduleExactAlarm(this, a);
                          }
                      }
                      renderSavedTexts(); renderLinks(); renderAlarmList(); updateAlarmDisplay();
                      showStatus("\u5907\u4efd\u5df2\u5bfc\u5165");
                  } catch (Exception e) { showStatus("\u5bfc\u5165\u5931\u8d25\uff1a" + shortError(e.getMessage())); }
              }
          
              private void generateChunks() {
                  String source = longTextInput.getText().toString();
                  if (source.trim().isEmpty()) { toast("\u8bf7\u5148\u7c98\u8d34\u957f\u6587\u672c"); return; }
                  int size = Math.max(500, Math.min(10000, parseInt(splitSizeInput.getText().toString(), 3000)));
                  splitSizeInput.setText(String.valueOf(size));
                  splitResultList.removeAllViews();
                  int count = 0;
                  for (int start = 0; start < source.length(); start += size) {
                      int end = Math.min(source.length(), start + size);
                      count++;
                      splitResultList.addView(chunkCard(count, source.substring(start, end)));
                  }
                  hideKeyboard();
                  showStatus("\u5df2\u751f\u6210 " + count + " \u6bb5");
              }
          
              private View chunkCard(int index, String chunk) {
                  LinearLayout card = card();
                  card.addView(text(String.format("\u7b2c %02d \u6bb5 \u00b7 %d \u5b57", index, chunk.length()), 18, Color.WHITE));
                  card.addView(text(preview(chunk), 14, Color.LTGRAY));
                  Button copy = button("\u590d\u5236\u7b2c " + String.format("%02d", index) + " \u6bb5");
                  copy.setOnClickListener(v -> copyText("\u7b2c " + index + " \u6bb5", chunk));
                  card.addView(copy);
                  return card;
              }
          
              private void addSavedText() {
                  String title = titleInput.getText().toString().trim();
                  String content = contentInput.getText().toString();
                  if (title.isEmpty() || content.trim().isEmpty()) { toast("\u6807\u9898\u548c\u5185\u5bb9\u90fd\u8981\u586b\u5199"); return; }
                  JSONArray array = loadArray("texts");
                  try {
                      JSONObject obj = new JSONObject();
                      obj.put("title", title); obj.put("content", content);
                      if (editingTextIndex >= 0 && editingTextIndex < array.length()) array.put(editingTextIndex, obj);
                      else array.put(obj);
                      saveArray("texts", array);
                  } catch (Exception ignored) {}
                  boolean edited = editingTextIndex >= 0;
                  titleInput.setText(""); contentInput.setText("");
                  cancelTextEditStateOnly();
                  renderSavedTexts(); hideKeyboard();
                  showStatus(edited ? "\u5df2\u4fdd\u5b58\u5e38\u7528\u6587\u672c\u4fee\u6539" : "\u5df2\u6dfb\u52a0\u5e38\u7528\u6587\u672c");
              }
          
              private void renderSavedTexts() {
                  if (savedTextList == null) return;
                  savedTextList.removeAllViews();
                  JSONArray array = loadArray("texts");
                  for (int i = 0; i < array.length(); i++) {
                      try { savedTextList.addView(savedTextCard(i, array.getJSONObject(i))); } catch (Exception ignored) {}
                  }
              }
          
              private View savedTextCard(int index, JSONObject obj) {
                  LinearLayout card = card();
                  String title = obj.optString("title"); String content = obj.optString("content");
                  card.addView(text(title, 18, Color.WHITE));
                  card.addView(text(preview(content), 14, Color.LTGRAY));
                  LinearLayout actions = row();
                  Button copy = button("\u590d\u5236"); Button edit = button("\u7f16\u8f91"); Button delete = button("\u5220\u9664");
                  LinearLayout sortActions = row();
                  Button up = button("\u4e0a\u79fb"); Button down = button("\u4e0b\u79fb");
                  copy.setOnClickListener(v -> copyText(title, content));
                  edit.setOnClickListener(v -> startTextEdit(index, title, content));
                  delete.setOnClickListener(v -> {
                      if (editingTextIndex == index) cancelTextEditStateOnly();
                      removeItem("texts", index); renderSavedTexts();
                      showStatus("\u5df2\u5220\u9664\u5e38\u7528\u6587\u672c");
                  });
                  up.setEnabled(index > 0); down.setEnabled(index < loadArray("texts").length() - 1);
                  up.setAlpha(index > 0 ? 1f : 0.45f); down.setAlpha(index < loadArray("texts").length() - 1 ? 1f : 0.45f);
                  up.setOnClickListener(v -> moveItem("texts", index, index - 1, "text"));
                  down.setOnClickListener(v -> moveItem("texts", index, index + 1, "text"));
                  actions.addView(copy, weight()); actions.addView(edit, weight()); actions.addView(delete, weight());
                  card.addView(actions);
                  sortActions.addView(up, weight()); sortActions.addView(down, weight());
                  card.addView(sortActions);
                  return card;
              }
          
              private void startTextEdit(int index, String title, String content) {
                  editingTextIndex = index;
                  titleInput.setText(title); contentInput.setText(content);
