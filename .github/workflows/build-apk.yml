              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setSoftInputMode(WindowManager.LayoutParams.SOFT_INPUT_ADJUST_RESIZE);
                  pref = getSharedPreferences(PREF, MODE_PRIVATE);
                  ensureDefaults();
                  refreshDefaultContentFor17();
                  refreshDefaultContentFor171();
                  restoreTimerState();
                  restorePomoState();
                  loadAiMessages();
                  buildUi();
                  renderSavedTexts();
                  renderLinks();
                  handler.post(tick);
                  requestAlarmPermissions();
              }
          
              private void requestAlarmPermissions() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, REQ_NOTIFICATIONS);
                      }
                  }
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                      if (am != null && !am.canScheduleExactAlarms()) {
                          try {
                              Intent i = new Intent(Settings.ACTION_REQUEST_SCHEDULE_EXACT_ALARM);
                              startActivityForResult(i, REQ_EXACT_ALARM);
                          } catch (Exception ignored) {}
                      }
                  }
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.M) return;
                  String pkg = getPackageName();
                  try {
                      if (!((PowerManager) getSystemService(Context.POWER_SERVICE)).isIgnoringBatteryOptimizations(pkg)) {
                          Intent i = new Intent(Settings.ACTION_REQUEST_IGNORE_BATTERY_OPTIMIZATIONS);
                          i.setData(Uri.parse("package:" + pkg));
                          startActivityForResult(i, REQ_BATTERY);
                      }
                  } catch (Exception ignored) {}
              }
          
              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] results) {
                  super.onRequestPermissionsResult(requestCode, permissions, results);
                  if (requestCode == REQ_NOTIFICATIONS && results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED) {
                      showStatus("\u901a\u77e5\u6743\u9650\u5df2\u5141\u8bb8");
                  }
              }
          
              @Override
              protected void onPause() {
                  super.onPause();
                  saveTimerState();
                  savePomoState();
              }
          
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  saveTimerState();
                  savePomoState();
                  handler.removeCallbacks(tick);
              }
          
