          import android.widget.Toast;

          public class SettingsActivity extends Activity {
              private static final String PREF = "phone_helper_pref";
              private static final String KEY_THEME_MODE = "themeMode";
              private static final String KEY_FONT_SCALE = "fontScale";
              private static final String KEY_SOUND_ENABLED = "soundEnabled";
              private static final String KEY_VIBRATION_ENABLED = "vibrationEnabled";

              private SharedPreferences pref;
              private FeedbackHelper feedback;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  pref = getSharedPreferences(PREF, Context.MODE_PRIVATE);
                  applyTheme();
                  feedback = FeedbackHelper.getInstance(this);
                  feedback.setSoundEnabled(pref.getBoolean(KEY_SOUND_ENABLED, true));
                  feedback.setVibrationEnabled(pref.getBoolean(KEY_VIBRATION_ENABLED, true));
                  setContentView(buildSettingsLayout());
              }

              private void applyTheme() {
                  String themeMode = pref.getString(KEY_THEME_MODE, "dark");
                  if ("light".equals(themeMode)) {
                      setTheme(R.style.AppTheme_Light);
                  } else {
                      setTheme(R.style.AppTheme);
                  }
              }

              private LinearLayout buildSettingsLayout() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(22, 60, 22, 28);
                  root.setBackgroundColor(isDarkTheme() ? Color.rgb(10, 15, 25) : Color.WHITE);

                  TextView title = new TextView(this);
                  title.setText("设置");
                  title.setTextSize(28);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(isDarkTheme() ? Color.WHITE : Color.BLACK);
                  title.setGravity(Gravity.CENTER_HORIZONTAL);
                  title.setPadding(0, 10, 0, 20);
                  root.addView(title);

                  root.addView(sectionTitle("主题设置"));
                  root.addView(buildThemeSection());

                  root.addView(sectionTitle("字体大小"));
                  root.addView(buildFontSizeSection());

                  root.addView(sectionTitle("反馈设置"));
                  root.addView(buildFeedbackSection());

                  root.addView(sectionTitle("数据管理"));
                  root.addView(buildDataManagementSection());

                  Button backBtn = createButton("返回", isDarkTheme() ? Color.rgb(14, 165, 233) : Color.rgb(0, 122, 255));
                  backBtn.setOnClickListener(v -> {
                      feedback.click();
                      finish();
                  });
                  root.addView(backBtn);

                  return root;
              }

              private boolean isDarkTheme() {
                  return !"light".equals(pref.getString(KEY_THEME_MODE, "dark"));
              }

              private TextView sectionTitle(String text) {
                  TextView title = new TextView(this);
                  title.setText(text);
                  title.setTextSize(16);
                  title.setTextColor(isDarkTheme() ? Color.rgb(125, 211, 252) : Color.rgb(14, 165, 233));
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setPadding(0, 20, 0, 10);
                  return title;
              }

              private LinearLayout buildThemeSection() {
                  LinearLayout card = createCard();
                  RadioGroup radioGroup = new RadioGroup(this);
                  radioGroup.setOrientation(LinearLayout.HORIZONTAL);

                  RadioButton darkBtn = new RadioButton(this);
                  darkBtn.setText("深色模式");
                  darkBtn.setTextColor(isDarkTheme() ? Color.WHITE : Color.BLACK);
                  darkBtn.setTextSize(16);
                  darkBtn.setChecked("dark".equals(pref.getString(KEY_THEME_MODE, "dark")));

                  RadioButton lightBtn = new RadioButton(this);
                  lightBtn.setText("浅色模式");
                  lightBtn.setTextColor(isDarkTheme() ? Color.WHITE : Color.BLACK);
                  lightBtn.setTextSize(16);
                  lightBtn.setChecked("light".equals(pref.getString(KEY_THEME_MODE, "dark")));

                  radioGroup.addView(darkBtn, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f));
                  radioGroup.addView(lightBtn, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f));

                  radioGroup.setOnCheckedChangeListener((group, checkedId) -> {
                      feedback.click();
                      RadioButton checked = group.findViewById(checkedId);
                      String theme = "深色模式".equals(checked.getText()) ? "dark" : "light";
                      pref.edit().putString(KEY_THEME_MODE, theme).apply();
                      Toast.makeText(SettingsActivity.this, "主题已切换，重启应用生效", Toast.LENGTH_SHORT).show();
                  });

                  card.addView(radioGroup);
