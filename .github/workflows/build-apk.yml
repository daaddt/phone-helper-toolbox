              private void adjustAiInputForKeyboard(Rect visible, boolean keyboardOpen) {
                  if (aiPage == null || aiInputArea == null) return;
                  if (!"ai".equals(currentPage) || !keyboardOpen) {
                      aiInputArea.setTranslationY(0);
                      aiPage.setPadding(
                              aiPage.getPaddingLeft(),
                              aiPage.getPaddingTop(),
                              aiPage.getPaddingRight(),
                              aiBaseBottomPadding
                      );
                      return;
                  }
                  int screenHeight = rootFrame.getRootView().getHeight();
                  int keyboardHeight = Math.max(0, screenHeight - visible.bottom);
                  aiInputArea.setTranslationY(0);
                  aiPage.setPadding(
                          aiPage.getPaddingLeft(),
                          aiPage.getPaddingTop(),
                          aiPage.getPaddingRight(),
                          keyboardHeight + aiBaseBottomPadding + 18
