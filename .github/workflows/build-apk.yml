              private String today() { return new SimpleDateFormat("yyyy-MM-dd", Locale.getDefault()).format(new Date()); }
          
              private void restoreTimerState() {
                  timerMode = pref.getString("timerMode", "stopwatch");
                  stopwatchElapsed = pref.getLong("stopwatchElapsed", 0);
                  stopwatchRunning = pref.getBoolean("stopwatchRunning", false);
                  countdownDuration = pref.getLong("countdownDuration", 5 * 60 * 1000L);
                  countdownElapsed = pref.getLong("countdownElapsed", 0);
                  countdownRunning = pref.getBoolean("countdownRunning", false);
                  long savedAt = pref.getLong("timerSavedAt", SystemClock.elapsedRealtime());
                  long delta = Math.max(0, SystemClock.elapsedRealtime() - savedAt);
                  if (stopwatchRunning) { stopwatchElapsed += delta; stopwatchStartedAt = SystemClock.elapsedRealtime(); }
                  if (countdownRunning) {
                      countdownElapsed = Math.min(countdownDuration, countdownElapsed + delta);
                      if (countdownElapsed >= countdownDuration) countdownRunning = false;
                      countdownStartedAt = SystemClock.elapsedRealtime();
                  }
              }
          
              private void saveTimerState() {
                  pref.edit().putString("timerMode", timerMode)
                        .putLong("stopwatchElapsed", getStopwatchElapsed()).putBoolean("stopwatchRunning", stopwatchRunning)
                        .putLong("countdownDuration", countdownDuration).putLong("countdownElapsed", getCountdownElapsed())
                        .putBoolean("countdownRunning", countdownRunning)
                        .putLong("timerSavedAt", SystemClock.elapsedRealtime()).apply();
              }
          
              private void restorePomoState() {
                  int focusMin = pref.getInt("pomoFocusMin", 25);
                  int restMin = pref.getInt("pomoRestMin", 5);
                  pomoFocus = pref.getBoolean("pomoFocus", true);
                  pomoDuration = pref.getLong("pomoDuration", (pomoFocus ? focusMin : restMin) * 60 * 1000L);
                  pomoElapsed = pref.getLong("pomoElapsed", 0);
                  pomoRunning = pref.getBoolean("pomoRunning", false);
                  long savedAt = pref.getLong("pomoSavedAt", SystemClock.elapsedRealtime());
                  long delta = Math.max(0, SystemClock.elapsedRealtime() - savedAt);
                  if (pomoRunning) {
                      pomoElapsed = Math.min(pomoDuration, pomoElapsed + delta);
                      if (pomoElapsed >= pomoDuration) pomoRunning = false;
                      pomoStartedAt = SystemClock.elapsedRealtime();
                  }
              }
          
              private void savePomoState() {
                  pref.edit().putBoolean("pomoFocus", pomoFocus).putLong("pomoDuration", pomoDuration)
                        .putLong("pomoElapsed", getPomoElapsed()).putBoolean("pomoRunning", pomoRunning)
                        .putLong("pomoSavedAt", SystemClock.elapsedRealtime()).apply();
              }
          
              private String formatTenths(long ms) {
                  long tenths = Math.max(0, ms) / 100;
                  long tenth = tenths % 10;
                  long totalSeconds = tenths / 10;
                  return String.format(Locale.getDefault(), "%02d:%02d.%d", totalSeconds / 60, totalSeconds % 60, tenth);
              }
          
              private String formatMinutes(long ms) {
                  long totalSeconds = Math.max(0, ms + 999) / 1000;
                  return String.format(Locale.getDefault(), "%02d:%02d", totalSeconds / 60, totalSeconds % 60);
              }
          
