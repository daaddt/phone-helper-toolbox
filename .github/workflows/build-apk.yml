              private void setCountdownFromInput() {
                  int minutes = parseInt(timerMinuteInput.getText().toString(), 5);
                  int seconds = Math.max(0, Math.min(59, parseInt(timerSecondInput.getText().toString(), 0)));
                  countdownDuration = Math.max(1000L, (minutes * 60L + seconds) * 1000L);
                  countdownElapsed = 0; countdownRunning = false;
                  timerMode = "countdown";
                  updateTimerDisplay(); saveTimerState();
              }
          
              private void toggleTimer() {
                  if ("stopwatch".equals(timerMode)) {
                      if (stopwatchRunning) { stopwatchElapsed = getStopwatchElapsed(); stopwatchRunning = false; }
                      else { stopwatchRunning = true; stopwatchStartedAt = SystemClock.elapsedRealtime(); }
                  } else {
                      if (countdownRunning) { countdownElapsed = getCountdownElapsed(); countdownRunning = false; }
                      else {
                          if (getCountdownRemaining() <= 0) countdownElapsed = 0;
                          countdownRunning = true; countdownStartedAt = SystemClock.elapsedRealtime();
                      }
                  }
                  updateTimerDisplay(); saveTimerState();
              }
          
              private void resetTimer() {
                  if ("stopwatch".equals(timerMode)) { stopwatchRunning = false; stopwatchElapsed = 0; }
                  else { countdownRunning = false; countdownElapsed = 0; }
                  updateTimerDisplay(); saveTimerState();
              }
          
              private long getStopwatchElapsed() { return stopwatchRunning ? stopwatchElapsed + SystemClock.elapsedRealtime() - stopwatchStartedAt : stopwatchElapsed; }
              private long getCountdownElapsed() { return countdownRunning ? Math.min(countdownDuration, countdownElapsed + SystemClock.elapsedRealtime() - countdownStartedAt) : countdownElapsed; }
              private long getCountdownRemaining() { return Math.max(0, countdownDuration - getCountdownElapsed()); }
          
              private void updateTimerDisplay() {
                  if (timerDisplay == null) return;
                  if (countdownRunning && getCountdownRemaining() <= 0) {
                      countdownRunning = false; countdownElapsed = countdownDuration;
                      buzz(); showStatus("\u5012\u8ba1\u65f6\u7ed3\u675f");
                  }
                  boolean stopwatch = "stopwatch".equals(timerMode);
                  stopwatchTab.setAlpha(stopwatch ? 1f : 0.55f);
                  countdownTab.setAlpha(stopwatch ? 0.55f : 1f);
                  if (stopwatch) {
                      timerDisplay.setText(formatTenths(getStopwatchElapsed()));
                      timerStartPause.setText(stopwatchRunning ? "\u6682\u505c" : getStopwatchElapsed() > 0 ? "\u7ee7\u7eed" : "\u5f00\u59cb");
                  } else {
                      timerDisplay.setText(formatTenths(getCountdownRemaining()));
                      timerStartPause.setText(countdownRunning ? "\u6682\u505c" : getCountdownElapsed() > 0 && getCountdownRemaining() > 0 ? "\u7ee7\u7eed" : "\u5f00\u59cb");
                  }
              }
          
