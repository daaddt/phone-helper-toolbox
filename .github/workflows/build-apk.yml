          package com.trae.phonehelper;

          import java.time.DayOfWeek;
          import java.time.LocalDate;
          import java.time.LocalDateTime;
          import java.time.LocalTime;
          import java.time.ZoneId;
          import java.time.ZonedDateTime;

          public class AlarmUtils {
              /**
               * 统一的闹钟下次触发时间计算。
               * 使用 java.time API，正确处理跨时区和夏令时切换。
               *
               * @param hour       闹钟小时（0-23）
               * @param minute     闹钟分钟（0-59）
               * @param repeatDays 重复日期字符串，如 "0,1,2,3,4"（周一到周五），周一=0，周日=6
               *                   空字符串或 null 表示不重复（仅响一次）
               * @return 下次闹钟触发的毫秒时间戳
               */
              public static long nextAlarmTime(int hour, int minute, String repeatDays) {
                  LocalTime target = LocalTime.of(hour, minute);
                  ZoneId zone = ZoneId.systemDefault();
                  LocalDateTime now = LocalDateTime.now(zone);
                  LocalDate today = now.toLocalDate();
                  LocalDateTime candidate = LocalDateTime.of(today, target);

                  if (repeatDays != null && !repeatDays.trim().isEmpty()) {
                      // 有重复日期：从今天开始往后找 7 天内最近的匹配日
                      for (int d = 0; d <= 7; d++) {
                          LocalDate checkDate = today.plusDays(d);
                          DayOfWeek dow = checkDate.getDayOfWeek();
                          int dayIndex = (dow.getValue() + 5) % 7; // DayOfWeek.MONDAY=1 → 0, SUNDAY=7 → 6
                          if (repeatDays.contains(String.valueOf(dayIndex))) {
                              LocalDateTime check = LocalDateTime.of(checkDate, target);
                              if (check.isAfter(now)) {
                                  return ZonedDateTime.of(check, zone).toInstant().toEpochMilli();
                              }
                          }
                      }
                  }

                  // 不重复或没找到匹配日：如果今天的时间已过，推迟到明天
                  if (!candidate.isAfter(now)) {
                      candidate = candidate.plusDays(1);
                  }
                  return ZonedDateTime.of(candidate, zone).toInstant().toEpochMilli();
              }
          }

