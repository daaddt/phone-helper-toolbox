                          GradientDrawable.Orientation.LEFT_RIGHT,
                          new int[]{Color.rgb(14, 165, 233), Color.rgb(16, 185, 129)}
                  );
                  bg.setCornerRadius(28);
                  dismiss.setBackground(bg);
                  dismiss.setOnClickListener(v -> finish());
                  root.addView(dismiss, new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                  ));
          
                  setContentView(root);
                  startAlarmSound(toneUri);
                  handler.postDelayed(this::finish, 120000);
              }
          
              private void startAlarmSound(String toneUri) {
                  try {
                      Uri uri = toneUri == null || toneUri.isEmpty()
                              ? RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM)
                              : Uri.parse(toneUri);
                      ringtone = RingtoneManager.getRingtone(this, uri);
                      if (ringtone != null) ringtone.play();
                  } catch (Exception ignored) {}
                  try {
                      vibrator = (Vibrator) getSystemService(VIBRATOR_SERVICE);
                      if (vibrator != null) {
                          vibrator.vibrate(new long[]{0, 800, 500, 800, 500, 800}, 0);
                      }
                  } catch (Exception ignored) {}
              }
          
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacksAndMessages(null);
                  try {
                      if (ringtone != null && ringtone.isPlaying()) ringtone.stop();
                  } catch (Exception ignored) {}
                  try {
                      if (vibrator != null) vibrator.cancel();
                  } catch (Exception ignored) {}
                  int alarmId = getIntent().getIntExtra("alarmId", 0);
                  NotificationManager manager = (NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager != null && alarmId != 0) manager.cancel(alarmId);
              }
          }
