              private void addLink() {
                  String title = linkTitleInput.getText().toString().trim();
                  String url = linkUrlInput.getText().toString().trim();
                  if (title.isEmpty() || url.isEmpty()) { toast("\u6807\u9898\u548c\u7f51\u5740\u90fd\u8981\u586b\u5199"); return; }
                  if (!url.startsWith("http://") && !url.startsWith("https://")) url = "https://" + url;
                  JSONArray array = loadArray("links");
                  try {
                      JSONObject obj = new JSONObject();
                      obj.put("title", title); obj.put("url", url);
                      if (editingLinkIndex >= 0 && editingLinkIndex < array.length()) array.put(editingLinkIndex, obj);
                      else array.put(obj);
                      saveArray("links", array);
                  } catch (Exception ignored) {}
                  boolean edited = editingLinkIndex >= 0;
                  linkTitleInput.setText(""); linkUrlInput.setText("");
                  cancelLinkEditStateOnly();
                  renderLinks(); hideKeyboard();
                  showStatus(edited ? "\u5df2\u4fdd\u5b58\u5feb\u6377\u94fe\u63a5\u4fee\u6539" : "\u5df2\u6dfb\u52a0\u5feb\u6377\u94fe\u63a5");
              }
          
              private void renderLinks() {
                  if (linkList == null) return;
                  linkList.removeAllViews();
                  JSONArray array = loadArray("links");
                  for (int i = 0; i < array.length(); i++) {
                      try { linkList.addView(linkCard(i, array.getJSONObject(i))); } catch (Exception ignored) {}
                  }
              }
          
              private View linkCard(int index, JSONObject obj) {
                  LinearLayout card = card();
                  String title = obj.optString("title"); String url = obj.optString("url");
                  card.addView(text(title, 18, Color.WHITE));
                  card.addView(text(url, 13, Color.LTGRAY));
                  LinearLayout actions = row();
                  Button open = button("\u6253\u5f00"); Button copy = button("\u590d\u5236\u7f51\u5740"); Button edit = button("\u7f16\u8f91"); Button delete = button("\u5220\u9664");
                  LinearLayout sortActions = row();
                  Button up = button("\u4e0a\u79fb"); Button down = button("\u4e0b\u79fb");
                  open.setOnClickListener(v -> openUrl(url));
                  copy.setOnClickListener(v -> copyText(title + "\u7f51\u5740", url));
                  edit.setOnClickListener(v -> startLinkEdit(index, title, url));
                  delete.setOnClickListener(v -> {
                      if (editingLinkIndex == index) cancelLinkEditStateOnly();
                      removeItem("links", index); renderLinks();
                      showStatus("\u5df2\u5220\u9664\u5feb\u6377\u94fe\u63a5");
                  });
                  up.setEnabled(index > 0); down.setEnabled(index < loadArray("links").length() - 1);
                  up.setAlpha(index > 0 ? 1f : 0.45f); down.setAlpha(index < loadArray("links").length() - 1 ? 1f : 0.45f);
                  up.setOnClickListener(v -> moveItem("links", index, index - 1, "link"));
                  down.setOnClickListener(v -> moveItem("links", index, index + 1, "link"));
                  actions.addView(open, weight()); actions.addView(copy, weight()); actions.addView(edit, weight()); actions.addView(delete, weight());
                  card.addView(actions);
                  sortActions.addView(up, weight()); sortActions.addView(down, weight());
                  card.addView(sortActions);
                  return card;
              }
          
