          mkdir -p app/src/main/java/com/trae/phonehelper
          cat << 'FILEEOF' > app/src/main/java/com/trae/phonehelper/AlarmReceiver.java
          package com.trae.phonehelper;
          
          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.PowerManager;
          
          import org.json.JSONArray;
          import org.json.JSONObject;
          
          import java.util.Calendar;
          
          public class AlarmReceiver extends BroadcastReceiver {
              private static final String PREF = "phone_helper_pref";
          
              @Override
              public void onReceive(Context context, Intent intent) {
                  PowerManager pm = (PowerManager) context.getSystemService(Context.POWER_SERVICE);
                  PowerManager.WakeLock wl = pm.newWakeLock(
                      PowerManager.PARTIAL_WAKE_LOCK | PowerManager.ACQUIRE_CAUSES_WAKEUP,
                      "PhoneHelper:AlarmWakeLock"
                  );
                  wl.acquire(10000);
          
                  int alarmId = intent.getIntExtra("alarmId", 0);
                  JSONObject alarm = findAlarm(context, alarmId);
                  String label = alarm != null ? alarm.optString("label", "闹钟") : "闹钟";
                  String toneUri = alarm != null ? alarm.optString("toneUri", "") : "";
          
                  scheduleNextAlarm(context, alarmId, alarm);
          
                  Intent svc = new Intent(context, AlarmSoundService.class);
                  svc.putExtra("alarmId", alarmId);
                  svc.putExtra("label", label);
                  svc.putExtra("toneUri", toneUri);
                  try { context.startForegroundService(svc); } catch (Exception e) {}
          
                  Intent ring = new Intent(context, AlarmRingActivity.class);
                  ring.putExtra("alarmId", alarmId);
                  ring.putExtra("label", label);
                  ring.putExtra("toneUri", toneUri);
                  ring.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  try { context.startActivity(ring); } catch (Exception e) {}
          
                  wl.release();
              }
          
              private JSONObject findAlarm(Context context, int alarmId) {
                  try {
                      SharedPreferences pref = context.getSharedPreferences(PREF, Context.MODE_PRIVATE);
                      JSONArray alarms = new JSONArray(pref.getString("systemAlarms", "[]"));
                      for (int i = 0; i < alarms.length(); i++) {
                          JSONObject a = alarms.getJSONObject(i);
                          if (a.optInt("id", 0) == alarmId) return a;
                      }
                  } catch (Exception ignored) {}
                  return null;
              }
          
              private void scheduleNextAlarm(Context context, int alarmId, JSONObject alarm) {
                  if (alarm == null) return;
                  try {
                      SharedPreferences pref = context.getSharedPreferences(PREF, Context.MODE_PRIVATE);
                      JSONArray alarms = new JSONArray(pref.getString("systemAlarms", "[]"));
                      for (int i = 0; i < alarms.length(); i++) {
                          JSONObject a = alarms.getJSONObject(i);
                          if (a.optInt("id", 0) != alarmId) continue;
                          if (a.optBoolean("repeatDaily", false)) {
                              long nextAt = nextAlarmTime(a.optInt("hour", 7), a.optInt("minute", 0));
                              a.put("nextAt", nextAt);
                              alarms.put(i, a);
                              pref.edit().putString("systemAlarms", alarms.toString()).apply();
                              scheduleExactAlarm(context, a);
                          } else {
                              a.put("enabled", false);
                              alarms.put(i, a);
                              pref.edit().putString("systemAlarms", alarms.toString()).apply();
                          }
                          break;
                      }
                  } catch (Exception ignored) {}
              }
          
              private long nextAlarmTime(int hour, int minute) {
                  Calendar c = Calendar.getInstance();
                  c.set(Calendar.HOUR_OF_DAY, hour);
                  c.set(Calendar.MINUTE, minute);
                  c.set(Calendar.SECOND, 0);
                  c.set(Calendar.MILLISECOND, 0);
                  c.add(Calendar.DAY_OF_MONTH, 1);
                  return c.getTimeInMillis();
              }
          
              public static void scheduleExactAlarm(Context context, JSONObject alarm) {
                  try {
                      AlarmManager am = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                      if (am == null) return;
                      int id = alarm.optInt("id", 0);
                      long nextAt = alarm.optLong("nextAt", 0);
                      if (id == 0 || nextAt == 0) return;
          
                      Intent intent = new Intent(context, AlarmReceiver.class);
                      intent.setAction("com.trae.phonehelper.ALARM_" + id);
                      intent.putExtra("alarmId", id);
                      PendingIntent pi = PendingIntent.getBroadcast(
                          context, id, intent,
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                      );
          
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                          if (am.canScheduleExactAlarms()) {
                              am.setAlarmClock(new AlarmManager.AlarmClockInfo(nextAt, pi), pi);
                          } else {
                              am.setAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, nextAt, pi);
                          }
                      } else {
                          am.setAlarmClock(new AlarmManager.AlarmClockInfo(nextAt, pi), pi);
                      }
                  } catch (Exception ignored) {}
              }
          }
          
          FILEEOF

