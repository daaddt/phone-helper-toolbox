                          pomoFocus = true; pomoDuration = pref.getInt("pomoFocusMin", 25) * 60 * 1000L; pomoElapsed = 0;
                          pomoRunning = autoLoop;
                          if (autoLoop) pomoStartedAt = SystemClock.elapsedRealtime();
                          showStatus(autoLoop ? "\u4f11\u606f\u7ed3\u675f\uff0c\u5df2\u5f00\u59cb\u4e0b\u4e00\u8f6e\u4e13\u6ce8" : "\u4f11\u606f\u7ed3\u675f\uff0c\u7b49\u5f85\u624b\u52a8\u5f00\u59cb\u4e0b\u4e00\u8f6e");
                      }
                      savePomoState();
                  }
                  pomoDisplay.setText(formatMinutes(getPomoRemaining()));
                  pomoStateText.setText((pomoFocus ? "\u4e13\u6ce8" : "\u4f11\u606f") + (pomoRunning ? "\u4e2d" : "\u5df2\u6682\u505c/\u5f85\u5f00\u59cb"));
