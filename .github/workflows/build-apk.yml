          package com.trae.phonehelper;

          import android.content.Context;
          import android.media.AudioManager;
          import android.media.ToneGenerator;
          import android.os.Vibrator;

          public class FeedbackHelper {
              private static FeedbackHelper instance;
              private final Context context;
              private final Vibrator vibrator;
              private final ToneGenerator toneGenerator;
              private boolean soundEnabled = true;
              private boolean vibrationEnabled = true;

              private FeedbackHelper(Context context) {
                  this.context = context.getApplicationContext();
                  this.vibrator = (Vibrator) this.context.getSystemService(Context.VIBRATOR_SERVICE);
                  this.toneGenerator = new ToneGenerator(AudioManager.STREAM_MUSIC, 80);
              }

              public static synchronized FeedbackHelper getInstance(Context context) {
                  if (instance == null) {
                      instance = new FeedbackHelper(context);
                  }
                  return instance;
              }

              public void playSuccess() {
                  if (!soundEnabled || toneGenerator == null) return;
                  try {
                      toneGenerator.startTone(ToneGenerator.TONE_CDMA_ALERT_CALL_GUARD, 200);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              public void playFailure() {
                  if (!soundEnabled || toneGenerator == null) return;
                  try {
                      toneGenerator.startTone(ToneGenerator.TONE_CDMA_NO_CALL_WAITING, 300);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              public void playClick() {
                  if (!soundEnabled || toneGenerator == null) return;
                  try {
                      toneGenerator.startTone(ToneGenerator.TONE_CDMA_KEYPAD_VOLUME_KEY_LITE, 50);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              public void vibrateShort() {
                  if (!vibrationEnabled || vibrator == null || !vibrator.hasVibrator()) return;
                  try {
                      vibrator.vibrate(50);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              public void vibrateMedium() {
                  if (!vibrationEnabled || vibrator == null || !vibrator.hasVibrator()) return;
                  try {
                      vibrator.vibrate(100);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              public void vibrateLong() {
                  if (!vibrationEnabled || vibrator == null || !vibrator.hasVibrator()) return;
                  try {
                      vibrator.vibrate(200);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              public void success() {
                  playSuccess();
                  vibrateShort();
              }

              public void failure() {
                  playFailure();
                  vibrateMedium();
              }

              public void click() {
                  playClick();
                  vibrateShort();
              }

              public void setSoundEnabled(boolean enabled) {
                  this.soundEnabled = enabled;
              }

              public void setVibrationEnabled(boolean enabled) {
                  this.vibrationEnabled = enabled;
              }

              public boolean isSoundEnabled() {
                  return soundEnabled;
              }

              public boolean isVibrationEnabled() {
                  return vibrationEnabled;
              }

              public void release() {
                  if (toneGenerator != null) {
                      toneGenerator.release();
                  }
              }
          }
