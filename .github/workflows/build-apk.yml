              private View systemAlarmCard(int index, JSONObject alarm) {
                  LinearLayout card = card();
                  boolean enabled = alarm.optBoolean("enabled", true);
                  String title = String.format(Locale.getDefault(), "%02d:%02d  %s",
                          alarm.optInt("hour", 7),
                          alarm.optInt("minute", 0),
                          alarm.optString("label", "闹钟"));
                  TextView titleView = text(title, 20, enabled ? Color.WHITE : Color.rgb(148, 163, 184));
                  titleView.setTypeface(Typeface.DEFAULT_BOLD);
                  card.addView(titleView);
                  String desc = (alarm.optBoolean("repeatDaily", false) ? "每天重复" : "响一次")
                          + " · " + (enabled ? "下次：" + formatAlarmTime(alarm.optLong("nextAt")) : "已关闭");
                  card.addView(text(desc, 14, Color.LTGRAY));
                  LinearLayout actions = row();
                  Button toggle = button(enabled ? "关闭" : "开启");
                  Button delete = button("删除");
                  toggle.setOnClickListener(v -> toggleSystemAlarm(index));
                  delete.setOnClickListener(v -> deleteSystemAlarm(index));
                  actions.addView(toggle, weight());
                  actions.addView(delete, weight());
                  card.addView(actions);
