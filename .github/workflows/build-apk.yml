              private Button quickTimerButton(String label, int minutes) {
                  Button b = button(label);
                  b.setOnClickListener(v -> {
                      timerMode = "countdown";
                      countdownDuration = minutes * 60 * 1000L;
                      countdownElapsed = 0; countdownRunning = false;
                      updateTimerDisplay(); saveTimerState();
                  });
                  return b;
              }

              private void setCountdownFromInput() {
                  int minutes = parseInt(timerMinuteInput.getText().toString(), 5);
                  int seconds = Math.max(0, Math.min(59, parseInt(timerSecondInput.getText().toString(), 0)));
                  countdownDuration = Math.max(1000L, (minutes * 60L + seconds) * 1000L);
                  countdownElapsed = 0; countdownRunning = false;
                  timerMode = "countdown";
                  updateTimerDisplay(); saveTimerState();
              }

              private void toggleTimer() {
                  if ("stopwatch".equals(timerMode)) {
                      if (stopwatchRunning) { stopwatchElapsed = getStopwatchElapsed(); stopwatchRunning = false; }
                      else { stopwatchRunning = true; stopwatchStartedAt = SystemClock.elapsedRealtime(); }
                  } else {
                      if (countdownRunning) { countdownElapsed = getCountdownElapsed(); countdownRunning = false; }
                      else {
                          if (getCountdownRemaining() <= 0) countdownElapsed = 0;
                          countdownRunning = true; countdownStartedAt = SystemClock.elapsedRealtime();
                      }
                  }
                  updateTimerDisplay(); saveTimerState();
              }

              private void resetTimer() {
                  if ("stopwatch".equals(timerMode)) { stopwatchRunning = false; stopwatchElapsed = 0; }
                  else { countdownRunning = false; countdownElapsed = 0; }
                  updateTimerDisplay(); saveTimerState();
              }

              private long getStopwatchElapsed() { return stopwatchRunning ? stopwatchElapsed + SystemClock.elapsedRealtime() - stopwatchStartedAt : stopwatchElapsed; }
              private long getCountdownElapsed() { return countdownRunning ? Math.min(countdownDuration, countdownElapsed + SystemClock.elapsedRealtime() - countdownStartedAt) : countdownElapsed; }
              private long getCountdownRemaining() { return Math.max(0, countdownDuration - getCountdownElapsed()); }

              private void updateTimerDisplay() {
                  if (timerDisplay == null) return;
                  if (countdownRunning && getCountdownRemaining() <= 0) {
                      countdownRunning = false; countdownElapsed = countdownDuration;
                      buzz(); showStatus("\u5012\u8ba1\u65f6\u7ed3\u675f");
                  }
                  boolean stopwatch = "stopwatch".equals(timerMode);
                  stopwatchTab.setAlpha(stopwatch ? 1f : 0.55f);
                  countdownTab.setAlpha(stopwatch ? 0.55f : 1f);
                  if (stopwatch) {
                      timerDisplay.setText(formatTenths(getStopwatchElapsed()));
                      timerStartPause.setText(stopwatchRunning ? "\u6682\u505c" : getStopwatchElapsed() > 0 ? "\u7ee7\u7eed" : "\u5f00\u59cb");
                  } else {
                      timerDisplay.setText(formatTenths(getCountdownRemaining()));
                      timerStartPause.setText(countdownRunning ? "\u6682\u505c" : getCountdownElapsed() > 0 && getCountdownRemaining() > 0 ? "\u7ee7\u7eed" : "\u5f00\u59cb");
                  }
              }

              private void applyPomoSettings() {
                  int focusMin = Math.max(1, Math.min(180, parseInt(pomoFocusInput.getText().toString(), 25)));
                  int restMin = Math.max(1, Math.min(60, parseInt(pomoRestInput.getText().toString(), 5)));
                  pref.edit()
                      .putInt(KEY_POMO_FOCUS_MIN, focusMin)
                      .putInt(KEY_POMO_REST_MIN, restMin)
                      .putBoolean(KEY_POMO_LOOP, pomoLoopCheck == null || pomoLoopCheck.isChecked())
                      .apply();
                  pomoFocus = true;
                  pomoRunning = false;
                  pomoDuration = focusMin * 60 * 1000L;
                  pomoElapsed = 0;
                  updatePomoDisplay();
                  showStatus("\u756a\u8304\u949f\u8bbe\u7f6e\u5df2\u5e94\u7528");
              }

              private void togglePomo() {
                  if (pomoRunning) { pomoElapsed = getPomoElapsed(); pomoRunning = false; }
                  else {
                      if (getPomoRemaining() <= 0) pomoElapsed = 0;
                      pomoRunning = true; pomoStartedAt = SystemClock.elapsedRealtime();
                  }
                  updatePomoDisplay(); savePomoState();
              }

              private void resetPomo() { pomoRunning = false; pomoFocus = true; pomoDuration = pref.getInt("pomoFocusMin", 25) * 60 * 1000L; pomoElapsed = 0; updatePomoDisplay(); savePomoState(); }

              private void finishOnePomo() {
                  increasePomoCount();
                  pomoFocus = false; pomoRunning = false;
                  pomoDuration = pref.getInt("pomoRestMin", 5) * 60 * 1000L; pomoElapsed = 0;
                  updatePomoDisplay(); savePomoState();
                  showStatus("\u5df2\u8bb0\u5f55\u5b8c\u6210 1 \u4e2a\u756a\u8304");
              }

              private long getPomoElapsed() { return pomoRunning ? Math.min(pomoDuration, pomoElapsed + SystemClock.elapsedRealtime() - pomoStartedAt) : pomoElapsed; }
              private long getPomoRemaining() { return Math.max(0, pomoDuration - getPomoElapsed()); }

              private void updatePomoDisplay() {
                  if (pomoDisplay == null) return;
                  if (pomoRunning && getPomoRemaining() <= 0) {
                      pomoElapsed = pomoDuration; buzz();
                      if (pomoFocus) {
                          increasePomoCount(); pomoFocus = false;
                          pomoDuration = pref.getInt("pomoRestMin", 5) * 60 * 1000L; pomoElapsed = 0;
                          pomoRunning = true; pomoStartedAt = SystemClock.elapsedRealtime();
                          showStatus("\u4e13\u6ce8\u5b8c\u6210\uff0c\u5f00\u59cb\u4f11\u606f\u5427");
                      } else {
                          boolean autoLoop = pref.getBoolean("pomoLoop", true);
                          pomoFocus = true; pomoDuration = pref.getInt("pomoFocusMin", 25) * 60 * 1000L; pomoElapsed = 0;
                          pomoRunning = autoLoop;
                          if (autoLoop) pomoStartedAt = SystemClock.elapsedRealtime();
                          showStatus(autoLoop ? "\u4f11\u606f\u7ed3\u675f\uff0c\u5df2\u5f00\u59cb\u4e0b\u4e00\u8f6e\u4e13\u6ce8" : "\u4f11\u606f\u7ed3\u675f\uff0c\u7b49\u5f85\u624b\u52a8\u5f00\u59cb\u4e0b\u4e00\u8f6e");
                      }
                      savePomoState();
                  }
                  pomoDisplay.setText(formatMinutes(getPomoRemaining()));
                  pomoStateText.setText((pomoFocus ? "\u4e13\u6ce8" : "\u4f11\u606f") + (pomoRunning ? "\u4e2d" : "\u5df2\u6682\u505c/\u5f85\u5f00\u59cb"));
                  pomoCountText.setText("\u4eca\u65e5\u5b8c\u6210 " + getTodayPomoCount() + " \u4e2a\u756a\u8304");
              }

              private void increasePomoCount() {
                  String today = today();
                  String savedDay = pref.getString(KEY_POMO_DAY, "");
                  int count = today.equals(savedDay) ? pref.getInt(KEY_POMO_COUNT, 0) : 0;
                  pref.edit().putString(KEY_POMO_DAY, today).putInt(KEY_POMO_COUNT, count + 1).apply();
              }

              private int getTodayPomoCount() {
                  String today = today();
                  return today.equals(pref.getString(KEY_POMO_DAY, "")) ? pref.getInt(KEY_POMO_COUNT, 0) : 0;
              }

              private String today() { return new SimpleDateFormat("yyyy-MM-dd", Locale.getDefault()).format(new Date()); }

              private void restoreTimerState() {
                  timerMode = pref.getString(KEY_TIMER_MODE, "stopwatch");
                  stopwatchElapsed = pref.getLong("stopwatchElapsed", 0);
                  stopwatchRunning = pref.getBoolean("stopwatchRunning", false);
                  countdownDuration = pref.getLong("countdownDuration", 5 * 60 * 1000L);
                  countdownElapsed = pref.getLong("countdownElapsed", 0);
                  countdownRunning = pref.getBoolean("countdownRunning", false);
                  long savedAt = pref.getLong("timerSavedAt", SystemClock.elapsedRealtime());
                  long delta = Math.max(0, SystemClock.elapsedRealtime() - savedAt);
                  if (stopwatchRunning) { stopwatchElapsed += delta; stopwatchStartedAt = SystemClock.elapsedRealtime(); }
                  if (countdownRunning) {
                      countdownElapsed = Math.min(countdownDuration, countdownElapsed + delta);
                      if (countdownElapsed >= countdownDuration) countdownRunning = false;
                      countdownStartedAt = SystemClock.elapsedRealtime();
                  }
              }

              private void saveTimerState() {
                  pref.edit().putString(KEY_TIMER_MODE, timerMode)
                        .putLong("stopwatchElapsed", getStopwatchElapsed()).putBoolean("stopwatchRunning", stopwatchRunning)
                        .putLong("countdownDuration", countdownDuration).putLong("countdownElapsed", getCountdownElapsed())
                        .putBoolean("countdownRunning", countdownRunning)
                        .putLong("timerSavedAt", SystemClock.elapsedRealtime()).apply();
              }

              private void restorePomoState() {
                  int focusMin = pref.getInt(KEY_POMO_FOCUS_MIN, 25);
                  int restMin = pref.getInt(KEY_POMO_REST_MIN, 5);
                  pomoFocus = pref.getBoolean("pomoFocus", true);
                  pomoDuration = pref.getLong("pomoDuration", (pomoFocus ? focusMin : restMin) * 60 * 1000L);
                  pomoElapsed = pref.getLong("pomoElapsed", 0);
                  pomoRunning = pref.getBoolean("pomoRunning", false);
                  long savedAt = pref.getLong("pomoSavedAt", SystemClock.elapsedRealtime());
                  long delta = Math.max(0, SystemClock.elapsedRealtime() - savedAt);
                  if (pomoRunning) {
                      pomoElapsed = Math.min(pomoDuration, pomoElapsed + delta);
                      if (pomoElapsed >= pomoDuration) pomoRunning = false;
                      pomoStartedAt = SystemClock.elapsedRealtime();
                  }
              }

              private void savePomoState() {
                  pref.edit().putBoolean("pomoFocus", pomoFocus).putLong("pomoDuration", pomoDuration)
                        .putLong("pomoElapsed", getPomoElapsed()).putBoolean("pomoRunning", pomoRunning)
                        .putLong("pomoSavedAt", SystemClock.elapsedRealtime()).apply();
              }

              private String formatTenths(long ms) {
                  long tenths = Math.max(0, ms) / 100;
                  long tenth = tenths % 10;
                  long totalSeconds = tenths / 10;
                  return String.format(Locale.getDefault(), "%02d:%02d.%d", totalSeconds / 60, totalSeconds % 60, tenth);
              }

              private String formatMinutes(long ms) {
                  long totalSeconds = Math.max(0, ms + 999) / 1000;
                  return String.format(Locale.getDefault(), "%02d:%02d", totalSeconds / 60, totalSeconds % 60);
              }

              private void sendAiMessage() {
                  String value = aiInput.getText().toString().trim();
                  if (value.isEmpty() || aiSending) return;
                  if (pref.getString(KEY_AI_API_KEY, "").trim().isEmpty()) {
                      showStatus("\u8bf7\u5148\u5728 AI\u8bbe\u7f6e \u91cc\u586b\u5199 API Key");
                      showPage("aiSettings");
                      return;
                  }
                  appendAiMessage("user", value);
                  aiInput.setText(""); hideKeyboard();
                  callAi(false);
              }

              private void testAiConnection() {
                  if (pref.getString(KEY_AI_API_KEY, "").trim().isEmpty()) {
                      showStatus("\u8bf7\u5148\u586b\u5199 API Key");
                      showPage("aiSettings");
                      return;
                  }
                  if (aiSending) { showStatus("AI \u56de\u590d\u4e2d\uff0c\u8bf7\u7b49\u5f85\u5b8c\u6210\u540e\u518d\u6d4b\u8bd5"); return; }
                  appendAiMessage("user", "\u8bf7\u7528\u4e00\u53e5\u8bdd\u56de\u590d\uff1a\u8fde\u63a5\u6d4b\u8bd5\u6210\u529f\u3002");
                  showPage("ai"); callAi(true);
              }

              private void callAi(boolean testMode) {
                  stopAiTypewriter();
                  aiCancelled = false;
                  aiSending = true; updateAiSendingUi();
                  showStatus(testMode ? "\u6b63\u5728\u6d4b\u8bd5 AI \u8fde\u63a5..." : "AI \u6b63\u5728\u601d\u8003...");
                  final String requestBody;
                  try { requestBody = buildAiRequestBody(); } catch (Exception e) {
                      showStatus("AI 设置需要检查：" + shortError(e.getMessage()));
                      aiSending = false; updateAiSendingUi(); return;
                  }
                  final int streamingIdx = appendAiMessage("assistant", "\u6b63\u5728\u601d\u8003...");
                  streamingAssistantIndex = streamingIdx;
                  startAiTypewriter(streamingIdx);
                  new Thread(() -> {
                      try {
                          String reply = requestAiCompletionStream(requestBody, delta -> runOnUiThread(() -> {
                              if (streamingIdx >= 0 && !delta.trim().isEmpty()) pushAiTypingTarget(delta);
                          }));
                          runOnUiThread(() -> {
                              if (aiCancelled) { aiSending = false; updateAiSendingUi(); return; }
                              boolean hasReply = reply != null && !reply.trim().isEmpty();
                              boolean safetyLike = hasReply && looksLikeSafetyReply(reply);
                              String finalText = hasReply ? withSafetyDiagnosisIfNeeded(reply) : buildAiEmptyReplyDiagnosis("模型返回了空内容。");
                              // 如果检测到安全回复，直接停止打字机并显示诊断，避免原始内容先浮现
                              if (safetyLike) {
                                  stopAiTypewriter();
                                  if (streamingIdx >= 0) updateAiMessage(streamingIdx, "assistant", finalText);
                                  else appendAiMessage("assistant", finalText);
                                  showStatus("AI 回复可能触发安全策略，已附加诊断提示");
                                  aiSending = false; streamingAssistantIndex = -1; updateAiSendingUi();
                                  saveAiMessages(); renderAiMessages();
                                  return;
                              }
                              finishAiTypewriter(finalText, () -> {
                                  showStatus(!hasReply ? "AI 没有返回有效内容，已给出诊断建议" : "AI 回复完成");
                                  aiSending = false; streamingAssistantIndex = -1; updateAiSendingUi();
                                  saveAiMessages();
                                  renderAiMessages();
                              });
                          });
                      } catch (Exception e) {
                          runOnUiThread(() -> {
                              if (aiCancelled) { aiSending = false; updateAiSendingUi(); return; }
                              stopAiTypewriter();
                              String fail = diagnoseAiException(e);
                              if (streamingIdx >= 0) updateAiMessage(streamingIdx, "assistant", fail);
                              else appendAiMessage("assistant", fail);
                              showStatus("AI 回复异常，已生成稳定诊断提示");
                              aiSending = false; streamingAssistantIndex = -1; updateAiSendingUi();
                          });
                      }
                  }).start();
              }

              private void updateAiSendingUi() {
                  if (aiSendButton == null) return;
                  aiSendButton.setEnabled(!aiSending);
                  aiSendButton.setText(aiSending ? "\u53d1\u9001\u4e2d..." : "\u53d1\u9001");
                  aiSendButton.setAlpha(aiSending ? 0.55f : 1f);
                  if (aiClearButton != null) {
                      aiClearButton.setVisibility(aiSending ? View.GONE : View.VISIBLE);
                  }
                  if (aiCancelButton != null) {
                      aiCancelButton.setVisibility(aiSending ? View.VISIBLE : View.GONE);
                  }
                  if (aiTestButton != null) {
                      aiTestButton.setEnabled(!aiSending);
                      aiTestButton.setAlpha(aiSending ? 0.55f : 1f);
                  }
              }

              private void startAiTypewriter(int index) {
                  aiTypingMessageIndex = index;
                  aiTypingTargetText = "";
                  aiTypingDisplayText = "";
                  aiTypingFinalText = "";
                  aiTypingFinished = false;
                  aiTypingActive = index >= 0;
                  aiTypingDoneAction = null;
                  aiTypingLastTargetAt = 0;
                  aiTypingStartedAt = SystemClock.elapsedRealtime();
                  aiSlowHintShown = false;
                  if (aiSlowHintView != null) aiSlowHintView.setVisibility(View.GONE);
                  handler.removeCallbacks(aiTypingTicker);
                  if (aiTypingActive) handler.postDelayed(aiTypingTicker, 260);
              }

              private void pushAiTypingTarget(String fullText) {
                  if (!aiTypingActive || fullText == null) return;
                  if (fullText.length() >= aiTypingTargetText.length()) {
                      aiTypingTargetText = fullText;
                      aiTypingLastTargetAt = SystemClock.elapsedRealtime();
                      // AI 重新吐字时隐藏慢速提示，重置标志
                      if (aiSlowHintShown) {
                          aiSlowHintShown = false;
                          if (aiSlowHintView != null) aiSlowHintView.setVisibility(View.GONE);
                      }
                  }
              }

              private void finishAiTypewriter(String finalText, Runnable done) {
                  aiTypingFinalText = finalText == null ? "" : finalText;
                  aiTypingTargetText = aiTypingFinalText;
                  aiTypingFinished = true;
                  aiTypingDoneAction = done;
                  // 修复边界：如果打字机已被停止（aiTypingMessageIndex == -1），不再重新激活
                  if (!aiTypingActive && aiTypingMessageIndex >= 0) {
                      aiTypingActive = true;
                      handler.post(aiTypingTicker);
                  }
              }

              private void stopAiTypewriter() {
                  handler.removeCallbacks(aiTypingTicker);
                  aiTypingActive = false;
                  aiTypingFinished = false;
                  aiTypingTargetText = "";
                  aiTypingDisplayText = "";
                  aiTypingFinalText = "";
                  aiTypingMessageIndex = -1;
                  aiTypingDoneAction = null;
                  // 清理打字过程中可能残留的缓存视图，避免下次渲染时重用旧视图
                  aiBubbleViews.clear();
              }

              private void runAiTypingTick() {
                  if (!aiTypingActive || aiTypingMessageIndex < 0) return;
                  String target = aiTypingTargetText == null ? "" : aiTypingTargetText;
                  if (target.isEmpty()) {
                      // 等待数据时也检查8秒超时提示
                      long now = SystemClock.elapsedRealtime();
                      long lastActivity = aiTypingLastTargetAt > 0 ? aiTypingLastTargetAt : aiTypingStartedAt;
                      if (!aiSlowHintShown && lastActivity > 0 && now - lastActivity > 8000) {
                          aiSlowHintShown = true;
                          if (aiSlowHintView != null) aiSlowHintView.setVisibility(View.VISIBLE);
                      }
                      handler.postDelayed(aiTypingTicker, 180);
                      return;
                  }
                  if (aiTypingDisplayText.length() < target.length()) {
                      int nextLen = Math.min(target.length(), aiTypingDisplayText.length() + 1);
                      aiTypingDisplayText = target.substring(0, nextLen);
                      updateAiMessage(aiTypingMessageIndex, "assistant", aiTypingDisplayText);
                      long delay = 105;
                      if (aiTypingDisplayText.endsWith("\n")) delay = 220;
                      else if (aiTypingDisplayText.endsWith("。") || aiTypingDisplayText.endsWith("！") || aiTypingDisplayText.endsWith("？") || aiTypingDisplayText.endsWith(".") || aiTypingDisplayText.endsWith("!") || aiTypingDisplayText.endsWith("?")) delay = 320;
                      else if (aiTypingDisplayText.endsWith("，") || aiTypingDisplayText.endsWith("、") || aiTypingDisplayText.endsWith(",") || aiTypingDisplayText.endsWith(";") || aiTypingDisplayText.endsWith("；")) delay = 190;
                      handler.postDelayed(aiTypingTicker, delay);
                      return;
                  }
                  if (aiTypingFinished) {
                      if (!aiTypingFinalText.isEmpty() && !aiTypingFinalText.equals(aiTypingDisplayText)) {
                          aiTypingDisplayText = aiTypingFinalText;
                          updateAiMessage(aiTypingMessageIndex, "assistant", aiTypingDisplayText);
                      }
                      Runnable done = aiTypingDoneAction;
                      stopAiTypewriter();
                      if (done != null) done.run();
                  } else {
                      // 8秒后显示持久提示，直到用户点击取消
                      long now = SystemClock.elapsedRealtime();
                      long lastActivity = aiTypingLastTargetAt > 0 ? aiTypingLastTargetAt : aiTypingStartedAt;
                      if (!aiSlowHintShown && lastActivity > 0 && now - lastActivity > 8000) {
                          aiSlowHintShown = true;
                          if (aiSlowHintView != null) aiSlowHintView.setVisibility(View.VISIBLE);
                      }
                      handler.postDelayed(aiTypingTicker, 140);
                  }
              }

              private String buildAiRequestBody() throws Exception {
                  String apiUrl = pref.getString(KEY_AI_API_URL, "").trim();
                  String apiKey = pref.getString(KEY_AI_API_KEY, "").trim();
                  String model = pref.getString(KEY_AI_MODEL, "openrouter/free").trim();
                  String systemPrompt = pref.getString(KEY_AI_SYSTEM_PROMPT, "").trim();
                  if (apiUrl.isEmpty()) throw new Exception("API \u5730\u5740\u4e3a\u7a7a");
                  if (apiKey.isEmpty()) throw new Exception("API Key \u4e3a\u7a7a");
                  if (model.isEmpty()) throw new Exception("\u6a21\u578b\u540d\u4e3a\u7a7a");
                  JSONObject body = new JSONObject();
                  body.put("model", model);
                  JSONArray apiMessages = new JSONArray();
                  if (!systemPrompt.isEmpty()) {
                      JSONObject sys = new JSONObject();
                      sys.put("role", "system");
                      sys.put("content", systemPrompt);
                      apiMessages.put(sys);
                  }
                  int start = Math.max(0, aiMessages.length() - pref.getInt(KEY_AI_CONTEXT_ROUNDS, 8));
                  for (int i = start; i < aiMessages.length(); i++) {
                      apiMessages.put(aiMessages.getJSONObject(i));
                  }
                  body.put("messages", apiMessages);
                  body.put("temperature", 0.7);
                  body.put("stream", true);
                  return body.toString();
              }

              private String requestAiCompletionStream(String requestBody, AiStreamCallback callback) throws Exception {
                  String apiUrl = pref.getString(KEY_AI_API_URL, "").trim();
                  String apiKey = pref.getString(KEY_AI_API_KEY, "").trim();
                  HttpURLConnection conn = null;
                  try {
                      conn = (HttpURLConnection) new URL(apiUrl).openConnection();
                      conn.setRequestMethod("POST");
                      conn.setConnectTimeout(30000); conn.setReadTimeout(120000);
                      conn.setDoOutput(true);
                      conn.setRequestProperty("Content-Type", "application/json; charset=utf-8");
                      conn.setRequestProperty("Accept", "text/event-stream");
                      conn.setRequestProperty("Authorization", "Bearer " + apiKey);
                      try (OutputStream os = conn.getOutputStream()) { os.write(requestBody.getBytes(StandardCharsets.UTF_8)); }
                      int code = conn.getResponseCode();
                      InputStream stream = code >= 200 && code < 300 ? conn.getInputStream() : conn.getErrorStream();
                      if (code < 200 || code >= 300) {
                          String response = readAll(stream);
                          throw new Exception("HTTP_" + code + "\n" + limitText(response, 700));
                      }
                      StringBuilder full = new StringBuilder();
                      int emptyCount = 0, validCount = 0, malformedCount = 0; long lastUi = 0;
                      String finishReason = "";
                      BufferedReader br = new BufferedReader(new InputStreamReader(stream, StandardCharsets.UTF_8));
                      String line;
                      while ((line = br.readLine()) != null) {
                          if (aiCancelled) break;
                          line = line.trim();
                          if (line.isEmpty()) continue;
                          if (!line.startsWith("data:")) continue;
                          String data = line.substring(5).trim();
                          if ("[DONE]".equals(data)) break;
                          try {
                              JSONObject json = new JSONObject(data);
                              JSONArray choices = json.optJSONArray("choices");
                              if (choices == null || choices.length() == 0) { emptyCount++; continue; }
                              JSONObject choice = choices.getJSONObject(0);
                              finishReason = choice.optString("finish_reason", finishReason);
                              JSONObject delta = choice.optJSONObject("delta");
                              String piece = delta != null ? delta.optString("content", "") : "";
                              if (!piece.isEmpty()) {
                                  full.append(piece); validCount++;
                                  long now = SystemClock.elapsedRealtime();
                                  if (now - lastUi > 260) { callback.onDelta(full.toString()); lastUi = now; }
                              } else {
                                  emptyCount++;
                              }
                          } catch (Exception parseError) { malformedCount++; }
                      }
                      String result = full.toString();
                      if (!result.trim().isEmpty()) { callback.onDelta(result); return result; }
                      throw new Exception("EMPTY_STREAM empty=" + emptyCount + " valid=" + validCount + " malformed=" + malformedCount + " finish=" + finishReason);
                  } finally {
                      try { if (conn != null) conn.disconnect(); } catch (Exception ignored) {}
                  }
              }

              private interface AiStreamCallback { void onDelta(String fullText); }

              private String diagnoseAiException(Exception e) {
                  String raw = e == null || e.getMessage() == null ? "" : e.getMessage();
                  String lower = raw.toLowerCase(Locale.ROOT);
                  if (raw.startsWith("HTTP_401") || raw.startsWith("HTTP_403")) {
                      return "AI 回复异常：接口鉴权没有通过。\n\n建议检查：\n1. API Key 是否填写正确、是否过期。\n2. API 地址和模型是否属于同一个服务商。\n3. 当前 Key 是否有调用该模型的权限。\n\n原始信息：\n" + limitText(raw, 500);
                  }
                  if (raw.startsWith("HTTP_429")) {
                      return "AI 回复异常：接口限流或额度不足。\n\n建议稍后再试，或检查账号额度、免费模型限额、并发限制。\n\n原始信息：\n" + limitText(raw, 500);
                  }
                  if (raw.startsWith("HTTP_400")) {
                      return "AI 回复异常：请求参数可能不被当前模型接受。\n\n建议检查模型名称、API 地址，以及系统提示词或上下文是否过长。\n\n原始信息：\n" + limitText(raw, 500);
                  }
                  if (raw.startsWith("HTTP_5")) {
                      return "AI 回复异常：服务端暂时不可用或网关异常。\n\n建议稍后重试，或切换到更稳定的模型/接口。\n\n原始信息：\n" + limitText(raw, 500);
                  }
                  if (raw.startsWith("EMPTY_STREAM")) {
                      return buildAiEmptyReplyDiagnosis(raw);
                  }
                  if (lower.contains("timeout") || lower.contains("timed out")) {
                      return "AI 回复异常：连接或读取超时。\n\n建议检查网络状态，或稍后重试；如果模型响应很慢，可以换一个响应更快的模型。\n\n原始信息：\n" + limitText(raw, 500);
                  }
                  if (lower.contains("unknownhost") || lower.contains("failed to connect") || lower.contains("connection refused")) {
                      return "AI 回复异常：无法连接到接口地址。\n\n建议检查 API 地址是否正确、网络是否可用，以及接口服务是否在线。";
                  }
                  return "AI 回复异常：请求未能稳定完成。\n\n建议检查 API Key、API 地址、模型名称、网络状态后重试。\n\n原始信息：\n" + limitText(raw, 500);
              }

              private String buildAiEmptyReplyDiagnosis(String detail) {
                  return "AI 回复异常：模型没有返回可显示的正文。\n\n可能原因：\n1. 当前模型限流、额度不足，或服务端临时异常。\n2. 模型返回了空流，只有状态信息，没有正文内容。\n3. API 地址、模型名称与服务商不匹配。\n\n建议：\n先点“测试连接”，再检查 API Key、模型名和账号额度；如果仍然异常，可以换一个稳定模型后重试。\n\n诊断信息：\n" + limitText(detail, 500);
              }

              private int classifySafetyReply(String reply) {
                  if (reply == null) return 0;
                  String s = reply.toLowerCase(Locale.ROOT);
                  // 类型1：安全拦截（最高优先级，明确的安全检测标记）
                  if (s.contains("user safety") || s.contains("response safety") || s.contains("safety check")
                      || s.contains("blocked") || s.contains("disallowed")) return 1;
                  // 类型2：内容过滤（安全策略相关）
                  if (s.contains("安全策略") || s.contains("安全审查") || s.contains("内容违规") || s.contains("违反政策")
                      || s.contains("safety policy") || s.contains("content policy") || s.contains("usage policy")
                      || s.contains("unsafe")) return 2;
                  // 类型3：拒答模板（仅短文本，避免误判正常道歉）
                  if (reply.length() < 80 && (
                      s.contains("无法提供") || s.contains("不能提供") || s.contains("无法协助") || s.contains("不能协助")
                      || s.contains("i can't") || s.contains("i cannot") || s.contains("not able to"))) return 3;
                  return 0;
              }

              private boolean looksLikeSafetyReply(String reply) {
                  return classifySafetyReply(reply) > 0;
              }

              private String withSafetyDiagnosisIfNeeded(String reply) {
                  int type = classifySafetyReply(reply);
                  if (type == 0) return reply;
                  String header, suggestion;
                  if (type == 1) {
                      header = "诊断提示：模型返回了安全检测信息，回复可能被安全层拦截或过滤。";
                      suggestion = "建议：检查问题是否涉及敏感内容，或尝试更换模型。";
                  } else if (type == 2) {
                      header = "诊断提示：回复可能触发了内容安全策略，被拦截或改写。";
                      suggestion = "建议：尝试把问题写得更具体，减少容易被误判的词，或更换更宽松的模型。";
                  } else {
                      header = "诊断提示：模型拒绝回答该问题，可能触发拒答策略。";
                      suggestion = "建议：调整问题表述，或修改系统提示词让模型更偏向正常助手问答。";
                  }
                  return header + "\n\n" + suggestion + "\n\n原始 AI 回复：\n" + reply;
              }

              private String limitText(String value, int max) {
                  if (value == null) return "";
                  String v = value.trim();
                  if (v.length() <= max) return v;
                  return v.substring(0, max) + "...";
              }

              private String readAll(InputStream stream) throws Exception {
                  BufferedReader br = new BufferedReader(new InputStreamReader(stream, StandardCharsets.UTF_8));
                  StringBuilder sb = new StringBuilder(); String line; boolean first = true;
                  while ((line = br.readLine()) != null) { if (!first) sb.append('\n'); sb.append(line); first = false; }
                  return sb.toString();
              }

              private int appendAiMessage(String role, String content) {
                  try { JSONObject obj = new JSONObject(); obj.put("role", role); obj.put("content", content); aiMessages.put(obj); saveAiMessages(); renderAiMessages(); return aiMessages.length() - 1; } catch (Exception ignored) {}
                  return -1;
              }

              private void updateAiMessage(int index, String role, String content) {
                  try {
                      if (index < 0 || index >= aiMessages.length()) return;
                      // 打字过程中直接修改已有 JSONObject 的内容字段，避免创建新对象
                      JSONObject obj = aiMessages.getJSONObject(index);
                      obj.put("content", content);
                      boolean typing = aiTypingActive && index == aiTypingMessageIndex && "assistant".equals(role);
                      long now = SystemClock.elapsedRealtime();
                      // 打字过程中大幅减少 SharedPreferences 写入频率，完成后再一次性保存
                      if (!typing || now - aiLastSavedAt > 1800 || aiTypingFinished) {
                          saveAiMessages();
                          aiLastSavedAt = now;
                      }
                      // 打字时直接更新缓存视图的文本，不触发全量重建
                      if (typing) {
                          View cached = aiBubbleViews.get(index);
                          if (cached != null) {
                              TextView tv = cached.findViewWithTag("aiBubbleText_" + index);
                              if (tv != null) {
                                  tv.setText(content);
                                  if (tv.getParent() instanceof View) ((View) tv.getParent()).requestLayout();
                                  if ("ai".equals(currentPage) && aiMessageScroll != null) {
                                      aiMessageScroll.post(() -> { aiMessageScroll.smoothScrollTo(0, aiMessageList.getBottom()); reapplyAiKeyboardOffset(); });
                                  }
                                  return;
                              }
                          }
                      }
                      scheduleAiRender(typing);
                  } catch (Exception ignored) {}
              }

              private void scheduleAiRender(boolean relaxed) {
                  if (!relaxed) { renderAiMessages(); return; }
                  long now = SystemClock.elapsedRealtime();
                  long wait = Math.max(0, 90 - (now - aiLastRenderAt));
                  if (aiRenderScheduled) return;
                  aiRenderScheduled = true;
                  handler.postDelayed(() -> {
                      aiRenderScheduled = false;
                      aiLastRenderAt = SystemClock.elapsedRealtime();
                      renderAiMessages();
                  }, wait);
              }

              private void renderAiMessages() {
                  if (aiMessageList == null) return;
                  // 如果消息为空，直接清空列表和缓存，避免 canReuse 逻辑跳过清理
                  if (aiMessages.length() == 0) {
                      aiMessageList.removeAllViews();
                      aiBubbleViews.clear();
                      return;
                  }
                  // 如果消息数量没变且已有缓存视图，只更新文本内容，避免 removeAllViews 全量重建
                  boolean canReuse = aiMessages.length() == aiBubbleViews.size();
                  if (canReuse) {
                      boolean allMatch = true;
                      for (int i = 0; i < aiMessages.length(); i++) {
                          if (!aiBubbleViews.containsKey(i)) { allMatch = false; break; }
                      }
                      if (allMatch) {
                          for (int i = 0; i < aiMessages.length(); i++) {
                              try {
                                  JSONObject msg = aiMessages.getJSONObject(i);
                                  View cached = aiBubbleViews.get(i);
                                  if (cached != null) {
                                      TextView tv = cached.findViewWithTag("aiBubbleText_" + i);
                                      if (tv != null) tv.setText(msg.optString("content", ""));
                                  }
                              } catch (Exception ignored) {}
                          }
                          if ("ai".equals(currentPage) && aiMessageScroll != null) {
                              aiMessageScroll.post(() -> { aiMessageScroll.smoothScrollTo(0, aiMessageList.getBottom()); reapplyAiKeyboardOffset(); });
                          }
                          return;
                      }
                  }
                  aiMessageList.removeAllViews();
                  aiBubbleViews.clear();
                  for (int i = 0; i < aiMessages.length(); i++) {
                      try {
                          JSONObject msg = aiMessages.getJSONObject(i);
                          boolean streaming = aiSending && i == streamingAssistantIndex && "assistant".equals(msg.optString("role"));
                          View bubble = aiBubble(i, msg.optString("role"), msg.optString("content"), streaming);
                          aiBubbleViews.put(i, bubble);
                          aiMessageList.addView(bubble);
                      } catch (Exception ignored) {}
                  }
                  if ("ai".equals(currentPage) && aiMessageScroll != null) {
                      aiMessageScroll.post(() -> { aiMessageScroll.smoothScrollTo(0, aiMessageList.getBottom()); reapplyAiKeyboardOffset(); });
                  }
              }

              private void reapplyAiKeyboardOffset() {
                  if (aiInputArea == null || rootContainer == null) return;
                  if (!"ai".equals(currentPage)) return;
                  rootContainer.post(() -> {
                      Rect visible = new Rect(); rootContainer.getWindowVisibleDisplayFrame(visible);
                      int screenHeight = rootContainer.getRootView().getHeight();
                      int keyboardHeight = screenHeight - visible.bottom;
                      boolean keyboardOpen = keyboardHeight > screenHeight / 5;
                      adjustAiInputForKeyboard(visible, keyboardOpen);
                  });
              }

              private View aiBubble(int index, String role, String content, boolean streaming) {
                  boolean user = "user".equals(role);
                  LinearLayout wrap = new LinearLayout(this);
                  wrap.setOrientation(LinearLayout.VERTICAL);
                  wrap.setGravity(user ? Gravity.RIGHT : Gravity.LEFT);
                  String cleanContent = content == null ? "" : content.trim();
                  TextView tv = text((user ? "你\n" : "AI\n") + cleanContent, 15, Color.WHITE);
                  // 设置 tag 以便缓存查找时快速定位 TextView
                  tv.setTag("aiBubbleText_" + index);
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(user ? Color.rgb(14, 116, 144) : Color.rgb(24, 35, 52));
                  bg.setStroke(1, user ? Color.rgb(34, 211, 238) : Color.rgb(51, 65, 85));
                  bg.setCornerRadius(22);
                  tv.setBackground(bg);
                  tv.setPadding(18, 14, 18, 14);
                  tv.setLineSpacing(3, 1.05f);
                  try { tv.setMaxWidth((int)(getResources().getDisplayMetrics().widthPixels * 0.82f)); } catch (Exception ignored) {}
                  LinearLayout.LayoutParams tvLp = new LinearLayout.LayoutParams(LinearLayout.LayoutParams.WRAP_CONTENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                  wrap.addView(tv, tvLp);
                  if (!streaming) {
                      View.OnLongClickListener longClick = v -> { showAiMessageActions(index, role, content); return true; };
                      wrap.setOnLongClickListener(longClick);
                      tv.setOnLongClickListener(longClick);
                  }
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                  lp.setMargins(0, 6, 0, 10); wrap.setLayoutParams(lp);
                  return wrap;
              }

              private void showAiMessageActions(int index, String role, String content) {
                  boolean user = "user".equals(role);
                  String[] items = user
                      ? new String[]{"复制", "选取文字", "修改"}
                      : new String[]{"复制", "选取文字", "重新回复"};
                  new android.app.AlertDialog.Builder(this)
                      .setTitle(user ? "我的消息" : "AI 回复")
                      .setItems(items, (d, which) -> {
                          if (which == 0) copyText(user ? "我的消息" : "AI 回复", content);
                          else if (which == 1) showSelectableAiText(user ? "我的消息" : "AI 回复", content);
                          else if (user) editAiUserMessage(index, content);
                          else retryAiResponse(index);
                      })
                      .setNegativeButton("取消", null)
                      .show();
              }

              private void showSelectableAiText(String title, String content) {
                  TextView tv = new TextView(this);
                  tv.setText(content == null ? "" : content);
                  tv.setTextSize(16);
                  tv.setTextColor(Color.WHITE);
                  tv.setTextIsSelectable(true);
                  tv.setPadding(28, 24, 28, 24);
                  ScrollView scroll = new ScrollView(this);
                  scroll.addView(tv);
                  new android.app.AlertDialog.Builder(this)
                      .setTitle(title + "（可长按选取）")
                      .setView(scroll)
                      .setPositiveButton("复制全部", (d, w) -> copyText(title, content))
                      .setNegativeButton("关闭", null)
                      .show();
              }

              private void editAiUserMessage(int index, String content) {
                  if (aiSending) { showStatus("AI 正在回复，稍后再修改"); return; }
                  removeAiMessagesFrom(index);
                  aiInput.setText(content == null ? "" : content);
                  aiInput.setSelection(aiInput.getText().length());
                  showStatus("已放回输入框，可修改后重新发送");
                  renderAiMessages();
              }

              private void retryAiResponse(int index) {
                  if (aiSending) { showStatus("AI 正在回复，稍后再重新回复"); return; }
                  if (index <= 0) { showStatus("没有可重新回复的上文"); return; }
                  removeAiMessagesFrom(index);
                  showStatus("正在重新生成 AI 回复...");
                  renderAiMessages();
                  callAi(false);
              }

              private void removeAiMessagesFrom(int index) {
                  try {
                      JSONArray next = new JSONArray();
                      for (int i = 0; i < aiMessages.length(); i++) {
                          if (i < index) next.put(aiMessages.getJSONObject(i));
                      }
                      aiMessages = next;
                      saveAiMessages();
                  } catch (Exception ignored) {}
              }

              private void saveAiSettings() {
                  int rounds = 8;
                  try {
                      rounds = Integer.parseInt(contextRoundInput.getText().toString().trim());
                  } catch (Exception ignored) {}
                  rounds = Math.max(1, Math.min(32, rounds));
                  pref.edit()
                      .putString(KEY_AI_API_URL, apiUrlInput.getText().toString().trim())
                      .putString(KEY_AI_API_KEY, apiKeyInput.getText().toString().trim())
                      .putString(KEY_AI_MODEL, modelInput.getText().toString().trim())
                      .putString(KEY_AI_SYSTEM_PROMPT, systemPromptInput.getText().toString().trim())
                      .putInt(KEY_AI_CONTEXT_ROUNDS, rounds)
                      .apply();
              }

              private void fillDefaultAiSettings() {
                  apiUrlInput.setText("https://openrouter.ai/api/v1/chat/completions");
                  modelInput.setText("openrouter/free");
                  contextRoundInput.setText("8");
                  if (systemPromptInput.getText().toString().trim().isEmpty()) {
                      systemPromptInput.setText("\u4f60\u662f\u4e00\u4e2a\u8010\u5fc3\u3001\u6709\u903b\u8f91\u3001\u8bf4\u4e2d\u6587\u7684\u667a\u80fd\u52a9\u624b\u3002\u56de\u7b54\u8981\u6e05\u6670\u3001\u5b9e\u7528\u3001\u4e0d\u8fc7\u5ea6\u541b\u541b\u3002");
                  }
                  showStatus("\u5df2\u586b\u5165 OpenRouter \u514d\u8d39\u6a21\u578b\u9ed8\u8ba4\u914d\u7f6e");
              }

              private void loadAiMessages() {
                  try {
                      aiMessages = new JSONArray(pref.getString(KEY_AI_MESSAGES, "[]"));
                  } catch (Exception e) {
                      aiMessages = new JSONArray();
                  }
              }

              private void saveAiMessages() {
                  pref.edit().putString(KEY_AI_MESSAGES, aiMessages.toString()).apply();
              }

              private String shortError(String value) {
                  if (value == null) return "\u672a\u77e5\u9519\u8bef";
                  String cleaned = value.replace("\n", " ").trim();
                  return cleaned.length() > 500 ? cleaned.substring(0, 500) + "..." : cleaned;
              }

