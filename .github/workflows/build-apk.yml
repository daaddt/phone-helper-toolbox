          </manifest>
          
          FILEEOF

          mkdir -p app/src/main/java/com/trae/phonehelper
          cat << 'FILEEOF' > app/src/main/java/com/trae/phonehelper/AlarmReceiver.java
          package com.trae.phonehelper;

          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;

          import org.json.JSONArray;
          import org.json.JSONObject;

          public class AlarmReceiver extends BroadcastReceiver {
              private static final String PREF = "phone_helper_pref";
              private static final String KEY_SYSTEM_ALARMS = "systemAlarms";
              private static final String ACTION_ALARM_PREFIX = "com.trae.phonehelper.ALARM_";
              private static final String EXTRA_ALARM_ID = "alarmId";
              private static final String EXTRA_LABEL = "label";
              private static final String EXTRA_TONE_URI = "toneUri";
              private static final String DEFAULT_LABEL = "闹钟";

              @Override
              public void onReceive(Context context, Intent intent) {
                  int alarmId = intent.getIntExtra(EXTRA_ALARM_ID, 0);
                  JSONObject alarm = findAlarmById(context, alarmId);
                  String label = alarm != null ? alarm.optString("label", DEFAULT_LABEL) : DEFAULT_LABEL;
                  String toneUri = alarm != null ? alarm.optString("toneUri", "") : "";

                  scheduleNextAlarm(context, alarmId, alarm);

                  startAlarmSoundService(context, alarmId, label, toneUri);
                  startAlarmRingActivity(context, alarmId, label, toneUri);
              }

              private JSONObject findAlarmById(Context context, int alarmId) {
                  SharedPreferences pref = context.getSharedPreferences(PREF, Context.MODE_PRIVATE);
                  JSONArray alarms = loadAlarms(pref);
                  for (int i = 0; i < alarms.length(); i++) {
                      JSONObject alarm = alarms.optJSONObject(i);
                      if (alarm != null && alarm.optInt("id", 0) == alarmId) {
                          return alarm;
                      }
                  }
                  return null;
              }

              private void scheduleNextAlarm(Context context, int alarmId, JSONObject alarm) {
                  if (alarm == null) return;

                  SharedPreferences pref = context.getSharedPreferences(PREF, Context.MODE_PRIVATE);
                  JSONArray alarms = loadAlarms(pref);

                  for (int i = 0; i < alarms.length(); i++) {
                      JSONObject a = alarms.optJSONObject(i);
                      if (a == null || a.optInt("id", 0) != alarmId) continue;

                      String repeatDays = a.optString("repeatDays", "");
                      boolean hasRepeat = a.optBoolean("repeatDaily", false) || !repeatDays.isEmpty();

                      try {
                          if (hasRepeat) {
                              long nextAt = AlarmUtils.nextAlarmTime(
                                  a.optInt("hour", 7),
                                  a.optInt("minute", 0),
                                  repeatDays
                              );
                              a.put("nextAt", nextAt);
                              alarms.put(i, a);
                              saveAlarms(pref, alarms);
                              scheduleExactAlarm(context, a);
                          } else {
                              a.put("enabled", false);
                              alarms.put(i, a);
                              saveAlarms(pref, alarms);
                          }
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                      break;
                  }
              }

              private void startAlarmSoundService(Context context, int alarmId, String label, String toneUri) {
                  Intent svc = new Intent(context, AlarmSoundService.class);
                  svc.putExtra(EXTRA_ALARM_ID, alarmId);
                  svc.putExtra(EXTRA_LABEL, label);
                  svc.putExtra(EXTRA_TONE_URI, toneUri);
                  try {
                      context.startForegroundService(svc);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              private void startAlarmRingActivity(Context context, int alarmId, String label, String toneUri) {
                  Intent ring = new Intent(context, AlarmRingActivity.class);
                  ring.putExtra(EXTRA_ALARM_ID, alarmId);
                  ring.putExtra(EXTRA_LABEL, label);
                  ring.putExtra(EXTRA_TONE_URI, toneUri);
                  ring.addFlags(
                      Intent.FLAG_ACTIVITY_NEW_TASK
                      | Intent.FLAG_ACTIVITY_CLEAR_TOP
                      | Intent.FLAG_ACTIVITY_SINGLE_TOP
                      | Intent.FLAG_ACTIVITY_EXCLUDE_FROM_RECENTS
                  );
                  try {
                      context.startActivity(ring);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              public static void scheduleExactAlarm(Context context, JSONObject alarm) {
                  AlarmManager am = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (am == null) return;

                  int id = alarm.optInt("id", 0);
                  long nextAt = alarm.optLong("nextAt", 0);
                  if (id == 0 || nextAt == 0) return;

                  Intent intent = new Intent(context, AlarmReceiver.class);
                  intent.setAction(ACTION_ALARM_PREFIX + id);
                  intent.putExtra(EXTRA_ALARM_ID, id);

                  int flags = PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE;
                  PendingIntent pi = PendingIntent.getBroadcast(context, id, intent, flags);

                  setAlarm(am, nextAt, pi);
              }

              private static void setAlarm(AlarmManager am, long nextAt, PendingIntent pi) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      if (am.canScheduleExactAlarms()) {
                          am.setAlarmClock(new AlarmManager.AlarmClockInfo(nextAt, pi), pi);
                      } else {
                          am.setAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, nextAt, pi);
                      }
                  } else {
                      am.setAlarmClock(new AlarmManager.AlarmClockInfo(nextAt, pi), pi);
                  }
              }

              private static JSONArray loadAlarms(SharedPreferences pref) {
                  try {
                      return new JSONArray(pref.getString(KEY_SYSTEM_ALARMS, "[]"));
                  } catch (Exception e) {
                      e.printStackTrace();
                      return new JSONArray();
                  }
              }

              private static void saveAlarms(SharedPreferences pref, JSONArray alarms) {
                  pref.edit().putString(KEY_SYSTEM_ALARMS, alarms.toString()).apply();
              }
          }


          FILEEOF

          mkdir -p app/src/main/java/com/trae/phonehelper
          cat << 'FILEEOF' > app/src/main/java/com/trae/phonehelper/AlarmRingActivity.java
          package com.trae.phonehelper;

          import android.app.Activity;
          import android.app.AlarmManager;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.WindowManager;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;

          public class AlarmRingActivity extends Activity {
              private static final String EXTRA_ALARM_ID = "alarmId";
              private static final String EXTRA_LABEL = "label";
              private static final String ACTION_ALARM_SNOOZE_PREFIX = "com.trae.phonehelper.ALARM_SNOOZE_";
              private static final String DEFAULT_LABEL = "闹钟";
              private static final String TITLE_TEXT = "闹钟响了";
              private static final String SNOOZE_TEXT = "延迟 10 分钟";
              private static final String DISMISS_TEXT = "关闭闹钟";
              private static final long AUTO_DISMISS_DELAY_MS = 180000L;
              private static final long SNOOZE_DELAY_MS = 10 * 60 * 1000L;
              private static final int SNOOZE_REQUEST_CODE_OFFSET = 900000;

              private final Handler handler = new Handler(Looper.getMainLooper());
              private int alarmId = 1;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setupWindowFlags();
                  setupKeyguard();

                  alarmId = getIntent().getIntExtra(EXTRA_ALARM_ID, 1);
                  String label = getIntent().getStringExtra(EXTRA_LABEL);
                  if (label == null || label.trim().isEmpty()) {
                      label = DEFAULT_LABEL;
                  }

                  setContentView(buildRootLayout(label));
                  scheduleAutoDismiss();
              }

              private void setupWindowFlags() {
                  getWindow().addFlags(
                      WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED
                      | WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON
                      | WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON
                      | WindowManager.LayoutParams.FLAG_DISMISS_KEYGUARD
                      | WindowManager.LayoutParams.FLAG_ALLOW_LOCK_WHILE_SCREEN_ON
                  );
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O_MR1) {
                      try {
                          setShowWhenLocked(true);
                          setTurnScreenOn(true);
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }
              }

              private void setupKeyguard() {
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                      try {
                          android.app.KeyguardManager km = (android.app.KeyguardManager) getSystemService(Context.KEYGUARD_SERVICE);
                          if (km != null) {
                              km.requestDismissKeyguard(this, null);
                          }
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }
              }

              private LinearLayout buildRootLayout(String label) {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER);
                  root.setPadding(48, 80, 48, 80);
                  root.setBackgroundColor(Color.rgb(7, 17, 31));

                  root.addView(buildTitleTextView());
                  root.addView(buildMessageTextView(label));
                  root.addView(buildActionRow());

                  return root;
              }

              private TextView buildTitleTextView() {
                  TextView title = new TextView(this);
                  title.setText(TITLE_TEXT);
                  title.setTextSize(40);
                  title.setTextColor(Color.WHITE);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setGravity(Gravity.CENTER);
                  return title;
              }

              private TextView buildMessageTextView(String label) {
                  TextView message = new TextView(this);
                  message.setText(label);
                  message.setTextSize(26);
                  message.setTextColor(Color.rgb(125, 211, 252));
                  message.setGravity(Gravity.CENTER);
                  message.setPadding(0, 32, 0, 48);
                  return message;
              }

              private LinearLayout buildActionRow() {
                  LinearLayout actionRow = new LinearLayout(this);
                  actionRow.setOrientation(LinearLayout.HORIZONTAL);
                  actionRow.setGravity(Gravity.CENTER);

                  Button snooze = buildSnoozeButton();
                  Button dismiss = buildDismissButton();

                  LinearLayout.LayoutParams leftParams = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f);
                  leftParams.setMargins(0, 0, 10, 0);
                  LinearLayout.LayoutParams rightParams = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f);
                  rightParams.setMargins(10, 0, 0, 0);

                  actionRow.addView(snooze, leftParams);
                  actionRow.addView(dismiss, rightParams);

                  return actionRow;
              }

              private Button buildSnoozeButton() {
                  Button snooze = new Button(this);
                  snooze.setText(SNOOZE_TEXT);
                  snooze.setTextSize(18);
                  snooze.setAllCaps(false);
                  snooze.setTextColor(Color.WHITE);

                  GradientDrawable bg = new GradientDrawable(
                      GradientDrawable.Orientation.LEFT_RIGHT,
                      new int[]{Color.rgb(99, 102, 241), Color.rgb(14, 165, 233)}
                  );
                  bg.setCornerRadius(28);
                  snooze.setBackground(bg);
                  snooze.setPadding(24, 18, 24, 18);
                  snooze.setOnClickListener(v -> snoozeAlarm());

                  return snooze;
              }

              private Button buildDismissButton() {
                  Button dismiss = new Button(this);
                  dismiss.setText(DISMISS_TEXT);
                  dismiss.setTextSize(20);
                  dismiss.setAllCaps(false);
                  dismiss.setTextColor(Color.WHITE);

                  GradientDrawable bg = new GradientDrawable(
                      GradientDrawable.Orientation.LEFT_RIGHT,
                      new int[]{Color.rgb(14, 165, 233), Color.rgb(16, 185, 129)}
                  );
                  bg.setCornerRadius(28);
                  dismiss.setBackground(bg);
                  dismiss.setPadding(32, 20, 32, 20);
                  dismiss.setOnClickListener(v -> dismissAlarm());

                  return dismiss;
              }

              private void scheduleAutoDismiss() {
                  handler.postDelayed(this::dismissAlarm, AUTO_DISMISS_DELAY_MS);
              }

              private void snoozeAlarm() {
                  AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                  if (am == null) {
                      dismissAlarm();
                      return;
                  }

                  try {
                      Intent intent = new Intent(this, AlarmReceiver.class);
                      intent.setAction(ACTION_ALARM_SNOOZE_PREFIX + alarmId);
                      intent.putExtra(EXTRA_ALARM_ID, alarmId);

                      int flags = PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE;
                      PendingIntent pi = PendingIntent.getBroadcast(
                          this,
                          alarmId + SNOOZE_REQUEST_CODE_OFFSET,
                          intent,
                          flags
                      );

                      long at = System.currentTimeMillis() + SNOOZE_DELAY_MS;

                      if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.S && !am.canScheduleExactAlarms()) {
                          am.setAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, at, pi);
                      } else {
                          am.setAlarmClock(new AlarmManager.AlarmClockInfo(at, pi), pi);
                      }
                  } catch (Exception e) {
                      e.printStackTrace();
                  }

                  dismissAlarm();
              }

              private void dismissAlarm() {
                  stopAlarmSoundService();
                  cancelNotification();
                  finish();
              }

              private void stopAlarmSoundService() {
                  try {
                      stopService(new Intent(this, AlarmSoundService.class));
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              private void cancelNotification() {
                  try {
                      NotificationManager manager = (NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE);
                      if (manager != null) {
                          manager.cancel(alarmId);
                      }
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacksAndMessages(null);
              }
          }


          FILEEOF

          mkdir -p app/src/main/java/com/trae/phonehelper
          cat << 'FILEEOF' > app/src/main/java/com/trae/phonehelper/AlarmSoundService.java
          package com.trae.phonehelper;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.media.AudioAttributes;
          import android.media.MediaPlayer;
          import android.media.RingtoneManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.IBinder;
          import android.os.PowerManager;
          import android.os.Vibrator;

          public class AlarmSoundService extends Service {
              private static final String CHANNEL_ID = "phone_helper_alarm";
              private static final String CHANNEL_NAME = "闹钟提醒";
              private static final String CHANNEL_DESCRIPTION = "手机助手工具箱闹钟提醒";
              private static final String EXTRA_ALARM_ID = "alarmId";
              private static final String EXTRA_LABEL = "label";
              private static final String EXTRA_TONE_URI = "toneUri";
              private static final String DEFAULT_LABEL = "闹钟";
              private static final String NOTIFICATION_TITLE = "闹钟响了";
              private static final int WAKE_LOCK_TIMEOUT_MS = 60000;
              private static final int NOTIFICATION_REQUEST_CODE_OFFSET = 200000;

              private static final long[] VIBRATE_PATTERN = {0, 900, 500, 900, 500, 900};
              private static final int VIBRATE_REPEAT_INDEX = 0;

              private MediaPlayer mediaPlayer;
              private Vibrator vibrator;
              private PowerManager.WakeLock wakeLock;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  int alarmId = extractAlarmId(intent);
                  String label = extractLabel(intent);
                  String toneUri = extractToneUri(intent);

                  startForeground(alarmId, buildNotification(alarmId, label));
                  acquireWakeLock();
                  startSound(toneUri);
                  startVibrate();

                  return START_NOT_STICKY;
              }

              private int extractAlarmId(Intent intent) {
                  if (intent == null) return 1;
                  int id = intent.getIntExtra(EXTRA_ALARM_ID, 1);
                  return Math.max(1, id);
              }

              private String extractLabel(Intent intent) {
                  if (intent == null) return DEFAULT_LABEL;
                  String label = intent.getStringExtra(EXTRA_LABEL);
                  return (label != null && !label.trim().isEmpty()) ? label : DEFAULT_LABEL;
              }

              private String extractToneUri(Intent intent) {
                  return intent != null ? intent.getStringExtra(EXTRA_TONE_URI) : "";
              }

              private Notification buildNotification(int alarmId, String label) {
                  createNotificationChannel();

                  Intent ringIntent = new Intent(this, AlarmRingActivity.class);
                  ringIntent.putExtra(EXTRA_ALARM_ID, alarmId);
                  ringIntent.putExtra(EXTRA_LABEL, label);
                  ringIntent.addFlags(
                      Intent.FLAG_ACTIVITY_NEW_TASK
                      | Intent.FLAG_ACTIVITY_CLEAR_TOP
                      | Intent.FLAG_ACTIVITY_SINGLE_TOP
                      | Intent.FLAG_ACTIVITY_EXCLUDE_FROM_RECENTS
                  );

                  int flags = PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE;
                  PendingIntent pendingIntent = PendingIntent.getActivity(
                      this,
                      alarmId + NOTIFICATION_REQUEST_CODE_OFFSET,
                      ringIntent,
                      flags
                  );

                  Notification.Builder builder = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                      ? new Notification.Builder(this, CHANNEL_ID)
                      : new Notification.Builder(this);

                  return builder
                      .setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                      .setContentTitle(NOTIFICATION_TITLE)
                      .setContentText(label)
                      .setContentIntent(pendingIntent)
                      .setFullScreenIntent(pendingIntent, true)
                      .setCategory(Notification.CATEGORY_ALARM)
                      .setVisibility(Notification.VISIBILITY_PUBLIC)
                      .setOngoing(true)
                      .setPriority(Notification.PRIORITY_MAX)
                      .setAutoCancel(false)
                      .build();
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.O) return;

                  NotificationManager manager = (NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager == null) return;

                  NotificationChannel channel = manager.getNotificationChannel(CHANNEL_ID);
                  if (channel != null) return;

                  channel = new NotificationChannel(CHANNEL_ID, CHANNEL_NAME, NotificationManager.IMPORTANCE_HIGH);
                  channel.setDescription(CHANNEL_DESCRIPTION);
                  channel.setLockscreenVisibility(Notification.VISIBILITY_PUBLIC);
                  channel.enableVibration(true);
                  manager.createNotificationChannel(channel);
              }

              private void acquireWakeLock() {
                  PowerManager pm = (PowerManager) getSystemService(Context.POWER_SERVICE);
                  if (pm == null) return;

                  wakeLock = pm.newWakeLock(
                      PowerManager.PARTIAL_WAKE_LOCK | PowerManager.ACQUIRE_CAUSES_WAKEUP,
                      "PhoneHelper:AlarmWakeLock"
                  );
                  wakeLock.acquire(WAKE_LOCK_TIMEOUT_MS);
              }

              private void startSound(String toneUri) {
                  Uri uri = resolveToneUri(toneUri);
                  if (uri == null) return;

                  try {
                      mediaPlayer = createMediaPlayer(uri);
                      mediaPlayer.start();
                  } catch (Exception firstError) {
                      firstError.printStackTrace();
                      try {
                          Uri fallbackUri = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                          if (fallbackUri != null) {
                              mediaPlayer = createMediaPlayer(fallbackUri);
                              mediaPlayer.start();
                          }
                      } catch (Exception fallbackError) {
                          fallbackError.printStackTrace();
                      }
                  }
              }

              private Uri resolveToneUri(String toneUri) {
                  if (toneUri == null || toneUri.isEmpty()) {
                      return RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                  }
                  try {
                      return Uri.parse(toneUri);
                  } catch (Exception e) {
                      e.printStackTrace();
                      return RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                  }
              }

              private MediaPlayer createMediaPlayer(Uri uri) throws Exception {
                  MediaPlayer player = new MediaPlayer();
                  player.setAudioAttributes(new AudioAttributes.Builder()
                      .setUsage(AudioAttributes.USAGE_ALARM)
                      .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                      .build());
                  player.setDataSource(this, uri);
                  player.setLooping(true);
                  player.prepare();
                  return player;
              }

              private void startVibrate() {
                  vibrator = (Vibrator) getSystemService(VIBRATOR_SERVICE);
                  if (vibrator != null && vibrator.hasVibrator()) {
                      try {
                          vibrator.vibrate(VIBRATE_PATTERN, VIBRATE_REPEAT_INDEX);
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  releaseMediaPlayer();
                  cancelVibrator();
                  releaseWakeLock();
              }

              private void releaseMediaPlayer() {
                  if (mediaPlayer != null) {
                      try {
                          mediaPlayer.stop();
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                      try {
                          mediaPlayer.release();
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                      mediaPlayer = null;
                  }
              }

              private void cancelVibrator() {
                  if (vibrator != null) {
                      try {
                          vibrator.cancel();
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                      vibrator = null;
                  }
              }

              private void releaseWakeLock() {
                  if (wakeLock != null && wakeLock.isHeld()) {
                      try {
                          wakeLock.release();
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                      wakeLock = null;
                  }
              }

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }
          }


