              private View alarmCard(JSONObject a, int index) {
                  LinearLayout card = card();
                  int hour = a.optInt("hour", 7);
                  int minute = a.optInt("minute", 0);
                  String label = a.optString("label", "\u95f0\u949f");
                  boolean enabled = a.optBoolean("enabled", true);
                  boolean repeat = a.optBoolean("repeatDaily", false);
                  String tone = a.optString("toneUri", "");
          
                  TextView time = text(String.format(Locale.getDefault(), "%02d:%02d", hour, minute) + (repeat ? " \u6bcf\u5929" : ""), 28, Color.WHITE);
                  time.setTypeface(Typeface.DEFAULT_BOLD);
                  card.addView(time);
                  card.addView(text(label + (tone.isEmpty() ? "\uff08\u7cfb\u7edf\u94f3\u58f0\uff09" : "\uff08\u81ea\u5b9a\u4e49\uff09"), 14, Color.LTGRAY));
          
                  LinearLayout btns = row();
                  CheckBox sw = new CheckBox(this);
                  sw.setChecked(enabled);
                  sw.setOnCheckedChangeListener((btn, chk) -> {
                      try {
                          a.put("enabled", chk);
                          JSONArray alarms = loadArray("systemAlarms");
                          alarms.put(index, a);
                          saveArray("systemAlarms", alarms);
                          if (chk) { AlarmReceiver.scheduleExactAlarm(MainActivity.this, a); }
                          else {
                              AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                              Intent intent = new Intent(this, AlarmReceiver.class);
                              intent.setAction("com.trae.phonehelper.ALARM_" + a.optInt("id"));
                              PendingIntent pi = PendingIntent.getBroadcast(this, a.optInt("id", 0), intent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                              if (am != null) am.cancel(pi);
                          }
                          showStatus(chk ? "\u95f0\u949f\u5df2\u5f00\u542f" : "\u95f0\u949f\u5df2\u5173\u95ed");
                          updateAlarmDisplay();
                      } catch (Exception ignored) {}
                  });
                  btns.addView(sw);
          
                  Button del = button("\u5220\u9664");
                  del.setOnClickListener(v -> {
                      try {
                          AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                          Intent intent = new Intent(this, AlarmReceiver.class);
                          intent.setAction("com.trae.phonehelper.ALARM_" + a.optInt("id"));
                          PendingIntent pi = PendingIntent.getBroadcast(this, a.optInt("id", 0), intent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                          if (am != null) am.cancel(pi);
                          JSONArray alarms = loadArray("systemAlarms");
                          JSONArray n = new JSONArray();
                          for (int j = 0; j < alarms.length(); j++) { if (j != index) n.put(alarms.get(j)); }
                          saveArray("systemAlarms", n);
                          renderAlarmList();
                          updateAlarmDisplay();
                          showStatus("\u95f0\u949f\u5df2\u5220\u9664");
                      } catch (Exception ignored) {}
                  });
                  btns.addView(del);
          
                  Button ringBtn = button("\u9009\u94f3\u58f0");
                  ringBtn.setOnClickListener(v -> showRingtonePicker(index));
                  btns.addView(ringBtn);
          
                  Button audioBtn = button("\u672c\u673a\u97f3\u4e50");
                  audioBtn.setOnClickListener(v -> showAudioPicker(index));
                  btns.addView(audioBtn);
          
                  card.addView(btns);
                  return card;
              }
          
