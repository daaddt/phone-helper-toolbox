              private void installKeyboardGuard() {
                  final View rootView = rootFrame;
                  rootView.getViewTreeObserver().addOnGlobalLayoutListener(() -> {
                      Rect visible = new Rect(); rootView.getWindowVisibleDisplayFrame(visible);
                      int screenHeight = rootView.getRootView().getHeight();
                      int keyboardHeight = Math.max(0, screenHeight - visible.bottom);
                      boolean keyboardOpen = keyboardHeight > screenHeight * 0.15f;
                      adjustAiInputForKeyboard(visible, keyboardOpen);
                      int bottomPadding = keyboardOpen ? keyboardHeight + 420 : rootBaseBottomPadding;
                      rootContainer.setPadding(rootContainer.getPaddingLeft(), rootContainer.getPaddingTop(), rootContainer.getPaddingRight(), bottomPadding);
                      if (keyboardOpen && !"ai".equals(currentPage) && getCurrentFocus() instanceof EditText) { rootScroll.postDelayed(() -> scrollFocusedInputIntoView(getCurrentFocus()), 80); }
                  });
              }

              private void adjustAiInputForKeyboard(Rect visible, boolean keyboardOpen) {
                  if (aiPage == null || aiInputArea == null) return;
                  if (!"ai".equals(currentPage) || !keyboardOpen) {
                      aiInputArea.setTranslationY(0);
                      aiPage.setPadding(aiPage.getPaddingLeft(), aiPage.getPaddingTop(), aiPage.getPaddingRight(), aiBaseBottomPadding);
                      return;
                  }
                  int screenHeight = rootFrame.getRootView().getHeight();
                  int keyboardHeight = Math.max(0, screenHeight - visible.bottom);
                  aiInputArea.setTranslationY(0);
                  aiPage.setPadding(aiPage.getPaddingLeft(), aiPage.getPaddingTop(), aiPage.getPaddingRight(), keyboardHeight + aiBaseBottomPadding + 18);
                  if (aiMessageScroll != null && aiMessageList != null) { aiMessageScroll.post(() -> aiMessageScroll.smoothScrollTo(0, aiMessageList.getBottom())); }
              }

              private void scrollFocusedInputIntoView(View view) {
                  if (view == null || rootScroll == null) return;
                  if ("ai".equals(currentPage)) { view.requestRectangleOnScreen(new Rect(0, 0, view.getWidth(), view.getHeight()), true); return; }
                  int[] scrollLoc = new int[2]; int[] viewLoc = new int[2];
                  rootScroll.getLocationOnScreen(scrollLoc); view.getLocationOnScreen(viewLoc);
                  int viewBottom = viewLoc[1] - scrollLoc[1] + view.getHeight();
                  Rect visible = new Rect(); rootScroll.getWindowVisibleDisplayFrame(visible);
                  int safeBottom = visible.bottom - scrollLoc[1] - 180;
                  if (viewBottom > safeBottom) { rootScroll.smoothScrollBy(0, viewBottom - safeBottom + 160); }
              }

              private LinearLayout card() {
                  LinearLayout card = new LinearLayout(this); card.setOrientation(LinearLayout.VERTICAL); card.setPadding(18, 16, 18, 16);
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(Color.rgb(17, 24, 39)); bg.setStroke(1, Color.rgb(39, 52, 73)); bg.setCornerRadius(24);
                  card.setBackground(bg);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) card.setElevation(2f);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                  lp.setMargins(0, 8, 0, 12); card.setLayoutParams(lp); return card;
              }

              private void clearSortVisuals(View view) {
                  if (view == null) return;
                  view.clearAnimation();
                  view.setScaleX(1f);
                  view.setScaleY(1f);
                  view.setTranslationX(0f);
                  view.setTranslationY(0f);
                  view.setAlpha(1f);
                  if (view instanceof android.view.ViewGroup) {
                      android.view.ViewGroup group = (android.view.ViewGroup) view;
                      for (int i = 0; i < group.getChildCount(); i++) clearSortVisuals(group.getChildAt(i));
                  }
              }

              private LinearLayout labelWrap(String label, View child) {
                  LinearLayout wrap = new LinearLayout(this); wrap.setOrientation(LinearLayout.VERTICAL);
                  wrap.addView(text(label, 14, Color.LTGRAY)); wrap.addView(child); return wrap;
              }

              private LinearLayout row() { LinearLayout row = new LinearLayout(this); row.setOrientation(LinearLayout.HORIZONTAL); row.setGravity(Gravity.CENTER); row.setPadding(0, 8, 0, 8); return row; }
              private LinearLayout page() { LinearLayout page = new LinearLayout(this); page.setOrientation(LinearLayout.VERTICAL); page.setPadding(20, 30, 20, 0); return page; }
              private LinearLayout.LayoutParams weight() { return new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f); }

              private int parseInt(String value, int fallback) { try { return Integer.parseInt(value.trim()); } catch (Exception e) { return fallback; } }

              private void hideKeyboard() { try { InputMethodManager imm = (InputMethodManager) getSystemService(Context.INPUT_METHOD_SERVICE); View view = getCurrentFocus(); if (imm != null && view != null) imm.hideSoftInputFromWindow(view.getWindowToken(), 0); } catch (Exception ignored) {} }

              private void buzz() { if (feedback != null) feedback.vibrateMedium(); }

              private void toast(String value) { Toast.makeText(this, value, Toast.LENGTH_SHORT).show(); }
          }


