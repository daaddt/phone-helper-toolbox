              private void scrollFocusedInputIntoView(View view) {
                  if (view == null || rootScroll == null) return;
                  if ("ai".equals(currentPage)) {
                      view.requestRectangleOnScreen(new Rect(0, 0, view.getWidth(), view.getHeight()), true);
                      return;
                  }
                  int[] scrollLocation = new int[2];
                  int[] viewLocation = new int[2];
                  rootScroll.getLocationOnScreen(scrollLocation);
                  view.getLocationOnScreen(viewLocation);
                  int viewBottom = viewLocation[1] - scrollLocation[1] + view.getHeight();
                  Rect visible = new Rect();
                  rootScroll.getWindowVisibleDisplayFrame(visible);
                  int safeBottom = visible.bottom - scrollLocation[1] - 180;
                  if (viewBottom > safeBottom) {
                      rootScroll.smoothScrollBy(0, viewBottom - safeBottom + 160);
                  }
              }
          
