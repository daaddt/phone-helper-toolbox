name: 构建手机助手工具箱 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 构建 Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 获取仓库
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 生成安卓项目源码
        shell: bash
        run: |
          set -e
          python3 -c "\nimport base64; \nopen('settings.gradle','wb').write(base64.b64decode('')); \nprint('wrote settings.gradle')" &&           python3 -c "\nimport base64; \nopen('build.gradle','wb').write(base64.b64decode('cGx1Z2lucyB7CiAgICBpZCAiY29tLmFuZHJvaWQuYXBwbGljYXRpb24iIHZlcnNpb24gIjguNS4yIiBhcHBseSBmYWxzZQp9Cg==')); \nprint('wrote build.gradle')" &&           python3 -c "\nimport base64; \nopen('gradle.properties','wb').write(base64.b64decode('b3JnLmdyYWRsZS5qdm1hcmdzPS1YbXgyMDQ4bSAtRGZpbGUuZW5jb2Rpbmc9VVRGLTgKYW5kcm9pZC51c2VBbmRyb2lkWD1mYWxzZQphbmRyb2lkLm5vblRyYW5zaXRpdmVSQ2xhc3M9dHJ1ZQo=')); \nprint('wrote gradle.properties')" &&           python3 -c "\nimport base64; \nimport os; os.makedirs('app', exist_ok=True);
          open('app/build.gradle','wb').write(base64.b64decode('')); \nprint('wrote app/build.gradle')" &&           python3 -c "\nimport base64; \nimport os; os.makedirs('app/src/main', exist_ok=True);
          open('app/src/main/AndroidManifest.xml','wb').write(base64.b64decode('')); \nprint('wrote app/src/main/AndroidManifest.xml')" &&           python3 -c "\nimport base64; \nimport os; os.makedirs('app/src/main/res/values', exist_ok=True);
          open('app/src/main/res/values/styles.xml','wb').write(base64.b64decode('')); \nprint('wrote app/src/main/res/values/styles.xml')" &&           python3 -c "\nimport base64; \nimport os; os.makedirs('app/src/main/java/com/trae/phonehelper', exist_ok=True);
          open('app/src/main/java/com/trae/phonehelper/MainActivity.java','wb').write(base64.b64decode('')); \nprint('wrote app/src/main/java/com/trae/phonehelper/MainActivity.java')" &&           python3 -c "\nimport base64; \nimport os; os.makedirs('app/src/main/java/com/trae/phonehelper', exist_ok=True);
          open('app/src/main/java/com/trae/phonehelper/AlarmReceiver.java','wb').write(base64.b64decode('')); \nprint('wrote app/src/main/java/com/trae/phonehelper/AlarmReceiver.java')" &&           python3 -c "\nimport base64; \nimport os; os.makedirs('app/src/main/java/com/trae/phonehelper', exist_ok=True);
          open('app/src/main/java/com/trae/phonehelper/AlarmSoundService.java','wb').write(base64.b64decode('')); \nprint('wrote app/src/main/java/com/trae/phonehelper/AlarmSoundService.java')" &&           python3 -c "\nimport base64; \nimport os; os.makedirs('app/src/main/java/com/trae/phonehelper', exist_ok=True);
          open('app/src/main/java/com/trae/phonehelper/AlarmRingActivity.java','wb').write(base64.b64decode('')); \nprint('wrote app/src/main/java/com/trae/phonehelper/AlarmRingActivity.java')" &&           python3 -c "\nimport base64; \nimport os; os.makedirs('app/src/main/java/com/trae/phonehelper', exist_ok=True);
          open('app/src/main/java/com/trae/phonehelper/BootReceiver.java','wb').write(base64.b64decode('')); \nprint('wrote app/src/main/java/com/trae/phonehelper/BootReceiver.java')"

      - name: 构建 APK
        run: gradle --no-daemon :app:assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-helper-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
