              private void requestAlarmPermissions() {
                  openAppPermissionSettings();
              }

              private void openAppPermissionSettings() {
                  try {
                      Intent i = new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS, Uri.parse("package:" + getPackageName()));
                      i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(i);
                      showStatus("已打开本软件的系统权限设置页");
                  } catch (Exception e) {
                      showAlarmPermissionCenter();
                      showStatus("请选择需要开启的系统权限");
                  }
              }

              private void showAlarmPermissionCenter() {
                  final String[] items = {"应用权限详情", "通知权限", "全屏通知/锁屏弹出", "精确闹钟权限", "电池优化设置", "悬浮窗权限"};
                  new android.app.AlertDialog.Builder(this)
                      .setTitle("权限设置")
                      .setMessage("可以随时进入系统设置，按需开启通知、精确闹钟、锁屏弹出、电池后台和悬浮窗相关权限。不同手机厂商的页面名称可能略有不同。")
                      .setItems(items, (d, which) -> {
                          try {
                              Intent i;
                              String pkg = getPackageName();
                              if (which == 0) {
                                  i = new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS, Uri.parse("package:" + pkg));
                              } else if (which == 1 && Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU && checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                                  requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, REQ_NOTIFICATIONS);
                                  return;
                              } else if (which == 1 && Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                  i = new Intent(Settings.ACTION_APP_NOTIFICATION_SETTINGS);
                                  i.putExtra(Settings.EXTRA_APP_PACKAGE, pkg);
                              } else if (which == 2 && Build.VERSION.SDK_INT >= 34) {
                                  i = new Intent(Settings.ACTION_MANAGE_APP_USE_FULL_SCREEN_INTENT);
                                  i.setData(Uri.parse("package:" + pkg));
                              } else if (which == 3 && Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                                  i = new Intent(Settings.ACTION_REQUEST_SCHEDULE_EXACT_ALARM);
                                  i.setData(Uri.parse("package:" + pkg));
                              } else if (which == 4 && Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                                  i = new Intent(Settings.ACTION_REQUEST_IGNORE_BATTERY_OPTIMIZATIONS);
                                  i.setData(Uri.parse("package:" + pkg));
                              } else if (which == 5 && Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                                  i = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + pkg));
                              } else {
                                  i = new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS, Uri.parse("package:" + pkg));
                              }
                              startActivity(i);
                          } catch (Exception e) {
                              try {
                                  Intent fallback = new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS, Uri.parse("package:" + getPackageName()));
                                  startActivity(fallback);
                              } catch (Exception ignored) {}
                          }
                      })
                      .setPositiveButton("关闭", null)
                      .show();
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] results) {
                  super.onRequestPermissionsResult(requestCode, permissions, results);
                  if (requestCode == REQ_NOTIFICATIONS && results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED) {
                      showStatus("\u901a\u77e5\u6743\u9650\u5df2\u5141\u8bb8");
                  }
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  saveTimerState();
                  savePomoState();
                  reconcileAlarmSchedules();
                  // 切到后台时停止排序自动滚动，避免内存泄漏和无效回调
                  stopSortAutoScroll();
                  // 保存分段复制输入内容
                  if (longTextInput != null) {
                      String text = longTextInput.getText().toString();
                      String size = splitSizeInput != null ? splitSizeInput.getText().toString() : "3000";
                      pref.edit().putString(KEY_SPLIT_INPUT_TEXT, text).putString(KEY_SPLIT_INPUT_SIZE, size).apply();
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  renderAlarmList();
                  reconcileAlarmSchedules();
                  updateAlarmDisplay();
                  // 如果 AI 还在发送，恢复打字机显示
                  if (aiSending && aiTypingActive && aiTypingMessageIndex >= 0) {
                      handler.removeCallbacks(aiTypingTicker);
                      handler.post(aiTypingTicker);
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  saveTimerState();
                  savePomoState();
                  reconcileAlarmSchedules();
                  handler.removeCallbacks(tick);
                  stopAiTypewriter();
                  stopSortAutoScroll();
                  aiCancelled = true;
              }

