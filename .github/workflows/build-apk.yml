              private void callAi(boolean testMode) {
                  aiSending = true;
                  updateAiSendingUi();
                  showStatus(testMode ? "正在测试 AI 连接..." : "AI 正在思考...");
                  final String requestBody;
                  try {
                      requestBody = buildAiRequestBody();
                      streamingAssistantIndex = appendAiMessage("assistant", "正在思考...");
                  } catch (Exception e) {
                      showStatus("AI 设置有问题：" + shortError(e.getMessage()));
                      aiSending = false;
                      updateAiSendingUi();
                      return;
                  }
                  new Thread(() -> {
                      try {
                          String reply = requestAiCompletionStream(requestBody, delta -> runOnUiThread(() -> {
                              if (streamingAssistantIndex >= 0 && !delta.trim().isEmpty()) {
                                  updateAiMessage(streamingAssistantIndex, "assistant", delta);
                              }
                          }));
                          runOnUiThread(() -> {
                              String safeReply = reply == null ? "" : reply.trim();
                              boolean hadContent = streamingAssistantIndex >= 0
                                      && aiMessages.length() > streamingAssistantIndex
                                      && !aiMessages.optJSONObject(streamingAssistantIndex).optString("content", "").trim().isEmpty();
                              if (streamingAssistantIndex >= 0) {
                                  if (!safeReply.isEmpty()) {
                                      updateAiMessage(streamingAssistantIndex, "assistant", reply);
                                  } else if (!hadContent) {
                                      updateAiMessage(streamingAssistantIndex, "assistant", "AI 回复异常：模型返回了空内容。可能原因：额度不足、模型限流或网络异常。建议检查 API 设置或稍后重试。");
                                  }
                              } else {
                                  appendAiMessage("assistant", safeReply.isEmpty() ? "AI 回复异常：模型返回了空内容。可能原因：额度不足、模型限流或网络异常。建议检查 API 设置或稍后重试。" : reply);
                              }
                              showStatus(safeReply.isEmpty() && !hadContent ? "AI 回复异常，请检查 API 状态" : "AI 回复完成");
                              aiSending = false;
                              streamingAssistantIndex = -1;
                              updateAiSendingUi();
                              renderAiMessages();
                          });
                      } catch (Exception e) {
                          runOnUiThread(() -> {
                              String fail = "请求失败：" + shortError(e.getMessage());
                              if (streamingAssistantIndex >= 0) {
                                  updateAiMessage(streamingAssistantIndex, "assistant", fail);
                              } else {
                                  appendAiMessage("assistant", fail);
                              }
                              showStatus("AI 请求失败，请检查 API 设置");
                              aiSending = false;
                              streamingAssistantIndex = -1;
                              updateAiSendingUi();
                          });
                      }
                  }).start();
              }
          
              private void updateAiSendingUi() {
                  if (aiSendButton == null) return;
                  aiSendButton.setEnabled(!aiSending);
                  aiSendButton.setText(aiSending ? "发送中..." : "发送");
                  aiSendButton.setAlpha(aiSending ? 0.55f : 1f);
              }
          
              private String buildAiRequestBody() throws Exception {
                  String apiUrl = pref.getString("aiApiUrl", "").trim();
                  String apiKey = pref.getString("aiApiKey", "").trim();
                  String model = pref.getString("aiModel", "openrouter/free").trim();
                  String systemPrompt = pref.getString("aiSystemPrompt", "").trim();
                  if (apiUrl.isEmpty()) throw new Exception("API 地址为空");
                  if (apiKey.isEmpty()) throw new Exception("API Key 为空");
                  if (model.isEmpty()) throw new Exception("模型名为空");
          
                  JSONObject body = new JSONObject();
                  body.put("model", model);
                  JSONArray apiMessages = new JSONArray();
                  if (!systemPrompt.isEmpty()) {
                      JSONObject sys = new JSONObject();
                      sys.put("role", "system");
                      sys.put("content", systemPrompt);
                      apiMessages.put(sys);
                  }
                  int start = Math.max(0, aiMessages.length() - 16);
                  for (int i = start; i < aiMessages.length(); i++) {
                      apiMessages.put(aiMessages.getJSONObject(i));
                  }
                  body.put("messages", apiMessages);
                  body.put("temperature", 0.7);
                  body.put("stream", true);
                  return body.toString();
              }
          
              private String requestAiCompletionStream(String requestBody, AiStreamCallback callback) throws Exception {
                  String apiUrl = pref.getString("aiApiUrl", "").trim();
                  String apiKey = pref.getString("aiApiKey", "").trim();
          
                  HttpURLConnection conn = (HttpURLConnection) new URL(apiUrl).openConnection();
                  conn.setRequestMethod("POST");
                  conn.setConnectTimeout(30000);
                  conn.setReadTimeout(120000);
                  conn.setDoOutput(true);
                  conn.setRequestProperty("Content-Type", "application/json; charset=utf-8");
                  conn.setRequestProperty("Accept", "text/event-stream");
                  conn.setRequestProperty("Authorization", "Bearer " + apiKey);
          
                  try (OutputStream os = conn.getOutputStream()) {
                      os.write(requestBody.getBytes(StandardCharsets.UTF_8));
                  }
          
                  int code = conn.getResponseCode();
                  InputStream stream = code >= 200 && code < 300 ? conn.getInputStream() : conn.getErrorStream();
                  if (code < 200 || code >= 300) {
                      String response = readAll(stream);
                      throw new Exception("HTTP " + code + "：" + response);
                  }
          
                  StringBuilder full = new StringBuilder();
                  StringBuilder raw = new StringBuilder();
                  int emptyChoicesCount = 0;
                  int validChunksCount = 0;
                  long lastUiUpdate = 0;
                  BufferedReader br = new BufferedReader(new InputStreamReader(stream, StandardCharsets.UTF_8));
                  String line;
                  while ((line = br.readLine()) != null) {
                      line = line.trim();
                      if (line.isEmpty()) continue;
                      if (!line.startsWith("data:")) {
                          raw.append(line);
                          continue;
                      }
                      String data = line.substring(5).trim();
                      if ("[DONE]".equals(data)) break;
                      try {
                          JSONObject json = new JSONObject(data);
                          JSONArray choices = json.optJSONArray("choices");
                          if (choices == null || choices.length() == 0) {
                              emptyChoicesCount++;
                              continue;
                          }
                          JSONObject choice = choices.getJSONObject(0);
                          JSONObject delta = choice.optJSONObject("delta");
                          String piece = delta != null ? delta.optString("content", "") : "";
                          if (!piece.isEmpty()) {
                              full.append(piece);
                              validChunksCount++;
                              long now = SystemClock.elapsedRealtime();
                              if (now - lastUiUpdate > 120) {
                                  callback.onDelta(full.toString());
                                  lastUiUpdate = now;
                              }
                          }
                      } catch (Exception ignored) {}
                  }
                  String result = full.toString();
                  if (!result.trim().isEmpty()) {
                      callback.onDelta(result);
                      return result;
                  }
                  String normal = raw.toString().trim();
                  if (normal.startsWith("{")) return parseNormalAiResponse(normal);
                  if (emptyChoicesCount > 0 && validChunksCount == 0) {
                      throw new Exception("模型返回了空内容流（共 " + emptyChoicesCount + " 个空 chunk）。可能原因：额度不足、模型限流或服务异常。");
                  }
                  throw new Exception("没有收到 AI 回复内容");
              }
          
              private interface AiStreamCallback {
                  void onDelta(String fullText);
              }
          
              private String parseNormalAiResponse(String response) throws Exception {
                  JSONObject json = new JSONObject(response);
                  JSONArray choices = json.getJSONArray("choices");
                  JSONObject message = choices.getJSONObject(0).getJSONObject("message");
                  return message.optString("content", "").trim();
              }
          
              private String readAll(InputStream stream) throws Exception {
                  BufferedReader br = new BufferedReader(new InputStreamReader(stream, StandardCharsets.UTF_8));
                  StringBuilder sb = new StringBuilder();
                  String line;
                  boolean first = true;
                  while ((line = br.readLine()) != null) {
                      if (!first) sb.append('\n');
                      sb.append(line);
                      first = false;
                  }
                  return sb.toString();
              }
          
              private int appendAiMessage(String role, String content) {
                  try {
                      JSONObject obj = new JSONObject();
                      obj.put("role", role);
                      obj.put("content", content);
                      aiMessages.put(obj);
                      saveAiMessages();
                      renderAiMessages();
                      return aiMessages.length() - 1;
                  } catch (Exception ignored) {}
                  return -1;
              }
          
              private void updateAiMessage(int index, String role, String content) {
                  try {
                      if (index < 0 || index >= aiMessages.length()) return;
                      JSONObject obj = new JSONObject();
                      obj.put("role", role);
                      obj.put("content", content);
                      aiMessages.put(index, obj);
                      saveAiMessages();
                      renderAiMessages();
                  } catch (Exception ignored) {}
              }
          
              private void renderAiMessages() {
                  if (aiMessageList == null) return;
                  aiMessageList.removeAllViews();
                  for (int i = 0; i < aiMessages.length(); i++) {
                      try {
                          JSONObject msg = aiMessages.getJSONObject(i);
                          boolean streaming = aiSending && i == streamingAssistantIndex && "assistant".equals(msg.optString("role"));
                          aiMessageList.addView(aiBubble(msg.optString("role"), msg.optString("content"), streaming));
                      } catch (Exception ignored) {}
                  }
                  if (aiMessageScroll != null) {
                      aiMessageScroll.post(() -> {
                          aiMessageScroll.smoothScrollTo(0, aiMessageList.getBottom());
                          reapplyAiKeyboardOffset();
                      });
                  }
              }
          
              private void reapplyAiKeyboardOffset() {
                  if (aiInputArea == null || rootContainer == null) return;
                  if (!"ai".equals(currentPage)) return;
                  rootContainer.post(() -> {
                      Rect visible = new Rect();
                      rootContainer.getWindowVisibleDisplayFrame(visible);
                      int screenHeight = rootContainer.getRootView().getHeight();
                      int keyboardHeight = screenHeight - visible.bottom;
                      boolean keyboardOpen = keyboardHeight > screenHeight / 5;
                      adjustAiInputForKeyboard(visible, keyboardOpen);
                  });
              }
          
              private View aiBubble(String role, String content, boolean streaming) {
                  boolean user = "user".equals(role);
                  LinearLayout wrap = new LinearLayout(this);
                  wrap.setOrientation(LinearLayout.VERTICAL);
                  TextView tv = text((user ? "你：\n" : "助手：\n") + content, 15, Color.WHITE);
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(user ? Color.rgb(14, 116, 144) : Color.rgb(30, 41, 59));
                  bg.setCornerRadius(20);
                  tv.setBackground(bg);
                  tv.setPadding(18, 14, 18, 14);
                  wrap.addView(tv);
                  if (!streaming) {
                      Button copy = button(user ? "复制我的消息" : "复制 AI 回复");
                      copy.setOnClickListener(v -> copyText(user ? "我的消息" : "AI 回复", content));
                      wrap.addView(copy);
                  }
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                  );
                  lp.setMargins(0, 8, 0, 8);
                  wrap.setLayoutParams(lp);
                  return wrap;
              }
          
