                          boolean sel = saveUri.equals(selectedUri[0]);
                          rbg.setColor(Color.rgb(15, 23, 42));
                          rbg.setStroke(sel ? 3 : 1, sel ? Color.rgb(16, 185, 129) : Color.rgb(30, 41, 59));
                          rbg.setCornerRadius(20);
                          row.setBackground(rbg);
                          LinearLayout.LayoutParams rlp = new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                          rlp.setMargins(0, 6, 0, 6);
                          row.setLayoutParams(rlp);

                          TextView tt = new TextView(this);
                          tt.setText(title);
                          tt.setTextSize(15);
                          tt.setTextColor(Color.WHITE);
                          tt.setSingleLine(true);
                          tt.setEllipsize(android.text.TextUtils.TruncateAt.END);
                          row.addView(tt, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f));

                          // \u8bd5\u542c\u6309\u94ae
                          Button preview = new Button(this);
