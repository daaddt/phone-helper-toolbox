              // \u8bfb\u53d6\u94c3\u58f0 URI \u5bf9\u5e94\u7684\u771f\u5b9e\u540d\u79f0
              private String ringtoneTitleOf(String uriStr) {
                  if (uriStr == null || uriStr.isEmpty()) return "\u7cfb\u7edf\u9ed8\u8ba4\u95f9\u94c3";
                  try {
                      Uri u = Uri.parse(uriStr);
                      android.media.Ringtone r = RingtoneManager.getRingtone(this, u);
                      if (r != null) {
                          String title = r.getTitle(this);
                          if (title != null && !title.isEmpty()) return title;
                      }
                      // \u672c\u5730\u97f3\u4e50 (content://...) \u4ece DocumentFile / ContentResolver \u8bfb\u53d6
                      android.database.Cursor c = getContentResolver().query(u, new String[]{android.provider.OpenableColumns.DISPLAY_NAME}, null, null, null);
                      if (c != null) {
                          try {
                              if (c.moveToFirst()) {
                                  int idx = c.getColumnIndex(android.provider.OpenableColumns.DISPLAY_NAME);
                                  if (idx >= 0) {
                                      String n = c.getString(idx);
                                      if (n != null && !n.isEmpty()) return n;
                                  }
                              }
                          } finally { c.close(); }
                      }
                  } catch (Exception ignored) {}
                  return "\u81ea\u5b9a\u4e49\u94c3\u58f0";
              }

              private int currentEditingAlarmIndex = -1;

              private void showRingtonePicker(int index) {
                  currentEditingAlarmIndex = index;
                  try {
                      Intent intent = new Intent(RingtoneManager.ACTION_RINGTONE_PICKER);
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_TYPE, RingtoneManager.TYPE_ALARM | RingtoneManager.TYPE_RINGTONE | RingtoneManager.TYPE_NOTIFICATION);
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_TITLE, "\u9009\u62e9\u7cfb\u7edf\u94c3\u58f0");
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_SHOW_DEFAULT, true);
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_SHOW_SILENT, false);
                      JSONArray alarms = loadArray("systemAlarms");
                      String existing = alarms.getJSONObject(index).optString("toneUri", "");
                      Uri current = existing.isEmpty() ? RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM) : Uri.parse(existing);
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_EXISTING_URI, current);
                      startActivityForResult(intent, PICK_ALARM_RINGTONE);
                  } catch (Exception e) { showStatus("\u6253\u5f00\u7cfb\u7edf\u94c3\u58f0\u5931\u8d25"); }
              }

              private void showAudioPicker(int index) {
                  currentEditingAlarmIndex = index;
                  try {
                      Intent intent = new Intent(Intent.ACTION_OPEN_DOCUMENT);
                      intent.addCategory(Intent.CATEGORY_OPENABLE);
                      intent.setType("audio/*");
                      intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION | Intent.FLAG_GRANT_PERSISTABLE_URI_PERMISSION);
                      startActivityForResult(intent, PICK_ALARM_AUDIO);
                  } catch (Exception e) { showStatus("\u9009\u62e9\u672c\u5730\u97f3\u4e50\u5931\u8d25"); }
              }

