              private void chooseAlarmRingtone() {
                  Intent intent = new Intent(RingtoneManager.ACTION_RINGTONE_PICKER);
                  intent.putExtra(RingtoneManager.EXTRA_RINGTONE_TYPE, RingtoneManager.TYPE_ALARM);
                  intent.putExtra(RingtoneManager.EXTRA_RINGTONE_TITLE, "选择闹钟铃声");
                  intent.putExtra(RingtoneManager.EXTRA_RINGTONE_SHOW_DEFAULT, true);
                  intent.putExtra(RingtoneManager.EXTRA_RINGTONE_SHOW_SILENT, false);
                  Uri current = selectedAlarmToneUri == null || selectedAlarmToneUri.isEmpty()
                          ? RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM)
                          : Uri.parse(selectedAlarmToneUri);
                  intent.putExtra(RingtoneManager.EXTRA_RINGTONE_EXISTING_URI, current);
                  startActivityForResult(intent, PICK_ALARM_RINGTONE);
              }
          
              private void addSystemAlarmFromInput() {
                  int hour = Math.max(0, Math.min(23, parseInt(alarmHourInput.getText().toString(), 7)));
                  int minute = Math.max(0, Math.min(59, parseInt(alarmMinuteInput.getText().toString(), 0)));
                  alarmHourInput.setText(String.valueOf(hour));
                  alarmMinuteInput.setText(String.valueOf(minute));
                  String label = alarmLabelInput.getText().toString().trim();
                  if (label.isEmpty()) label = "闹钟";
                  boolean repeatDaily = alarmRepeatCheck != null && alarmRepeatCheck.isChecked();
                  if (selectedAlarmToneUri == null || selectedAlarmToneUri.isEmpty()) {
                      selectedAlarmToneUri = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM).toString();
                  }
          
                  try {
                      JSONObject alarm = new JSONObject();
                      alarm.put("id", (int) (System.currentTimeMillis() % Integer.MAX_VALUE));
                      alarm.put("hour", hour);
                      alarm.put("minute", minute);
                      alarm.put("label", label);
                      alarm.put("toneUri", selectedAlarmToneUri);
                      alarm.put("repeatDaily", repeatDaily);
                      alarm.put("enabled", true);
                      alarm.put("nextAt", nextAlarmTime(hour, minute, System.currentTimeMillis()));
          
                      JSONArray alarms = loadArray("systemAlarms");
                      alarms.put(alarm);
                      saveArray("systemAlarms", alarms);
                      scheduleSystemAlarm(alarm);
                      renderSystemAlarms();
                      hideKeyboard();
                      showStatus("系统闹钟已添加：" + formatAlarmTime(alarm.optLong("nextAt")));
                  } catch (Exception e) {
                      showStatus("添加闹钟失败：" + shortError(e.getMessage()));
                  }
              }
          
              private long nextAlarmTime(int hour, int minute, long fromTime) {
                  Calendar calendar = Calendar.getInstance();
                  calendar.setTimeInMillis(fromTime);
                  calendar.set(Calendar.HOUR_OF_DAY, hour);
                  calendar.set(Calendar.MINUTE, minute);
                  calendar.set(Calendar.SECOND, 0);
                  calendar.set(Calendar.MILLISECOND, 0);
                  if (calendar.getTimeInMillis() <= fromTime) {
                      calendar.add(Calendar.DAY_OF_MONTH, 1);
                  }
                  return calendar.getTimeInMillis();
              }
          
              private void renderSystemAlarms() {
                  if (alarmList == null || alarmStatusText == null) return;
                  alarmList.removeAllViews();
                  JSONArray alarms = loadArray("systemAlarms");
                  alarmStatusText.setText(alarms.length() == 0 ? "还没有闹钟" : "已保存 " + alarms.length() + " 个闹钟");
                  for (int i = 0; i < alarms.length(); i++) {
                      try {
                          JSONObject alarm = alarms.getJSONObject(i);
