                  title.setTextColor(Color.WHITE);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setGravity(Gravity.CENTER);
                  root.addView(title);
          
                  TextView message = new TextView(this);
                  message.setText(label);
                  message.setTextSize(26);
                  message.setTextColor(Color.rgb(125, 211, 252));
                  message.setGravity(Gravity.CENTER);
                  message.setPadding(0, 32, 0, 48);
                  root.addView(message);
          
                  Button dismiss = new Button(this);
                  dismiss.setText("\u5173\u95ed\u95f0\u949f");
                  dismiss.setTextSize(20);
                  dismiss.setAllCaps(false);
                  dismiss.setTextColor(Color.WHITE);
                  GradientDrawable bg = new GradientDrawable(
                      GradientDrawable.Orientation.LEFT_RIGHT,
                      new int[]{Color.rgb(14, 165, 233), Color.rgb(16, 185, 129)}
                  );
                  bg.setCornerRadius(28);
                  dismiss.setBackground(bg);
                  dismiss.setPadding(32, 20, 32, 20);
                  dismiss.setOnClickListener(v -> dismissAlarm());
                  root.addView(dismiss);
          
                  setContentView(root);
                  handler.postDelayed(this::dismissAlarm, 180000);
              }
          
              private void dismissAlarm() {
                  try { stopService(new Intent(this, AlarmSoundService.class)); } catch (Exception ignored) {}
                  try {
                      NotificationManager manager = (NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE);
                      if (manager != null) manager.cancel(alarmId);
                  } catch (Exception ignored) {}
                  finish();
              }
          
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacksAndMessages(null);
              }
          }
          
          FILEEOF

          mkdir -p app/src/main/java/com/trae/phonehelper
          cat << 'FILEEOF' > app/src/main/java/com/trae/phonehelper/AlarmSoundService.java
          package com.trae.phonehelper;
          
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.media.AudioAttributes;
          import android.media.MediaPlayer;
          import android.media.RingtoneManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.IBinder;
          import android.os.Vibrator;
          
          public class AlarmSoundService extends Service {
              private static final String CHANNEL_ID = "phone_helper_alarm";
              private MediaPlayer mediaPlayer;
              private Vibrator vibrator;
          
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  int alarmId = intent != null ? intent.getIntExtra("alarmId", 1) : 1;
                  String label = intent != null ? intent.getStringExtra("label") : "闹钟";
                  String toneUri = intent != null ? intent.getStringExtra("toneUri") : "";
                  if (label == null || label.trim().isEmpty()) label = "闹钟";
                  if (alarmId < 1) alarmId = 1;
          
                  startForeground(alarmId, buildNotification(alarmId, label));
                  startSound(toneUri);
                  startVibrate();
                  return START_NOT_STICKY;
              }
          
              private Notification buildNotification(int alarmId, String label) {
                  NotificationManager manager = (NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager != null && Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID, "闹钟提醒", NotificationManager.IMPORTANCE_HIGH);
                      channel.setDescription("手机助手工具箱闹钟提醒");
                      channel.setLockscreenVisibility(Notification.VISIBILITY_PUBLIC);
                      channel.enableVibration(true);
                      manager.createNotificationChannel(channel);
                  }
          
                  Intent ring = new Intent(this, AlarmRingActivity.class);
                  ring.putExtra("alarmId", alarmId);
                  ring.putExtra("label", label);
                  ring.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  PendingIntent pendingIntent = PendingIntent.getActivity(
                      this, alarmId + 200000, ring,
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                  );
          
                  Notification.Builder builder;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      builder = new Notification.Builder(this, CHANNEL_ID);
                  } else {
                      builder = new Notification.Builder(this);
                  }
                  return builder
                      .setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                      .setContentTitle("\u95f0\u949f\u54cd\u4e86")
                      .setContentText(label)
                      .setContentIntent(pendingIntent)
                      .setFullScreenIntent(pendingIntent, true)
                      .setCategory(Notification.CATEGORY_ALARM)
                      .setVisibility(Notification.VISIBILITY_PUBLIC)
                      .setOngoing(true)
                      .setPriority(Notification.PRIORITY_MAX)
                      .setAutoCancel(false)
                      .build();
              }
          
              private void startSound(String toneUri) {
                  try {
                      Uri uri;
                      if (toneUri == null || toneUri.isEmpty()) {
                          uri = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                      } else {
                          uri = Uri.parse(toneUri);
                      }
                      mediaPlayer = new MediaPlayer();
                      mediaPlayer.setAudioAttributes(new AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_ALARM)
                          .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                          .build());
                      mediaPlayer.setDataSource(this, uri);
                      mediaPlayer.setLooping(true);
                      mediaPlayer.prepare();
                      mediaPlayer.start();
                  } catch (Exception firstError) {
                      try {
                          Uri fallback = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                          mediaPlayer = new MediaPlayer();
                          mediaPlayer.setAudioAttributes(new AudioAttributes.Builder()
                              .setUsage(AudioAttributes.USAGE_ALARM)
                              .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                              .build());
                          mediaPlayer.setDataSource(this, fallback);
                          mediaPlayer.setLooping(true);
                          mediaPlayer.prepare();
                          mediaPlayer.start();
                      } catch (Exception ignored) {}
                  }
              }
          
              private void startVibrate() {
                  try {
                      vibrator = (Vibrator) getSystemService(VIBRATOR_SERVICE);
                      if (vibrator != null && vibrator.hasVibrator()) {
                          vibrator.vibrate(new long[]{0, 900, 500, 900, 500, 900}, 0);
                      }
                  } catch (Exception ignored) {}
              }
          
              @Override
              public void onDestroy() {
                  super.onDestroy();
                  try { if (mediaPlayer != null) { mediaPlayer.stop(); mediaPlayer.release(); } } catch (Exception ignored) {}
                  try { if (vibrator != null) vibrator.cancel(); } catch (Exception ignored) {}
              }
          
              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          
