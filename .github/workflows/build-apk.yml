          package com.trae.phonehelper;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;

          import org.json.JSONArray;
          import org.json.JSONObject;

          import java.util.HashSet;
          import java.util.Set;

          public class BootReceiver extends BroadcastReceiver {
              private static final String PREF = "phone_helper_pref";
              private static final String KEY_SYSTEM_ALARMS = "systemAlarms";

              private static final Set<String> TRIGGER_ACTIONS = new HashSet<>();
              static {
                  TRIGGER_ACTIONS.add("android.intent.action.BOOT_COMPLETED");
                  TRIGGER_ACTIONS.add("android.intent.action.LOCKED_BOOT_COMPLETED");
                  TRIGGER_ACTIONS.add("android.intent.action.MY_PACKAGE_REPLACED");
                  TRIGGER_ACTIONS.add("android.intent.action.TIME_SET");
                  TRIGGER_ACTIONS.add("android.intent.action.TIMEZONE_CHANGED");
              }

              @Override
              public void onReceive(Context context, Intent intent) {
                  if (!isValidTrigger(intent)) return;
                  rescheduleAlarms(context);
              }

              private boolean isValidTrigger(Intent intent) {
                  if (intent == null) return false;
                  String action = intent.getAction();
                  return action != null && TRIGGER_ACTIONS.contains(action);
              }

              private void rescheduleAlarms(Context context) {
                  SharedPreferences pref = context.getSharedPreferences(PREF, Context.MODE_PRIVATE);
                  JSONArray alarms = loadAlarms(pref);
                  boolean changed = false;

                  for (int i = 0; i < alarms.length(); i++) {
                      try {
                          JSONObject alarm = alarms.optJSONObject(i);
                          if (alarm == null || !alarm.optBoolean("enabled", false)) continue;

                          long nextAt = alarm.optLong("nextAt", 0);
                          if (nextAt <= System.currentTimeMillis()) {
                              nextAt = AlarmUtils.nextAlarmTime(
                                  alarm.optInt("hour", 7),
                                  alarm.optInt("minute", 0),
                                  alarm.optString("repeatDays", "")
                              );
                              alarm.put("nextAt", nextAt);
                              alarms.put(i, alarm);
                              changed = true;
                          }

                          AlarmReceiver.scheduleExactAlarm(context, alarm);
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }

                  if (changed) {
                      saveAlarms(pref, alarms);
                  }
              }

              private static JSONArray loadAlarms(SharedPreferences pref) {
                  try {
                      return new JSONArray(pref.getString(KEY_SYSTEM_ALARMS, "[]"));
                  } catch (Exception e) {
                      e.printStackTrace();
                      return new JSONArray();
                  }
              }

              private static void saveAlarms(SharedPreferences pref, JSONArray alarms) {
                  pref.edit().putString(KEY_SYSTEM_ALARMS, alarms.toString()).apply();
              }
          }
