              private android.media.Ringtone previewRingtone;
              private void showRingtoneCenter(int index) {
                  currentEditingAlarmIndex = index;
                  final String[] tabs = {"\u95f9\u94c3", "\u94c3\u58f0", "\u901a\u77e5"};
                  final int[] tabTypes = {RingtoneManager.TYPE_ALARM, RingtoneManager.TYPE_RINGTONE, RingtoneManager.TYPE_NOTIFICATION};

                  // \u5f53\u524d\u95f9\u949f\u5df2\u8bbe\u7f6e\u7684 toneUri\uff0c\u7528\u4e8e\u9ad8\u4eae
                  String currentTone = "";
                  try {
                      currentTone = loadArray("systemAlarms").getJSONObject(index).optString("toneUri", "");
                  } catch (Exception ignored) {}
                  final String currentToneFinal = currentTone;

                  // \u6309 Tab \u9884\u52a0\u8f7d\u771f\u5b9e\u94c3\u58f0\u5217\u8868\uff08title + uri\uff09
                  final java.util.List<java.util.List<String[]>> allLists = new java.util.ArrayList<>();
                  for (int t : tabTypes) {
                      java.util.List<String[]> list = new java.util.ArrayList<>();
                      if (t == RingtoneManager.TYPE_ALARM) {
                          Uri def = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                          if (def != null) list.add(new String[]{"系统默认闹钟（默认）", def.toString(), ""});
                      }
                      try {
                          RingtoneManager rm = new RingtoneManager(this);
                          rm.setType(t);
                          android.database.Cursor c = rm.getCursor();
                          int total = c.getCount();
                          for (int i = 0; i < total; i++) {
                              try {
                                  String title = c.moveToPosition(i) ? c.getString(RingtoneManager.TITLE_COLUMN_INDEX) : "";
                                  Uri uri = rm.getRingtoneUri(i);
                                  if (uri != null) list.add(new String[]{title == null ? "\u672a\u547d\u540d" : title, uri.toString(), uri.toString()});
                              } catch (Exception ignored) {}
                          }
                      } catch (Exception ignored) {}
                      allLists.add(list);
                  }

                  ScrollView scroll = new ScrollView(this);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(24, 16, 24, 24);
                  scroll.addView(root);

                  // Tab \u884c
                  LinearLayout tabRow = new LinearLayout(this);
                  tabRow.setOrientation(LinearLayout.HORIZONTAL);
                  final TextView[] tabViews = new TextView[tabs.length];
                  final LinearLayout list = new LinearLayout(this);
                  list.setOrientation(LinearLayout.VERTICAL);
                  list.setPadding(0, 12, 0, 0);

                  final int[] currentTab = {0};
                  // \u9009\u4e2d\u9884\u89c8 highlight\uff1a\u8bb0\u5f55\u5f53\u524d\u9009\u4e2d\u7684 uri\uff08\u9ed8\u8ba4\u4e3a\u95f9\u949f\u73b0\u6709\uff09
                  final String[] selectedUri = {currentToneFinal};
                  final java.util.List<View> rowViews = new java.util.ArrayList<>();
                  final java.util.List<String> rowUris = new java.util.ArrayList<>();

                  Runnable renderList = () -> {
                      list.removeAllViews();
                      rowViews.clear();
                      rowUris.clear();
                      java.util.List<String[]> data = allLists.get(currentTab[0]);
                      if (data.isEmpty()) {
                          TextView empty = text("\u672c\u8bbe\u5907\u5728\u6b64\u5206\u7c7b\u4e0b\u6ca1\u6709\u53ef\u7528\u94c3\u58f0", 14, Color.rgb(148, 163, 184));
                          empty.setGravity(Gravity.CENTER);
                          list.addView(empty);
                          return;
                      }
                      for (int i = 0; i < data.size(); i++) {
                          final String title = data.get(i)[0];
                          final String uriStr = data.get(i)[1];
                          final String saveUri = data.get(i).length > 2 ? data.get(i)[2] : uriStr;
