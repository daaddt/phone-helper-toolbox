              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (resultCode != RESULT_OK || data == null || data.getData() == null) return;
                  Uri uri = data.getData();

                  if (requestCode == PICK_TEXT_FILE) {
                      try { getContentResolver().takePersistableUriPermission(uri, Intent.FLAG_GRANT_READ_URI_PERMISSION); } catch (Exception ignored) {}
                      try (InputStream is = getContentResolver().openInputStream(uri)) {
                          if (is == null) { toast("\u65e0\u6cd5\u8bfb\u53d6\u6587\u4ef6"); return; }
                          String content = readAll(is);
                          longTextInput.setText(content);
                          showStatus("\u5df2\u5bfc\u5165\u6587\u4ef6\uff0c\u5171 " + content.length() + " \u5b57");
                          showPage("split");
                      } catch (Exception e) { showStatus("\u5bfc\u5165\u5931\u8d25\uff1a" + shortError(e.getMessage())); }
                  } else if (requestCode == CREATE_BACKUP_FILE) {
                      exportBackup(uri);
                  } else if (requestCode == PICK_BACKUP_FILE) {
                      try { getContentResolver().takePersistableUriPermission(uri, Intent.FLAG_GRANT_READ_URI_PERMISSION); } catch (Exception ignored) {}
                      importBackup(uri);
                  } else if (requestCode == PICK_ALARM_RINGTONE) {
                      Uri picked = data.getParcelableExtra(RingtoneManager.EXTRA_RINGTONE_PICKED_URI);
                      String uriStr = picked != null ? picked.toString() : "";
                      applyToneToAlarm(currentEditingAlarmIndex, uriStr);
                  } else if (requestCode == PICK_ALARM_AUDIO) {
                      try { getContentResolver().takePersistableUriPermission(uri, Intent.FLAG_GRANT_READ_URI_PERMISSION); } catch (Exception ignored) {}
                      applyToneToAlarm(currentEditingAlarmIndex, uri.toString());
                  }
              }

              private void applyToneToAlarm(int index, String uriStr) {
                  if (index < 0) return;
                  try {
                      String savedUri = uriStr != null ? uriStr : "";
                      pref.edit().putString("lastAlarmToneUri", savedUri).apply();
                      JSONArray alarms = loadArray("systemAlarms");
                      JSONObject a = alarms.getJSONObject(index);
                      a.put("toneUri", savedUri);
                      alarms.put(index, a);
                      saveArray("systemAlarms", alarms);
                      if (a.optBoolean("enabled", false)) AlarmReceiver.scheduleExactAlarm(this, a);
                      renderAlarmList();
                      updateAlarmDisplay();
                      showStatus(savedUri.isEmpty() ? "\u5df2\u6062\u590d\u7cfb\u7edf\u9ed8\u8ba4\u94c3\u58f0\uff0c\u4e0b\u6b21\u65b0\u5efa\u95f9\u949f\u4e5f\u4f1a\u6cbf\u7528" : "\u94c3\u58f0\u5df2\u4fdd\u5b58\uff0c\u4e0b\u6b21\u65b0\u5efa\u95f9\u949f\u4f1a\u81ea\u52a8\u6cbf\u7528");
                  } catch (Exception ignored) {}
              }

              private void exportBackup(Uri uri) {
                  try (OutputStream os = getContentResolver().openOutputStream(uri)) {
                      if (os == null) { toast("\u65e0\u6cd5\u521b\u5efa\u5907\u4efd\u6587\u4ef6"); return; }
                      JSONArray texts = loadArray("texts");
                      JSONArray links = loadArray("links");
                      JSONArray alarms = loadArray("systemAlarms");
                      JSONObject backup = new JSONObject();
                      backup.put("version", 2);
                      backup.put("app", "PhoneHelperToolbox");
                      backup.put("texts", texts);
                      backup.put("links", links);
                      backup.put("systemAlarms", alarms);
                      // 校验字段：记录各数组的条目数，导入时用于快速校验完整性
                      JSONObject checksum = new JSONObject();
                      checksum.put("texts", texts.length());
                      checksum.put("links", links.length());
                      checksum.put("systemAlarms", alarms.length());
                      backup.put("checksum", checksum);
                      os.write(backup.toString(2).getBytes(StandardCharsets.UTF_8));
                      showStatus("\u5907\u4efd\u5df2\u5bfc\u51fa");
                  } catch (Exception e) { showStatus("\u5bfc\u51fa\u5931\u8d25\uff1a" + shortError(e.getMessage())); }
              }

              private void importBackup(Uri uri) {
                  try (InputStream is = getContentResolver().openInputStream(uri)) {
                      if (is == null) { toast("\u65e0\u6cd5\u8bfb\u53d6\u5907\u4efd\u6587\u4ef6"); return; }
                      String raw = readAll(is);
                      JSONObject backup;
                      try {
                          backup = new JSONObject(raw);
                      } catch (Exception e) {
                          showStatus("\u5bfc\u5165\u5931\u8d25\uff1a\u6587\u4ef6\u4e0d\u662f\u6709\u6548\u7684 JSON \u683c\u5f0f\uff0c\u53ef\u80fd\u5df2\u635f\u574f");
                          return;
                      }
                      // 校验备份来源
                      if (!"PhoneHelperToolbox".equals(backup.optString("app"))) {
                          showStatus("\u5bfc\u5165\u5931\u8d25\uff1a\u8be5\u6587\u4ef6\u4e0d\u662f\u672c App \u7684\u5907\u4efd\u6587\u4ef6");
                          return;
                      }
                      int version = backup.optInt("version", 0);
                      if (version < 1 || version > 2) {
                          showStatus("\u5bfc\u5165\u5931\u8d25\uff1a\u4e0d\u652f\u6301\u8be5\u7248\u672c\u7684\u5907\u4efd\u6587\u4ef6\uff08\u7248\u672c " + version + "\uff09");
                          return;
                      }
                      JSONArray texts = backup.optJSONArray("texts");
                      JSONArray links = backup.optJSONArray("links");
                      JSONArray alarms = backup.optJSONArray("systemAlarms");
                      // 校验数据完整性
                      JSONObject checksum = backup.optJSONObject("checksum");
                      if (checksum != null) {
                          boolean dataCorrupt = false;
                          if (texts != null && checksum.optInt("texts", -1) != texts.length()) dataCorrupt = true;
                          if (links != null && checksum.optInt("links", -1) != links.length()) dataCorrupt = true;
                          if (alarms != null && checksum.optInt("systemAlarms", -1) != alarms.length()) dataCorrupt = true;
                          if (dataCorrupt) {
                              showStatus("\u5bfc\u5165\u5931\u8d25\uff1a\u5907\u4efd\u6587\u4ef6\u6570\u636e\u4e0d\u5b8c\u6574\uff0c\u53ef\u80fd\u5df2\u635f\u574f");
                              return;
                          }
                      }
                      if (texts == null && links == null && alarms == null) {
                          showStatus("\u5bfc\u5165\u5931\u8d25\uff1a\u5907\u4efd\u6587\u4ef6\u4e2d\u6ca1\u6709\u53ef\u6062\u590d\u7684\u6570\u636e");
                          return;
                      }
                      if (texts != null) saveArray("texts", texts);
                      if (links != null) saveArray("links", links);
                      if (alarms != null) {
                          saveArray("systemAlarms", alarms);
                          for (int i = 0; i < alarms.length(); i++) {
                              JSONObject a = alarms.getJSONObject(i);
                              if (a.optBoolean("enabled", false)) AlarmReceiver.scheduleExactAlarm(this, a);
                          }
                      }
                      renderSavedTexts(); renderLinks(); renderAlarmList(); updateAlarmDisplay();
                      showStatus("\u5907\u4efd\u5df2\u5bfc\u5165");
                  } catch (Exception e) { showStatus("\u5bfc\u5165\u5931\u8d25\uff1a" + shortError(e.getMessage())); }
              }

              private void generateChunks() {
                  String source = longTextInput.getText().toString();
                  if (source.trim().isEmpty()) { toast("\u8bf7\u5148\u7c98\u8d34\u957f\u6587\u672c"); return; }
                  int size = Math.max(500, Math.min(10000, parseInt(splitSizeInput.getText().toString(), 3000)));
                  splitSizeInput.setText(String.valueOf(size));
                  splitResultList.removeAllViews();
                  int count = 0;
                  for (int start = 0; start < source.length(); start += size) {
                      int end = Math.min(source.length(), start + size);
                      count++;
                      splitResultList.addView(chunkCard(count, source.substring(start, end)));
                  }
                  hideKeyboard();
                  showStatus("\u5df2\u751f\u6210 " + count + " \u6bb5");
              }

              private View chunkCard(int index, String chunk) {
                  LinearLayout card = card();
                  card.addView(text(String.format("\u7b2c %02d \u6bb5 \u00b7 %d \u5b57", index, chunk.length()), 18, Color.WHITE));
                  card.addView(text(preview(chunk), 14, Color.LTGRAY));
                  Button copy = button("\u590d\u5236\u7b2c " + String.format("%02d", index) + " \u6bb5");
                  copy.setOnClickListener(v -> copyText("\u7b2c " + index + " \u6bb5", chunk));
                  card.addView(copy);
                  return card;
              }

              private void addSavedText() {
                  String title = titleInput.getText().toString().trim();
                  String content = contentInput.getText().toString();
                  if (title.isEmpty() || content.trim().isEmpty()) { toast("\u6807\u9898\u548c\u5185\u5bb9\u90fd\u8981\u586b\u5199"); return; }
                  JSONArray array = loadArray("texts");
                  try {
                      JSONObject obj = new JSONObject();
                      obj.put("title", title); obj.put("content", content);
                      if (editingTextIndex >= 0 && editingTextIndex < array.length()) array.put(editingTextIndex, obj);
                      else array.put(obj);
                      saveArray("texts", array);
                  } catch (Exception ignored) {}
                  boolean edited = editingTextIndex >= 0;
                  titleInput.setText(""); contentInput.setText("");
                  cancelTextEditStateOnly();
                  if (!edited) textPageIndex = pageCount(loadArray("texts").length()) - 1;
                  renderSavedTexts(); hideKeyboard();
                  showStatus(edited ? "\u5df2\u4fdd\u5b58\u5e38\u7528\u6587\u672c\u4fee\u6539" : "\u5df2\u6dfb\u52a0\u5e38\u7528\u6587\u672c");
              }

              private void renderSavedTexts() {
                  if (savedTextList == null) return;
                  clearSortVisuals(savedTextList);
                  savedTextList.removeAllViews();
                  applySortLayoutTransition(savedTextList, isSortMode("texts", "text"));
                  JSONArray array = loadArray("texts");
                  textPageIndex = clampPage(textPageIndex, array.length());
                  savedTextList.addView(pagerView("\u5e38\u7528\u6587\u672c", textPageIndex, pageCount(array.length()), () -> { textPageIndex--; renderSavedTexts(); }, () -> { textPageIndex++; renderSavedTexts(); }));
                  int start = textPageIndex * PAGE_SIZE;
                  int end = Math.min(array.length(), start + PAGE_SIZE);
                  for (int i = start; i < end; i++) {
                      try { savedTextList.addView(savedTextCard(i, array.getJSONObject(i))); } catch (Exception ignored) {}
                  }
              }

              private View savedTextCard(int index, JSONObject obj) {
                  String title = obj.optString("title"); String content = obj.optString("content");
                  if (isSortMode("texts", "text")) {
                      LinearLayout card = sortCompactCard(title, preview(content));
                      card.setTag(Integer.valueOf(index));
                      makeSortDraggable(card, "texts", index, "text");
                      applySortItemVisual(card, index);
                      return card;
                  }
                  LinearLayout card = card();
                  card.addView(text(title, 18, Color.WHITE));
                  card.addView(text(preview(content), 14, Color.LTGRAY));
                  card.setOnLongClickListener(v -> { enterSortMode("texts", "text"); return true; });
                  LinearLayout actions = row();
                  Button copy = button("\u590d\u5236"); Button edit = button("\u7f16\u8f91"); Button delete = button("\u5220\u9664");
                  copy.setOnClickListener(v -> copyText(title, content));
                  edit.setOnClickListener(v -> startTextEdit(index, title, content));
                  delete.setOnClickListener(v -> {
                      if (editingTextIndex == index) cancelTextEditStateOnly();
                      removeItem("texts", index); renderSavedTexts();
                      showStatus("\u5df2\u5220\u9664\u5e38\u7528\u6587\u672c");
                  });
                  actions.addView(copy, weight()); actions.addView(edit, weight()); actions.addView(delete, weight());
                  card.addView(actions);
                  return card;
              }

              private void startTextEdit(int index, String title, String content) {
                  editingTextIndex = index;
                  titleInput.setText(title); contentInput.setText(content);
                  textSaveButton.setText("\u4fdd\u5b58\u4fee\u6539");
                  textCancelEditButton.setVisibility(View.VISIBLE);
                  showPage("text");
              }

              private void cancelTextEdit() { titleInput.setText(""); contentInput.setText(""); cancelTextEditStateOnly(); showStatus("\u5df2\u53d6\u6d88\u7f16\u8f91"); }

              private void cancelTextEditStateOnly() {
                  editingTextIndex = -1;
                  if (textSaveButton != null) textSaveButton.setText("\u6dfb\u52a0\u5e38\u7528\u6587\u672c");
                  if (textCancelEditButton != null) textCancelEditButton.setVisibility(View.GONE);
              }

              private void addLink() {
                  String title = linkTitleInput.getText().toString().trim();
                  String url = linkUrlInput.getText().toString().trim();
                  if (title.isEmpty() || url.isEmpty()) { toast("\u6807\u9898\u548c\u7f51\u5740\u90fd\u8981\u586b\u5199"); return; }
                  if (!url.startsWith("http://") && !url.startsWith("https://")) url = "https://" + url;
                  JSONArray array = loadArray("links");
                  try {
                      JSONObject obj = new JSONObject();
                      obj.put("title", title); obj.put("url", url);
                      if (editingLinkIndex >= 0 && editingLinkIndex < array.length()) array.put(editingLinkIndex, obj);
                      else array.put(obj);
                      saveArray("links", array);
                  } catch (Exception ignored) {}
                  boolean edited = editingLinkIndex >= 0;
                  linkTitleInput.setText(""); linkUrlInput.setText("");
                  cancelLinkEditStateOnly();
                  if (!edited) linkPageIndex = pageCount(loadArray("links").length()) - 1;
                  renderLinks(); hideKeyboard();
                  showStatus(edited ? "\u5df2\u4fdd\u5b58\u5feb\u6377\u94fe\u63a5\u4fee\u6539" : "\u5df2\u6dfb\u52a0\u5feb\u6377\u94fe\u63a5");
              }

              private void renderLinks() {
                  if (linkList == null) return;
                  clearSortVisuals(linkList);
                  linkList.removeAllViews();
                  applySortLayoutTransition(linkList, isSortMode("links", "link"));
                  JSONArray array = loadArray("links");
                  linkPageIndex = clampPage(linkPageIndex, array.length());
                  linkList.addView(pagerView("\u5feb\u6377\u94fe\u63a5", linkPageIndex, pageCount(array.length()), () -> { linkPageIndex--; renderLinks(); }, () -> { linkPageIndex++; renderLinks(); }));
                  int start = linkPageIndex * PAGE_SIZE;
                  int end = Math.min(array.length(), start + PAGE_SIZE);
                  for (int i = start; i < end; i++) {
                      try { linkList.addView(linkCard(i, array.getJSONObject(i))); } catch (Exception ignored) {}
                  }
              }

              private void renderSortPage() {
                  if (sortList == null) return;
                  stopSortAutoScroll();
                  boolean shouldResumeDrag = sortResumeDragIndex >= 0;
                  View resumeView = null;
                  if (!shouldResumeDrag) {
                      sortDragging = false;
                      sortDragArmed = false;
                      sortDragMoved = false;
                      sortActiveView = null;
                  }
                  // 移除旧的浮动拖拽视图
                  // 方案A：拖拽恢复时先隐藏浮动视图，避免移除后重新添加时在原位置闪烁
                  View oldFloatingView = sortFloatingView;
                  if (shouldResumeDrag && sortFloatingView != null) {
                      sortFloatingView.setAlpha(0f);
                  }
                  if (sortFloatingView != null && sortFloatingView.getParent() != null) {
                      ((android.view.ViewGroup) sortFloatingView.getParent()).removeView(sortFloatingView);
                  }
                  sortFloatingView = null;
                  clearSortVisuals(sortList);
                  sortList.removeAllViews();
                  applySortLayoutTransition(sortList, false);
                  String key = sortModeKey;
                  String type = sortModeType;
                  if (key.isEmpty() || type.isEmpty()) return;
                  JSONArray array = loadArray(key);
                  sortPageIndex = clampPage(sortPageIndex, array.length());
                  int start = sortPageIndex * PAGE_SIZE;
                  int end = Math.min(array.length(), start + PAGE_SIZE);
                  boolean virtualMoving = shouldResumeDrag && (sortResumeDragIndex < start || sortResumeDragIndex >= end);
                  // 跨页拖回原页：清理跨页标志，恢复为同页拖拽
                  if (shouldResumeDrag && !virtualMoving && sortCrossPagePending) {
                      sortCrossPagePending = false;
                      sortCrossPageFromIndex = -1;
                      sortResumeDirection = 0;
                  }
                  for (int i = start; i < end; i++) {
                      try {
                          JSONObject obj = array.getJSONObject(i);
                          View child = "text".equals(type) ? savedTextCard(i, obj) : linkCard(i, obj);
                          sortList.addView(child);
                          if (shouldResumeDrag && i == sortResumeDragIndex) {
                              resumeView = child;
                          }
                      } catch (Exception ignored) {}
                  }
                  sortList.addView(pagerView("\u6392\u5e8f", sortPageIndex, pageCount(array.length()), () -> changeSortPage(-1), () -> changeSortPage(1)));
                  if (shouldResumeDrag && resumeView != null) {
                      resumeSortDrag(resumeView, sortResumeDragIndex, sortResumeRawY);
                  } else if (shouldResumeDrag && virtualMoving) {
                      // 跨页恢复：创建浮动拖拽视图附加到 sortPage，不占 sortList 槽位
                      try {
                          JSONObject obj = array.getJSONObject(sortResumeDragIndex);
                          View floating = "text".equals(type) ? savedTextCard(sortResumeDragIndex, obj) : linkCard(sortResumeDragIndex, obj);
                          sortFloatingView = floating;
                          sortPage.addView(floating);
                          resumeSortDrag(floating, sortResumeDragIndex, sortResumeRawY);
                      } catch (Exception ignored) {
                          sortDragging = false;
                          sortDragArmed = false;
                          sortDragMoved = false;
                          sortActiveView = null;
                      }
                  } else if (shouldResumeDrag) {
                      sortDragging = false;
                      sortDragArmed = false;
                      sortDragMoved = false;
                      sortActiveView = null;
                  }
                  sortResumeDragIndex = -1;
                  sortResumeRawY = 0f;
                  if (!sortCrossPagePending) sortResumeDirection = 0;
              }

              private View linkCard(int index, JSONObject obj) {
                  String title = obj.optString("title"); String url = obj.optString("url");
                  if (isSortMode("links", "link")) {
                      LinearLayout card = sortCompactCard(title, url);
                      card.setTag(Integer.valueOf(index));
                      makeSortDraggable(card, "links", index, "link");
                      applySortItemVisual(card, index);
                      return card;
                  }
                  LinearLayout card = card();
                  card.addView(text(title, 18, Color.WHITE));
                  card.addView(text(url, 13, Color.LTGRAY));
                  card.setOnLongClickListener(v -> { enterSortMode("links", "link"); return true; });
                  LinearLayout actions = row();
                  Button open = button("\u6253\u5f00"); Button copy = button("\u590d\u5236\u7f51\u5740"); Button edit = button("\u7f16\u8f91"); Button delete = button("\u5220\u9664");
                  open.setOnClickListener(v -> openUrl(url));
                  copy.setOnClickListener(v -> copyText(title + "\u7f51\u5740", url));
                  edit.setOnClickListener(v -> startLinkEdit(index, title, url));
                  delete.setOnClickListener(v -> {
                      if (editingLinkIndex == index) cancelLinkEditStateOnly();
                      removeItem("links", index); renderLinks();
                      showStatus("\u5df2\u5220\u9664\u5feb\u6377\u94fe\u63a5");
                  });
                  actions.addView(open, weight()); actions.addView(copy, weight()); actions.addView(edit, weight()); actions.addView(delete, weight());
                  card.addView(actions);
                  return card;
              }

              private LinearLayout sortCompactCard(String title, String content) {
                  LinearLayout card = card();
                  card.setPadding(14, 6, 14, 6);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, dpToPx(58));
                  lp.setMargins(0, 3, 0, 3);
                  card.setLayoutParams(lp);
                  TextView titleView = text(title, 15, Color.WHITE);
                  titleView.setSingleLine(true);
                  titleView.setEllipsize(android.text.TextUtils.TruncateAt.END);
                  titleView.setPadding(0, 0, 0, 1);
                  TextView contentView = text(content, 12, Color.rgb(203, 213, 225));
                  contentView.setSingleLine(true);
                  contentView.setEllipsize(android.text.TextUtils.TruncateAt.END);
                  contentView.setPadding(0, 0, 0, 0);
                  card.addView(titleView);
                  card.addView(contentView);
                  return card;
              }

              private int pageCount(int total) {
                  return Math.max(1, (total + PAGE_SIZE - 1) / PAGE_SIZE);
              }

              private int clampPage(int page, int total) {
                  int max = pageCount(total) - 1;
                  return Math.max(0, Math.min(max, page));
              }

              private View pagerView(String title, int page, int pages, Runnable prevAction, Runnable nextAction) {
                  if ("\u6392\u5e8f".equals(title)) {
                      LinearLayout wrap = new LinearLayout(this);
                      wrap.setOrientation(LinearLayout.VERTICAL);
                      wrap.setGravity(Gravity.CENTER);
                      wrap.setPadding(0, 0, 0, 6);
                      LinearLayout row = new LinearLayout(this);
                      row.setOrientation(LinearLayout.HORIZONTAL);
                      row.setGravity(Gravity.CENTER);
                      Button prev = button("\u4e0a\u9875");
                      Button next = button("\u4e0b\u9875");
                      Button done = button("\u5b8c\u6210");
                      prev.setTag("sortControl");
                      done.setTag("sortControl");
                      next.setTag("sortControl");
                      prev.setEnabled(page > 0 && !sortDragging);
                      done.setEnabled(!sortDragging);
                      next.setEnabled(page < pages - 1 && !sortDragging);
                      prev.setOnClickListener(v -> { if (!sortDragging && page > 0) prevAction.run(); });
                      done.setOnClickListener(v -> { if (!sortDragging) exitSortMode(); });
                      next.setOnClickListener(v -> { if (!sortDragging && page < pages - 1) nextAction.run(); });
                      row.addView(prev, new LinearLayout.LayoutParams(0, dpToPx(40), 1f));
                      row.addView(done, new LinearLayout.LayoutParams(0, dpToPx(40), 1.25f));
                      row.addView(next, new LinearLayout.LayoutParams(0, dpToPx(40), 1f));
                      TextView hint = text((page + 1) + "/" + pages + "  \u53ef\u957f\u6309\u62d6\u62fd\u6362\u4f4d", 12, Color.rgb(148, 163, 184));
                      hint.setGravity(Gravity.CENTER);
                      hint.setPadding(0, 0, 0, 0);
                      wrap.addView(row);
                      wrap.addView(hint, new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, dpToPx(24)));
                      return wrap;
                  }
                  LinearLayout wrap = card();
                  TextView label = text(title + "  " + (page + 1) + "/" + pages, 16, Color.rgb(226, 232, 240));
                  label.setGravity(Gravity.CENTER);
                  wrap.addView(label);
                  LinearLayout row = row();
                  Button prev = button("\u4e0a\u4e00\u9875");
                  Button next = button("\u4e0b\u4e00\u9875");
                  prev.setEnabled(page > 0);
                  next.setEnabled(page < pages - 1);
                  prev.setOnClickListener(v -> { if (page > 0) prevAction.run(); });
                  next.setOnClickListener(v -> { if (page < pages - 1) nextAction.run(); });
                  row.addView(prev, weight());
                  row.addView(next, weight());
                  wrap.addView(row);
                  return wrap;
              }

              private void changeSortPage(int delta) {
                  if (sortDragging) return;
                  int total = loadArray(sortModeKey).length();
                  int next = clampPage(sortPageIndex + delta, total);
                  if (next == sortPageIndex) return;
                  sortPageIndex = next;
                  renderSortPage();
              }

