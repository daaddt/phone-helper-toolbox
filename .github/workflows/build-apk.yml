              private void makeSortDraggable(View target, String key, int index, String type) {
                  target.setOnLongClickListener(v -> {
                      if (!isSortMode(key, type)) return false;
                      if (sortDragging || (sortActiveView != null && sortActiveView != v)) return true;
                      LinearLayout parent = v.getParent() instanceof LinearLayout ? (LinearLayout) v.getParent() : null;
                      if (parent == null) return false;
                      int realIndex = index;
                      sortActiveView = v;
                      sortDragging = true;
                      sortDragArmed = true;
                      sortDragMoved = false;
                      sortDragOriginalIndex = realIndex;
                      sortDragPendingIndex = realIndex;
                      sortDragItemHeight = v.getHeight() + dpToPx(10);
                      v.performHapticFeedback(android.view.HapticFeedbackConstants.LONG_PRESS);
                      disallowParentIntercept(v, true);
                      setSortControlsEnabled(false);
                      resetDodgeAnimation(parent);
                      v.animate().cancel();
                      v.setTranslationY(0f);
                      v.setAlpha(0.96f);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) v.setElevation(18f);
                      v.animate().scaleX(1.04f).scaleY(1.04f).setDuration(140).start();
                      return true;
                  });
                  target.setOnTouchListener((v, event) -> {
                      if (!isSortMode(key, type)) return false;
                      if (sortActiveView != null && sortActiveView != v) return true;
                      LinearLayout parent = v.getParent() instanceof LinearLayout ? (LinearLayout) v.getParent() : null;
                      if (parent == null) return false;
                      switch (event.getAction()) {
                          case MotionEvent.ACTION_DOWN:
                              if (rootScroll != null) {
                                  rootScroll.requestDisallowInterceptTouchEvent(true);
                                  rootScroll.getParent();
                                  // 强制停止 ScrollView 的 fling，避免滚动后子条目接收不到完整事件
                                  android.view.MotionEvent cancel = android.view.MotionEvent.obtain(event.getDownTime(), event.getEventTime(), android.view.MotionEvent.ACTION_CANCEL, 0, 0, 0);
                                  rootScroll.onTouchEvent(cancel);
                                  cancel.recycle();
                              }
                              disallowParentIntercept(v, true);
                              sortDragStartRawY = event.getRawY();
                              sortDragLastRawY = event.getRawY();
                              return false;
                          case MotionEvent.ACTION_MOVE: {
                              return handleSortDragTouch(v, event);
                          }
                          case MotionEvent.ACTION_UP:
                          case MotionEvent.ACTION_CANCEL: {
                              return handleSortDragTouch(v, event);
                          }
                      }
                      return false;
                  });
              }

              private void resumeSortDrag(View view, int index, float rawY) {
                  sortActiveView = view;
                  sortDragging = true;
                  sortDragArmed = true;
                  sortDragMoved = true;
                  sortDragOriginalIndex = index;
                  sortDragPendingIndex = index;
                  sortDragStartRawY = rawY;
                  sortDragLastRawY = rawY;
                  sortDragItemHeight = (view.getHeight() > 0 ? view.getHeight() : dpToPx(58)) + dpToPx(6);
                  disallowParentIntercept(view, true);
                  setSortControlsEnabled(false);
                  view.animate().cancel();
                  // 先检查布局是否完成，如果未完成先隐藏，等 post() 后再显示
                  int[] loc = new int[2];
                  view.getLocationOnScreen(loc);
                  boolean layoutReady = loc[1] > 0 || view.getHeight() > 0;
                  boolean isFloating = view.getParent() != sortList;
                  // 跨页浮动视图：先隐藏，等 post 回调中位置正确后再显示
                  if (sortCrossPagePending && isFloating) {
                      view.setAlpha(0f);
                  } else if (!layoutReady) {
                      view.setAlpha(0f);
                  }
                  // 跨页浮动模式下使用 realignFloatingViewToFinger 保持位置不漂移
                  if (sortCrossPagePending && isFloating) {
                      realignFloatingViewToFinger(view, rawY);
                  } else {
                      alignSortDragToFinger(view, rawY);
                  }
                  // 同页且布局就绪时立即恢复；浮动视图等 post 回调
                  if (layoutReady && !isFloating) {
                      view.setAlpha(0.96f);
                  }
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) view.setElevation(18f);
                  view.animate().scaleX(1.04f).scaleY(1.04f).setDuration(120).start();
                  LinearLayout p = sortList;
                  if (p != null) {
                      int target2 = computeSortPendingIndex(p, view);
                      sortDragPendingIndex = target2;
                      applyDodgeAnimation(p, view, sortDragOriginalIndex, target2);
                  }
                  view.post(() -> {
                      if (sortActiveView != view || !sortDragArmed) return;
                      if (sortCrossPagePending && isFloating) {
                          realignFloatingViewToFinger(view, rawY);
                      } else {
                          alignSortDragToFinger(view, rawY);
                      }
                      view.setAlpha(0.96f);
                  });
              }

              private void alignSortDragToFinger(View view, float rawY) {
                  if (view == null) return;
                  int h = view.getHeight() > 0 ? view.getHeight() : dpToPx(58);
                  int[] loc = new int[2];
                  view.getLocationOnScreen(loc);
                  float baseTop = loc[1] - view.getTranslationY();
                  if (baseTop <= 0 && view.getParent() instanceof LinearLayout) {
                      LinearLayout parent = (LinearLayout) view.getParent();
                      int[] parentLoc = new int[2];
                      parent.getLocationOnScreen(parentLoc);
                      int childTop = 0;
                      for (int i = 0; i < parent.getChildCount(); i++) {
                          View child = parent.getChildAt(i);
                          if (child == view) break;
                          int childH = child.getHeight();
                          if (childH <= 0 && child.getLayoutParams() != null && child.getLayoutParams().height > 0) childH = child.getLayoutParams().height;
                          childTop += Math.max(0, childH);
                      }
                      baseTop = parentLoc[1] + childTop;
                  }
                  // 如果仍然无法确定位置（布局未完成），先不设置，等 post() 回调
                  if (baseTop <= 0) return;
                  float desiredTranslation = rawY - (baseTop + h / 2f);
                  sortDragStartRawY = rawY - desiredTranslation;
                  sortDragLastRawY = rawY;
                  view.setTranslationY(desiredTranslation);
              }

              // 跨页后重新对齐浮动视图到手指位置，保持相对偏移
              private void realignFloatingViewToFinger(View view, float rawY) {
                  if (view == null) return;
                  int h = view.getHeight() > 0 ? view.getHeight() : dpToPx(58);
                  int[] loc = new int[2];
                  view.getLocationOnScreen(loc);
                  float currentCenterY = loc[1] + h / 2f;
                  float offset = rawY - currentCenterY;
                  float newTranslation = view.getTranslationY() + offset;
                  sortDragStartRawY = rawY - newTranslation;
                  sortDragLastRawY = rawY;
                  view.setTranslationY(newTranslation);
              }

              private boolean handleSortDragTouch(View moving, MotionEvent event) {
                  if (!sortDragArmed || moving == null) return false;
                  // 跨页浮动模式下，moving 的父容器是 sortPage，但排序条目在 sortList 中
                  // 必须用 sortList 作为计算父容器，否则找不到目标页条目
                  LinearLayout parent = sortList;
                  if (parent == null) return false;
                  switch (event.getAction()) {
                      case MotionEvent.ACTION_MOVE: {
                          disallowParentIntercept(moving, true);
                          setSortControlsEnabled(false);
                          float rawY = event.getRawY();
                          updateSortAutoPage(event.getRawX(), rawY);
                          updateSortAutoScroll(rawY);
                          // 跨页浮动模式下，使用 realignFloatingViewToFinger 保持跟随手指不漂移
                          boolean isFloating = moving.getParent() != parent;
                          if (sortCrossPagePending && isFloating) {
                              realignFloatingViewToFinger(moving, rawY);
                              sortDragLastRawY = rawY;
                              int target2 = computeSortPendingIndex(parent, moving);
                              if (target2 != sortDragPendingIndex) {
                                  sortDragPendingIndex = target2;
                                  applyDodgeAnimation(parent, moving, sortDragOriginalIndex, target2);
                                  moving.performHapticFeedback(android.view.HapticFeedbackConstants.CLOCK_TICK);
                              }
                              return true;
                          }
                          float dy = rawY - sortDragStartRawY;
                          if (!sortDragMoved && Math.abs(dy) < dpToPx(18)) {
                              moving.setTranslationY(0f);
                              sortDragPendingIndex = sortDragOriginalIndex;
                              resetDodgeAnimation(parent);
                              return true;
                          }
                          sortDragMoved = true;
                          moving.setTranslationY(dy);
                          sortDragLastRawY = rawY;
                          int target2 = computeSortPendingIndex(parent, moving);
                          if (target2 != sortDragPendingIndex) {
                              sortDragPendingIndex = target2;
                              applyDodgeAnimation(parent, moving, sortDragOriginalIndex, target2);
                              moving.performHapticFeedback(android.view.HapticFeedbackConstants.CLOCK_TICK);
                          }
                          return true;
                      }
                      case MotionEvent.ACTION_UP:
                      case MotionEvent.ACTION_CANCEL: {
                          boolean wasArmed = sortDragArmed;
                          int from = sortDragOriginalIndex;
                          int to = sortDragPendingIndex;
                          sortDragging = false;
                          sortDragArmed = false;
                          sortDragMoved = false;
                          stopSortAutoScroll();
                          sortActiveView = null;
                          setSortControlsEnabled(true);
                          disallowParentIntercept(moving, false);
                          sortDragOriginalIndex = -1;
                          sortDragPendingIndex = -1;
                          sortDragStartRawY = 0f;
                          sortDragLastRawY = 0f;
                          // 清理浮动拖拽视图
                          if (sortFloatingView != null && sortFloatingView.getParent() != null) {
                              ((android.view.ViewGroup) sortFloatingView.getParent()).removeView(sortFloatingView);
                          }
                          sortFloatingView = null;
                          moving.animate().scaleX(1f).scaleY(1f).setDuration(120).start();
                          moving.setAlpha(1f);
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) moving.setElevation(6f);
                          if (wasArmed && from >= 0 && to >= 0 && (from != to || sortCrossPagePending) && Math.abs(moving.getTranslationY()) >= dpToPx(18)) {
                              commitSortDrop(parent, moving, sortModeKey, sortModeType, from, to);
                          } else {
                              moving.animate().translationY(0f).setDuration(140).start();
                              resetDodgeAnimation(parent);
                          }
                          return true;
                      }
                  }
                  return false;
              }

              private int computeSortPendingIndex(LinearLayout parent, View moving) {
                  int headerCount = isSortMode(sortModeKey, sortModeType) && parent == sortList ? 0 : 1;
                  int pageStart = isSortMode(sortModeKey, sortModeType) && parent == sortList ? sortPageIndex * PAGE_SIZE : 0;
                  int itemCount = 0;
                  for (int i = headerCount; i < parent.getChildCount(); i++) {
                      Object childTag = parent.getChildAt(i).getTag();
                      if (childTag instanceof Integer && parent.getChildAt(i) != moving) itemCount++;
                  }
                  if (itemCount == 0) {
                      boolean isFloating = moving.getParent() != parent;
                      if (sortCrossPagePending && isFloating) return pageStart;
                      return sortDragOriginalIndex;
                  }

                  boolean isFloating = moving.getParent() != parent;
                  int[] movingLoc = new int[2];
                  moving.getLocationOnScreen(movingLoc);
                  float movingBaseTop = movingLoc[1] - moving.getTranslationY();
                  float movingCenterY = movingBaseTop + moving.getTranslationY() + moving.getHeight() / 2f;
                  float movingBottom = movingBaseTop + moving.getTranslationY() + moving.getHeight();

                  // 跨页到新页：分阶段触发
                  // 阶段1：底部碰到目标页第一条目上边缘 -> 目标页所有条目+三按键+功能说明整体下移
                  // 阶段2：继续向下，底部碰到原第一条目的下边缘 -> 原第一条目上移一格，视觉上位置互换
                  // 阶段3：以此类推，每碰到下一个条目的下边缘，对应条目上移
                  if (sortCrossPagePending && isFloating) {
                      // 找到目标页各条目的位置信息
                      float firstItemTop = Float.MAX_VALUE;
                      float firstItemBottom = Float.MAX_VALUE;
                      for (int i = headerCount; i < parent.getChildCount(); i++) {
                          View child = parent.getChildAt(i);
                          if (child == moving) continue;
                          Object childTag = child.getTag();
                          if (!(childTag instanceof Integer)) continue;
                          int childIndex = ((Integer) childTag).intValue();
                          if (childIndex != pageStart) continue;
                          int[] loc = new int[2];
                          child.getLocationOnScreen(loc);
                          float top = loc[1] - child.getTranslationY();
                          float bottom = top + child.getHeight();
                          if (top < firstItemTop) {
                              firstItemTop = top;
                              firstItemBottom = bottom;
                          }
                      }
                      // 底部未碰到第一条上边缘：不触发任何让位
                      if (movingBottom < firstItemTop) {
                          return pageStart - 1;
                      }
                      // 已接触第一条上边缘，计算应该插入到哪个位置
                      // 用底部超过各条目下边缘来判断，实现逐条上移效果
                      int result = 0;
                      for (int i = headerCount; i < parent.getChildCount(); i++) {
                          View child = parent.getChildAt(i);
                          if (child == moving) continue;
                          Object childTag = child.getTag();
                          if (!(childTag instanceof Integer)) continue;
                          int[] loc = new int[2];
                          child.getLocationOnScreen(loc);
                          float baseTop = loc[1] - child.getTranslationY();
                          float bottom = baseTop + child.getHeight();
                          // 拖拽条目底部超过当前条目下边缘时，result增加
                          if (movingBottom > bottom) result++;
                      }
                      int maxTarget = pageStart + itemCount;
                      return Math.max(pageStart, Math.min(maxTarget, pageStart + result));
                  }

                  // 非跨页模式：使用中心点判断
                  int result = 0;
                  for (int i = headerCount; i < parent.getChildCount(); i++) {
                      View child = parent.getChildAt(i);
                      if (child == moving) continue;
                      Object childTag = child.getTag();
                      if (!(childTag instanceof Integer)) continue;
                      int[] loc = new int[2];
                      child.getLocationOnScreen(loc);
                      float baseTop = loc[1] - child.getTranslationY();
                      float centerY = baseTop + child.getHeight() / 2f;
                      if (movingCenterY > centerY) result++;
                  }
                  int maxTarget = pageStart + itemCount;
                  return Math.max(pageStart, Math.min(maxTarget, pageStart + result));
              }

              private void applyDodgeAnimation(LinearLayout parent, View moving, int fromIndex, int toIndex) {
                  int headerCount = isSortMode(sortModeKey, sortModeType) && parent == sortList ? 0 : 1;
                  int pageStart = isSortMode(sortModeKey, sortModeType) && parent == sortList ? sortPageIndex * PAGE_SIZE : 0;
                  int pageEnd = pageStart + PAGE_SIZE - 1;
                  boolean isFloating = moving.getParent() != parent;

                  // 跨页到新页：计算需要整体上移的条目数量
                  // 当 toIndex > pageStart 时，表示拖拽条目已经越过了 (toIndex - pageStart) 个条目
                  int crossPageShiftCount = 0;
                  if (sortCrossPagePending && isFloating && toIndex >= pageStart) {
                      crossPageShiftCount = toIndex - pageStart;
                  }

                  for (int i = headerCount; i < parent.getChildCount(); i++) {
                      View child = parent.getChildAt(i);
                      if (child == moving) continue;
                      Object childTag = child.getTag();
                      if (!(childTag instanceof Integer)) continue;
                      int childIndex = ((Integer) childTag).intValue();
                      float shift = 0f;

                      if (sortCrossPagePending && isFloating) {
                          // 跨页到新页：浮动条目是外来者
                          // toIndex < pageStart 时（未接触第一条上边缘），不触发躲闪
                          // toIndex >= pageStart 时（已接触第一条上边缘），目标页所有条目整体下移
                          // 同时，被拖拽条目越过的条目逐个上移，实现视觉上位置互换
                          if (toIndex < pageStart) {
                              shift = 0f;
                          } else if (toIndex >= pageStart && childIndex >= pageStart && childIndex <= pageEnd) {
                              // 所有目标页条目先整体下移
                              shift = sortDragItemHeight;
                              // 被拖拽条目越过的条目（从 pageStart 到 toIndex-1）再逐个上移
                              // 目标页只有1个条目时，保持下移不回位，达到交换效果；多个条目时回位
                              if (childIndex >= pageStart && childIndex < toIndex) {
                                  shift = 0f; // 下移后再上移，等于原位
                              }
                          }
                      } else if (isFloating && !sortCrossPagePending) {
                          // 拖回原页：浮动视图仍在，原页首行空缺（占位符在首行）
                          // 累积式让位：从上往下，被接触到的每一行都保持上移，不会回弹
                          // 从下往上，之前上移的行逐个回弹（下移回原位）
                          // 跳过占位符(pageStart)，实际条目从 pageStart+1 到 toIndex 都上移
                          if (childIndex > pageStart && childIndex <= toIndex && childIndex <= pageEnd) {
                              shift = -sortDragItemHeight;
                          }
                      } else if (fromIndex < toIndex && childIndex > fromIndex && childIndex <= toIndex) shift = -sortDragItemHeight;
                      else if (fromIndex > toIndex && childIndex >= toIndex && childIndex < fromIndex) shift = sortDragItemHeight;
                      child.animate().cancel();
                      child.animate().translationY(shift).setDuration(170).start();
                  }

                  // 跨页到新页时，toIndex >= pageStart 整体下移，pagerView 和功能说明也跟着下移
                  // 当条目回缩时（toIndex 减小），三按键和功能说明也跟着回缩
                  if (sortCrossPagePending && isFloating) {
                      boolean anyShifted = false;
                      for (int i = headerCount; i < parent.getChildCount(); i++) {
                          View child = parent.getChildAt(i);
                          Object childTag = child.getTag();
                          if (childTag instanceof Integer) {
                              int childIndex = ((Integer) childTag).intValue();
                              if (childIndex >= pageStart && childIndex <= pageEnd) {
                                  anyShifted = true;
                                  break;
                              }
                          }
                      }
                      if (anyShifted) {
                          for (int i = headerCount; i < parent.getChildCount(); i++) {
                              View child = parent.getChildAt(i);
                              Object childTag = child.getTag();
                              if (childTag instanceof Integer) continue;
                              // pagerView 和功能介绍等非条目视图跟随条目一起下移/回缩
                              child.animate().cancel();
                              if (toIndex >= pageStart) {
                                  // 整体下移
                                  child.animate().translationY(sortDragItemHeight).setDuration(170).start();
                              } else {
                                  // 回缩到原位
                                  child.animate().translationY(0f).setDuration(170).start();
                              }
                          }
                      }
                  }
              }

              private void resetDodgeAnimation(LinearLayout parent) {
                  for (int i = 0; i < parent.getChildCount(); i++) {
                      View child = parent.getChildAt(i);
                      child.animate().cancel();
                      child.animate().translationY(0f).setDuration(150).start();
                  }
              }

              private void commitSortDrop(LinearLayout parent, final View moving, final String key, final String type, final int from, final int to) {
                  resetDodgeAnimation(parent);
                  if (from != to) moving.setAlpha(0f);
                  moving.animate().translationY(0f).setDuration(160).withEndAction(() -> {
                      boolean moved;
                      if (sortCrossPagePending) {
                          moved = commitCrossPageDrop(key, sortCrossPageFromIndex, to, sortResumeDirection);
                      } else if (sortCrossPageFromIndex >= 0) {
                          // 拖回原页后，from 是等效位置，实际原始索引在 sortCrossPageFromIndex 中
                          // 如果目标位置在当前页首行之上，修正为首行
                          int targetPageStart = sortPageIndex * PAGE_SIZE;
                          int adjustedTo = Math.max(targetPageStart, to);
                          moved = moveItemSilently(key, sortCrossPageFromIndex, adjustedTo);
                      } else {
                          moved = moveItemSilently(key, from, to);
                      }
                      sortCrossPagePending = false;
                      sortCrossPageFromIndex = -1;
                      sortResumeDirection = 0;
                      sortResumeDragIndex = -1;
                      if (moved) {
                          renderSortPage();
                      }
                  }).start();
              }

              private void updateSortAutoScroll(float rawY) {
                  if (!sortDragArmed || rootScroll == null || sortActiveView == null || !"sort".equals(currentPage)) {
                      stopSortAutoScroll();
                      return;
                  }
                  int[] loc = new int[2];
                  rootScroll.getLocationOnScreen(loc);
                  int edge = dpToPx(88);
                  int top = loc[1] + edge;
                  int bottom = loc[1] + rootScroll.getHeight() - edge;
                  int direction = 0;
                  if (rawY < top) direction = -1;
                  else if (rawY > bottom) direction = 1;
                  if (direction != sortAutoScrollDirection) {
                      sortAutoScrollDirection = direction;
                      handler.removeCallbacks(sortAutoScrollTick);
                      if (direction != 0) handler.post(sortAutoScrollTick);
                  }
              }

              private void updateSortAutoPage(float rawX, float rawY) {
                  if (!sortDragArmed || rootScroll == null || sortActiveView == null || !"sort".equals(currentPage)) return;
                  int[] loc = new int[2];
                  rootScroll.getLocationOnScreen(loc);
                  int edge = dpToPx(96);
                  int top = loc[1] + edge;
                  int left = loc[0] + edge;
                  int right = loc[0] + rootScroll.getWidth() - edge;
                  int direction = 0;
                  if (rawY < top) {
                      if (rawX < left) direction = -1;
                      else if (rawX > right) direction = 1;
                  }
                  if (direction == 0) {
                      sortAutoPageDirection = 0;
                      sortAutoPageSince = 0L;
                      return;
                  }
                  long now = SystemClock.elapsedRealtime();
                  if (direction != sortAutoPageDirection) {
                      sortAutoPageDirection = direction;
                      sortAutoPageSince = now;
                      showStatus(direction < 0 ? "\u4fdd\u6301\u5de6\u4e0a\u89d2\u53ef\u5207\u5230\u4e0a\u4e00\u9875" : "\u4fdd\u6301\u53f3\u4e0a\u89d2\u53ef\u5207\u5230\u4e0b\u4e00\u9875");
                      return;
                  }
                  if (now - sortAutoPageSince > 850) autoTurnSortPage(direction);
              }

              private void autoTurnSortPage(int direction) {
                  int total = loadArray(sortModeKey).length();
                  int nextPage = clampPage(sortPageIndex + direction, total);
                  if (nextPage == sortPageIndex) { sortAutoPageSince = SystemClock.elapsedRealtime(); return; }
                  int from = sortDragOriginalIndex;
                  stopSortAutoScroll();
                  float rawY = sortDragLastRawY;
                  View active = sortActiveView;
                  if (active != null) {
                      active.animate().cancel();
                      active.setTranslationY(0f);
                      active.setAlpha(1f);
                      active.setScaleX(1f);
                      active.setScaleY(1f);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) active.setElevation(6f);
                  }
                  sortAutoPageDirection = 0;
                  sortAutoPageSince = 0L;
                  sortCrossPagePending = true;
                  sortCrossPageFromIndex = from;
                  sortPageIndex = nextPage;
                  sortResumeDragIndex = from;
                  sortResumeRawY = rawY;
                  sortResumeDirection = direction;
                  renderSortPage();
                  showStatus("\u5df2\u81ea\u52a8\u6362\u9875\uff0c\u677e\u624b\u540e\u518d\u4fdd\u5b58\u4f4d\u7f6e");
              }

              private void runSortAutoScrollTick() {
                  if (sortAutoScrollDirection == 0 || !sortDragArmed || rootScroll == null || sortActiveView == null || !"sort".equals(currentPage)) return;
                  LinearLayout parent = sortList;
                  if (parent == null) { stopSortAutoScroll(); return; }
                  int before = rootScroll.getScrollY();
                  int step = sortAutoScrollDirection * dpToPx(18);
                  rootScroll.scrollBy(0, step);
                  int actual = rootScroll.getScrollY() - before;
                  if (actual != 0) {
                      // 跨页浮动模式下，保持浮动视图跟随手指位置
                      boolean isFloating = sortActiveView.getParent() != parent;
                      if (sortCrossPagePending && isFloating) {
                          // 滚动时保持 translationY 不变，这样相对于屏幕位置不变
                          // 不需要调整 sortDragStartRawY，因为 realignFloatingViewToFinger 会直接对齐到手指
                      } else {
                          sortDragStartRawY -= actual;
                          float dy = sortDragLastRawY - sortDragStartRawY;
                          sortActiveView.setTranslationY(dy);
                      }
                      int target2 = computeSortPendingIndex(parent, sortActiveView);
                      if (target2 != sortDragPendingIndex) {
                          sortDragPendingIndex = target2;
                          applyDodgeAnimation(parent, sortActiveView, sortDragOriginalIndex, target2);
                      }
                  }
                  handler.postDelayed(sortAutoScrollTick, 28);
              }

              private void stopSortAutoScroll() {
                  sortAutoScrollDirection = 0;
                  sortAutoPageDirection = 0;
                  sortAutoPageSince = 0L;
                  handler.removeCallbacks(sortAutoScrollTick);
              }

              private int dpToPx(int dp) {
                  return Math.round(dp * getResources().getDisplayMetrics().density);
              }

              private void disallowParentIntercept(View view, boolean disallow) {
                  android.view.ViewParent parent = view == null ? null : view.getParent();
                  while (parent != null) {
                      parent.requestDisallowInterceptTouchEvent(disallow);
                      parent = parent.getParent();
                  }
              }

              private void setSortControlsEnabled(boolean enabled) {
                  setSortControlsEnabledIn(sortList, enabled);
              }

              private void setSortControlsEnabledIn(View view, boolean enabled) {
                  if (view == null) return;
                  Object tag = view.getTag();
                  if ("sortControl".equals(tag)) view.setEnabled(enabled);
                  if (view instanceof android.view.ViewGroup) {
                      android.view.ViewGroup group = (android.view.ViewGroup) view;
                      for (int i = 0; i < group.getChildCount(); i++) setSortControlsEnabledIn(group.getChildAt(i), enabled);
                  }
              }

              private void applySortItemVisual(View target, int index) {
                  target.clearAnimation();
                  target.setScaleX(1f);
                  target.setScaleY(1f);
                  target.setTranslationX(0f);
                  target.setTranslationY(0f);
                  target.setAlpha(1f);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) target.setElevation(6f);
              }

              private void applySortLayoutTransition(LinearLayout parent, boolean enabled) {
                  if (parent == null) return;
                  parent.setLayoutTransition(null);
              }

              private void attachSortSwipeExit(View target, String key, String type) {
                  target.setOnTouchListener((v, event) -> {
                      if (!isSortMode(key, type)) return false;
                      if (sortDragging) return false;
                      if (event.getAction() == MotionEvent.ACTION_DOWN) {
                          sortSwipeStartX = event.getX();
                          sortSwipeStartY = event.getY();
                          return false;
                      }
                      if (event.getAction() == MotionEvent.ACTION_MOVE) {
                          float dx = event.getX() - sortSwipeStartX;
                          float dy = event.getY() - sortSwipeStartY;
                          if (Math.abs(dx) > 32 && Math.abs(dx) > Math.abs(dy) * 1.2f) return true;
                      }
                      if (event.getAction() == MotionEvent.ACTION_UP || event.getAction() == MotionEvent.ACTION_CANCEL) {
                          if (SystemClock.elapsedRealtime() - sortModeEnteredAt < 700) return true;
                          float dx = event.getX() - sortSwipeStartX;
                          float dy = event.getY() - sortSwipeStartY;
                          if (Math.abs(dx) > 150 && Math.abs(dx) > Math.abs(dy) * 1.4f) {
                              exitSortMode();
                              return true;
                          }
                          return false;
                      }
                      return false;
                  });
              }

              private int findSortTargetIndex(LinearLayout parent, View moving, float rawY) {
                  return computeSortPendingIndex(parent, moving);
              }

              private String preview(String value) { String cleaned = value.trim(); return cleaned.length() <= 120 ? cleaned : cleaned.substring(0, 120) + "..."; }

              private void showPage(String pageName) {
                  if ("settings".equals(pageName)) {
                      if (feedback != null) feedback.click();
                      Intent intent = new Intent(this, SettingsActivity.class);
                      startActivity(intent);
                      return;
                  }
                  if (!sortModeKey.isEmpty() && !"sort".equals(pageName) && !("text".equals(pageName) && "text".equals(sortModeType)) && !("link".equals(pageName) && "link".equals(sortModeType))) {
                      sortModeKey = "";
                      sortModeType = "";
                      sortDragging = false;
                      sortDragArmed = false;
                      sortDragMoved = false;
                      stopSortAutoScroll();
                      sortActiveView = null;
                      sortDragOriginalIndex = -1;
                      sortDragPendingIndex = -1;
                      sortCrossPagePending = false;
                      sortCrossPageFromIndex = -1;
                      sortResumeDirection = 0;
                  }
                  currentPage = pageName; hideKeyboard(); hideStatus();
                  boolean aiVisible = "ai".equals(pageName);
                  rootScroll.setVisibility(aiVisible ? View.GONE : View.VISIBLE);
                  homePage.setVisibility("home".equals(pageName) ? View.VISIBLE : View.GONE);
                  splitPage.setVisibility("split".equals(pageName) ? View.VISIBLE : View.GONE);
                  textPage.setVisibility("text".equals(pageName) ? View.VISIBLE : View.GONE);
                  linkPage.setVisibility("link".equals(pageName) ? View.VISIBLE : View.GONE);
                  sortPage.setVisibility("sort".equals(pageName) ? View.VISIBLE : View.GONE);
                  timerPage.setVisibility("timer".equals(pageName) ? View.VISIBLE : View.GONE);
                  pomoPage.setVisibility("pomo".equals(pageName) ? View.VISIBLE : View.GONE);
                  alarmPage.setVisibility("alarm".equals(pageName) ? View.VISIBLE : View.GONE);
                  aiPage.setVisibility(aiVisible ? View.VISIBLE : View.GONE);
                  aiSettingsPage.setVisibility("aiSettings".equals(pageName) ? View.VISIBLE : View.GONE);
                  backupPage.setVisibility("backup".equals(pageName) ? View.VISIBLE : View.GONE);
                  if (aiVisible && aiMessageScroll != null) { aiMessageScroll.post(() -> aiMessageScroll.smoothScrollTo(0, aiMessageList.getBottom())); }
                  else if (rootScroll != null) { rootScroll.post(() -> rootScroll.smoothScrollTo(0, 0)); }
              }

              @Override
              public void onBackPressed() {
                  if (!sortModeKey.isEmpty()) { exitSortMode(); return; }
                  if (!"home".equals(currentPage)) { showPage("home"); }
                  else {
                      long now = SystemClock.elapsedRealtime();
                      if (now - lastBackPressedAt < 1800) { super.onBackPressed(); }
                      else { lastBackPressedAt = now; showStatus("\u518d\u6309\u4e00\u6b21\u9000\u51fa"); }
                  }
              }

              private void showStatus(String message) { toast(message); }
              private void hideStatus() { if (statusText == null) return; statusText.setVisibility(View.GONE); }

