                      int keyboardHeight = Math.max(0, screenHeight - visible.bottom);
                      boolean keyboardOpen = keyboardHeight > screenHeight * 0.15f;
                      adjustAiInputForKeyboard(visible, keyboardOpen);
                      int bottomPadding = keyboardOpen ? keyboardHeight + 420 : rootBaseBottomPadding;
                      rootContainer.setPadding(
