          package com.trae.phonehelper;
          
          import android.app.AlarmManager;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          
          import org.json.JSONArray;
          import org.json.JSONObject;
          
          import java.util.Calendar;
          
          public class AlarmReceiver extends BroadcastReceiver {
              private static final String PREF = "phone_helper_pref";
              private static final String CHANNEL_ID = "phone_helper_alarm";
          
              @Override
              public void onReceive(Context context, Intent intent) {
                  int alarmId = intent.getIntExtra("alarmId", 0);
                  JSONObject alarm = findAlarm(context, alarmId);
                  String label = alarm != null ? alarm.optString("label", "闹钟") : "闹钟";
                  String toneUri = alarm != null ? alarm.optString("toneUri", "") : "";
          
                  updateNextAlarm(context, alarmId, alarm);
                  showRingActivity(context, alarmId, label, toneUri);
                  showNotification(context, alarmId, label, toneUri);
              }
          
              private JSONObject findAlarm(Context context, int alarmId) {
                  try {
                      SharedPreferences pref = context.getSharedPreferences(PREF, Context.MODE_PRIVATE);
                      JSONArray alarms = new JSONArray(pref.getString("systemAlarms", "[]"));
                      for (int i = 0; i < alarms.length(); i++) {
                          JSONObject alarm = alarms.getJSONObject(i);
                          if (alarm.optInt("id", 0) == alarmId) return alarm;
                      }
                  } catch (Exception ignored) {}
                  return null;
              }
          
              private void updateNextAlarm(Context context, int alarmId, JSONObject target) {
                  if (target == null) return;
                  try {
                      SharedPreferences pref = context.getSharedPreferences(PREF, Context.MODE_PRIVATE);
                      JSONArray alarms = new JSONArray(pref.getString("systemAlarms", "[]"));
                      for (int i = 0; i < alarms.length(); i++) {
                          JSONObject alarm = alarms.getJSONObject(i);
                          if (alarm.optInt("id", 0) != alarmId) continue;
                          if (alarm.optBoolean("repeatDaily", false)) {
                              long nextAt = nextAlarmTime(alarm.optInt("hour", 7), alarm.optInt("minute", 0), System.currentTimeMillis());
                              alarm.put("nextAt", nextAt);
                              alarm.put("enabled", true);
                              alarms.put(i, alarm);
                              pref.edit().putString("systemAlarms", alarms.toString()).apply();
                              scheduleNext(context, alarm);
                          } else {
                              alarm.put("enabled", false);
                              alarms.put(i, alarm);
                              pref.edit().putString("systemAlarms", alarms.toString()).apply();
                          }
                          break;
                      }
                  } catch (Exception ignored) {}
              }
          
              private void scheduleNext(Context context, JSONObject alarm) {
                  try {
                      AlarmManager manager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                      if (manager == null) return;
                      int id = alarm.optInt("id", 0);
                      Intent intent = new Intent(context, AlarmReceiver.class);
                      intent.setAction("com.trae.phonehelper.ALARM_" + id);
                      intent.putExtra("alarmId", id);
                      PendingIntent operation = PendingIntent.getBroadcast(
                              context,
                              id,
                              intent,
                              PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                      );
                      Intent showIntent = new Intent(context, MainActivity.class);
                      PendingIntent showOperation = PendingIntent.getActivity(
                              context,
                              id + 100000,
                              showIntent,
                              PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                      );
                      manager.setAlarmClock(new AlarmManager.AlarmClockInfo(alarm.optLong("nextAt"), showOperation), operation);
                  } catch (Exception ignored) {}
              }
          
              private long nextAlarmTime(int hour, int minute, long fromTime) {
                  Calendar calendar = Calendar.getInstance();
                  calendar.setTimeInMillis(fromTime);
                  calendar.set(Calendar.HOUR_OF_DAY, hour);
                  calendar.set(Calendar.MINUTE, minute);
                  calendar.set(Calendar.SECOND, 0);
                  calendar.set(Calendar.MILLISECOND, 0);
                  if (calendar.getTimeInMillis() <= fromTime) calendar.add(Calendar.DAY_OF_MONTH, 1);
                  return calendar.getTimeInMillis();
              }
          
              private void showRingActivity(Context context, int alarmId, String label, String toneUri) {
                  Intent ring = new Intent(context, AlarmRingActivity.class);
                  ring.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  ring.putExtra("alarmId", alarmId);
                  ring.putExtra("label", label);
                  ring.putExtra("toneUri", toneUri);
                  context.startActivity(ring);
              }
          
              private void showNotification(Context context, int alarmId, String label, String toneUri) {
                  NotificationManager manager = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager == null) return;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(CHANNEL_ID, "闹钟提醒", NotificationManager.IMPORTANCE_HIGH);
                      channel.setDescription("手机助手工具箱闹钟提醒");
                      manager.createNotificationChannel(channel);
                  }
                  Intent ring = new Intent(context, AlarmRingActivity.class);
                  ring.putExtra("alarmId", alarmId);
                  ring.putExtra("label", label);
                  ring.putExtra("toneUri", toneUri);
                  PendingIntent pendingIntent = PendingIntent.getActivity(
                          context,
                          alarmId + 200000,
                          ring,
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                  );
                  android.app.Notification.Builder builder = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                          ? new android.app.Notification.Builder(context, CHANNEL_ID)
                          : new android.app.Notification.Builder(context);
                  builder.setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                          .setContentTitle("闹钟响了")
                          .setContentText(label)
                          .setContentIntent(pendingIntent)
                          .setFullScreenIntent(pendingIntent, true)
                          .setAutoCancel(true)
                          .setPriority(android.app.Notification.PRIORITY_HIGH);
                  manager.notify(alarmId, builder.build());
              }
          }
