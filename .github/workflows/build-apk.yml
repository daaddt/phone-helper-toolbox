name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 同一分支重复推送时，自动取消上一轮还在跑的构建，节省 Actions 时长
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dfile.encoding=UTF-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Generate project files
        run: |
          cat << 'FILEEOF' > .gitignore
          .gradle/
          build/
          app/build/
          local.properties
          *.iml
          .idea/
          .DS_Store
          *.apk
          *.aab
          
          FILEEOF

          cat << 'FILEEOF' > build.gradle
          plugins {
              id "com.android.application" version "8.5.2" apply false
          }
          
          FILEEOF

          cat << 'FILEEOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          android.suppressUnsupportedCompileSdk=35
          
          FILEEOF

          cat << 'FILEEOF' > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "PhoneHelperToolbox"
          include ":app"
          
          FILEEOF

          mkdir -p app
          cat << 'FILEEOF' > app/build.gradle
          plugins {
              id "com.android.application"
          }
          
          android {
              namespace "com.trae.phonehelper"
              compileSdk 35
          
              defaultConfig {
                  applicationId "com.trae.phonehelper"
                  minSdk 26
                  targetSdk 35
                  versionCode 81
                  versionName "1.17.0"
              }
          
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          
              signingConfigs {
                  release {
                      storeFile file(System.getenv("KEYSTORE_FILE"))
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
          
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
                      signingConfig signingConfigs.release
                  }
              }
          }
          
          FILEEOF

          cat << 'FILEEOF' > app/proguard-rules.pro
          -keep public class * extends android.app.Activity
          -keep public class * extends android.app.Application
          -keep public class * extends android.app.Service
          -keep public class * extends android.content.BroadcastReceiver
          -keep public class * extends android.content.ContentProvider
          -keep public class * extends android.support.v4.app.Fragment
          -keep public class * extends android.app.Fragment

          -keepattributes *Annotation*
          -keepattributes Signature
          -keepattributes SourceFile,LineNumberTable

          -keepclassmembers class * extends android.app.Activity {
              public void *(android.view.View);
          }

          -keepclassmembers enum * {
              public static **[] values();
              public static ** valueOf(java.lang.String);
          }

          -keep class * implements android.os.Parcelable {
              public static final android.os.Parcelable$Creator *;
          }

          -keepclassmembers class **.R$* {
              public static <fields>;
          }

          -keep public class com.trae.phonehelper.** { *; }
          
          FILEEOF

          mkdir -p app/src/main
          cat << 'FILEEOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.USE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.DISABLE_KEYGUARD" />
              <uses-permission android:name="android.permission.TURN_SCREEN_ON" />
          
              <application
                  android:allowBackup="false"
                  android:theme="@style/AppTheme"
                  android:label="手机助手工具箱"
                  android:resizeableActivity="true"
                  android:supportsRtl="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round">
          
                  <activity
                      android:name=".SplashActivity"
                      android:exported="true"
                      android:theme="@style/SplashTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".AlarmRingActivity"
                      android:exported="false"
                      android:excludeFromRecents="true"
                      android:showWhenLocked="true"
                      android:turnScreenOn="true"
                      android:taskAffinity=""
                      android:launchMode="singleTop" />
          
                  <service
                      android:name=".AlarmSoundService"
                      android:exported="false"
                      android:foregroundServiceType="mediaPlayback" />
          
                  <receiver
                      android:name=".AlarmReceiver"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="com.trae.phonehelper.ALARM_ACTION" />
                      </intent-filter>
                  </receiver>
          
                  <receiver
                      android:name=".BootReceiver"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                          <action android:name="android.intent.action.LOCKED_BOOT_COMPLETED" />
                          <action android:name="android.intent.action.MY_PACKAGE_REPLACED" />
                          <action android:name="android.intent.action.TIME_SET" />
                          <action android:name="android.intent.action.TIMEZONE_CHANGED" />
                      </intent-filter>
                  </receiver>
          
                  <activity
                      android:name=".SettingsActivity"
