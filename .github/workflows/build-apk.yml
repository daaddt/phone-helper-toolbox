                  dialog.show();
              }

              private void previewRingtoneAt(String uriStr) {
                  try {
                      stopPreviewRingtone();
                      Uri u = Uri.parse(uriStr);
                      previewRingtone = RingtoneManager.getRingtone(this, u);
                      if (previewRingtone != null) previewRingtone.play();
                  } catch (Exception ignored) {}
              }

              private void stopPreviewRingtone() {
                  try { if (previewRingtone != null && previewRingtone.isPlaying()) previewRingtone.stop(); } catch (Exception ignored) {}
                  previewRingtone = null;
              }

              private void updateAlarmDisplay() {
                  if (alarmStatusText == null) return;
                  StringBuilder sb = new StringBuilder();
                  boolean hasEnabled = false;
                  long nearest = 0;
                  try {
                      JSONArray alarms = loadArray("systemAlarms");
                      for (int i = 0; i < alarms.length(); i++) {
                          JSONObject a = alarms.getJSONObject(i);
                          if (a.optBoolean("enabled", false)) {
                              hasEnabled = true;
                              long nt = a.optLong("nextAt", 0);
                              if (nt > System.currentTimeMillis() && (nearest == 0 || nt < nearest)) nearest = nt;
                          }
                      }
                  } catch (Exception ignored) {}

                  if (hasEnabled && nearest > 0) {
                      sb.append("\u4e0b\u4e00\u4e2a\u95f9\u949f\uff1a").append(formatAlarmTime(nearest));
                  } else {
                      sb.append("\u6682\u65e0\u5df2\u5f00\u542f\u7684\u95f9\u949f");
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                      if (am != null && !am.canScheduleExactAlarms()) {
                          sb.append("\n\uff01\u7cbe\u786e\u95f9\u949f\u6743\u9650\u672a\u6388\u6743\uff0c\u95f9\u949f\u53ef\u80fd\u4e0d\u51c6\u65f6");
                      }
                  }

                  String pkg = getPackageName();
                  try {
                      if (!((PowerManager) getSystemService(Context.POWER_SERVICE)).isIgnoringBatteryOptimizations(pkg)) {
                          sb.append("\n\uff01\u672a\u5ffd\u7565\u7535\u6c60\u4f18\u5316\uff0c\u540e\u53f0\u53ef\u80fd\u88ab\u6740");
                      }
                  } catch (Exception ignored) {}

                  alarmStatusText.setText(sb.toString());
              }

              private String formatAlarmTime(long ms) {
                  return new SimpleDateFormat("MM-dd HH:mm", Locale.getDefault()).format(new Date(ms));
              }

