              private void showRingtonePicker(int index) {
                  currentEditingAlarmIndex = index;
                  try {
                      Intent intent = new Intent(RingtoneManager.ACTION_RINGTONE_PICKER);
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_TYPE, RingtoneManager.TYPE_ALARM);
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_TITLE, "\u9009\u62e9\u95f0\u949f\u94f3\u58f0");
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_SHOW_DEFAULT, true);
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_SHOW_SILENT, false);
                      JSONArray alarms = loadArray("systemAlarms");
                      String existing = alarms.getJSONObject(index).optString("toneUri", "");
                      Uri current = existing.isEmpty() ? RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM) : Uri.parse(existing);
                      intent.putExtra(RingtoneManager.EXTRA_RINGTONE_EXISTING_URI, current);
                      startActivityForResult(intent, PICK_ALARM_RINGTONE);
                  } catch (Exception e) { showStatus("\u9009\u62e9\u94f3\u58f0\u5931\u8d25"); }
              }
          
