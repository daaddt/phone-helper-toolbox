              private void addAlarm(int hour, int minute, String label, boolean repeat, String toneUri) {
                  try {
                      JSONArray alarms = loadArray("systemAlarms");
                      JSONObject a = new JSONObject();
                      a.put("id", alarms.length() + 1);
                      a.put("hour", hour);
                      a.put("minute", minute);
                      a.put("label", label);
                      a.put("enabled", true);
                      a.put("repeatDaily", repeat);
                      a.put("toneUri", toneUri != null ? toneUri : "");
                      a.put("nextAt", nextAlarmTime(hour, minute));
                      alarms.put(a);
                      saveArray("systemAlarms", alarms);
                      AlarmReceiver.scheduleExactAlarm(this, a);
                      renderAlarmList();
                      showStatus("\u95f0\u949f\u5df2\u6dfb\u52a0\uff1a" + String.format(Locale.getDefault(), "%02d:%02d", hour, minute));
                  } catch (Exception e) { showStatus("\u6dfb\u52a0\u5931\u8d25"); }
              }
          
              private void renderAlarmList() {
                  if (alarmList == null) return;
