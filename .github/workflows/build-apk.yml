              private void toggleSystemAlarm(int index) {
                  JSONArray alarms = loadArray("systemAlarms");
                  try {
                      JSONObject alarm = alarms.getJSONObject(index);
                      boolean enabled = !alarm.optBoolean("enabled", true);
                      alarm.put("enabled", enabled);
                      if (enabled) {
                          alarm.put("nextAt", nextAlarmTime(alarm.optInt("hour", 7), alarm.optInt("minute", 0), System.currentTimeMillis()));
                          scheduleSystemAlarm(alarm);
                      } else {
                          cancelSystemAlarm(alarm.optInt("id", 0));
                      }
                      alarms.put(index, alarm);
                      saveArray("systemAlarms", alarms);
                      renderSystemAlarms();
                      showStatus(enabled ? "闹钟已开启" : "闹钟已关闭");
                  } catch (Exception ignored) {}
              }
          
              private void deleteSystemAlarm(int index) {
                  JSONArray alarms = loadArray("systemAlarms");
                  JSONArray result = new JSONArray();
                  try {
                      JSONObject target = alarms.getJSONObject(index);
                      cancelSystemAlarm(target.optInt("id", 0));
                  } catch (Exception ignored) {}
                  for (int i = 0; i < alarms.length(); i++) {
                      if (i == index) continue;
                      try {
                          result.put(alarms.getJSONObject(i));
                      } catch (Exception ignored) {}
                  }
                  saveArray("systemAlarms", result);
                  renderSystemAlarms();
                  showStatus("闹钟已删除");
              }
          
              private void rescheduleEnabledAlarms() {
                  JSONArray alarms = loadArray("systemAlarms");
                  boolean changed = false;
                  for (int i = 0; i < alarms.length(); i++) {
                      try {
                          JSONObject alarm = alarms.getJSONObject(i);
                          if (!alarm.optBoolean("enabled", true)) continue;
                          long nextAt = alarm.optLong("nextAt", 0);
                          if (nextAt <= System.currentTimeMillis()) {
                              if (alarm.optBoolean("repeatDaily", false)) {
                                  alarm.put("nextAt", nextAlarmTime(alarm.optInt("hour", 7), alarm.optInt("minute", 0), System.currentTimeMillis()));
                                  alarms.put(i, alarm);
                                  changed = true;
                              } else {
                                  alarm.put("enabled", false);
                                  alarms.put(i, alarm);
                                  changed = true;
                                  continue;
                              }
                          }
                          scheduleSystemAlarm(alarm);
                      } catch (Exception ignored) {}
                  }
                  if (changed) saveArray("systemAlarms", alarms);
              }
          
              private void scheduleSystemAlarm(JSONObject alarm) {
                  try {
                      AlarmManager manager = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                      if (manager == null) return;
                      int id = alarm.optInt("id", 0);
                      Intent intent = new Intent(this, AlarmReceiver.class);
                      intent.setAction("com.trae.phonehelper.ALARM_" + id);
                      intent.putExtra("alarmId", id);
                      PendingIntent operation = PendingIntent.getBroadcast(
                              this,
                              id,
                              intent,
                              PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                      );
                      Intent showIntent = new Intent(this, MainActivity.class);
                      PendingIntent showOperation = PendingIntent.getActivity(
                              this,
                              id + 100000,
                              showIntent,
                              PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                      );
                      manager.setAlarmClock(new AlarmManager.AlarmClockInfo(alarm.optLong("nextAt"), showOperation), operation);
                  } catch (Exception e) {
                      showStatus("系统闹钟调度失败：" + shortError(e.getMessage()));
                  }
              }
          
              private void cancelSystemAlarm(int id) {
                  try {
                      AlarmManager manager = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                      if (manager == null) return;
                      Intent intent = new Intent(this, AlarmReceiver.class);
                      intent.setAction("com.trae.phonehelper.ALARM_" + id);
                      PendingIntent operation = PendingIntent.getBroadcast(
                              this,
                              id,
                              intent,
                              PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                      );
                      manager.cancel(operation);
                  } catch (Exception ignored) {}
              }
          
              private String formatAlarmTime(long timeMillis) {
                  if (timeMillis <= 0) return "未设置";
                  return new SimpleDateFormat("MM-dd HH:mm", Locale.getDefault()).format(new Date(timeMillis));
              }
          
