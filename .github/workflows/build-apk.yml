name: 构建手机助手工具箱 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 构建 Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 获取仓库
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 生成安卓项目源码
        shell: bash
        run: |
          set -e
          mkdir -p "$(dirname 'settings.gradle')"
          cat > 'settings.gradle' <<'TRAE_FILE_settings_gradle'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.name = "PhoneHelperToolbox"
          include ":app"
          TRAE_FILE_settings_gradle

          mkdir -p "$(dirname 'build.gradle')"
          cat > 'build.gradle' <<'TRAE_FILE_build_gradle'
          plugins {
              id "com.android.application" version "8.5.2" apply false
          }
          TRAE_FILE_build_gradle

          mkdir -p "$(dirname 'gradle.properties')"
          cat > 'gradle.properties' <<'TRAE_FILE_gradle_properties'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=false
          android.nonTransitiveRClass=true
          TRAE_FILE_gradle_properties

          mkdir -p "$(dirname 'app/build.gradle')"
          cat > 'app/build.gradle' <<'TRAE_FILE_app_build_gradle'
          plugins {
              id "com.android.application"
          }
          
          android {
              namespace "com.trae.phonehelper"
              compileSdk 35
          
              defaultConfig {
                  applicationId "com.trae.phonehelper"
                  minSdk 26
                  targetSdk 35
                  versionCode 30
                  versionName "1.8.6"
              }
          
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          TRAE_FILE_app_build_gradle

          mkdir -p "$(dirname 'app/src/main/AndroidManifest.xml')"
          cat > 'app/src/main/AndroidManifest.xml' <<'TRAE_FILE_app_src_main_AndroidManifest_xml'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />
          
              <application
                  android:allowBackup="false"
                  android:theme="@style/AppTheme"
                  android:label="手机助手工具箱"
                  android:resizeableActivity="true"
                  android:supportsRtl="true">
                  <activity
                      android:name=".AlarmRingActivity"
                      android:exported="false"
                      android:excludeFromRecents="true"
                      android:showWhenLocked="true"
                      android:turnScreenOn="true" />
          
                  <receiver
                      android:name=".AlarmReceiver"
                      android:exported="false" />
          
                  <receiver
                      android:name=".BootReceiver"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>
          
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          TRAE_FILE_app_src_main_AndroidManifest_xml

          mkdir -p "$(dirname 'app/src/main/res/values/styles.xml')"
          cat > 'app/src/main/res/values/styles.xml' <<'TRAE_FILE_app_src_main_res_values_styles_xml'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">#07111F</item>
                  <item name="android:navigationBarColor">#07111F</item>
                  <item name="android:colorAccent">#38BDF8</item>
              </style>
          </resources>
          TRAE_FILE_app_src_main_res_values_styles_xml

          mkdir -p "$(dirname 'app/src/main/java/com/trae/phonehelper/MainActivity.java')"
          cat > 'app/src/main/java/com/trae/phonehelper/MainActivity.java' <<'TRAE_FILE_app_src_main_java_com_trae_phonehelper_MainActivity_java'
          package com.trae.phonehelper;
          
          import android.app.Activity;
          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.ClipData;
          import android.content.ClipboardManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.Rect;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.media.RingtoneManager;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.SystemClock;
          import android.text.InputType;
          import android.os.Vibrator;
          import android.view.Gravity;
          import android.view.View;
          import android.view.WindowManager;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.Button;
          import android.widget.CheckBox;
          import android.widget.EditText;
          import android.widget.FrameLayout;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;
          
          import org.json.JSONArray;
          import org.json.JSONObject;
          
          import java.io.BufferedReader;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.nio.charset.StandardCharsets;
          import java.text.SimpleDateFormat;
          import java.util.Calendar;
          import java.util.Date;
          import java.util.Locale;
          
          public class MainActivity extends Activity {
              private static final String PREF = "phone_helper_pref";
              private static final int PICK_TEXT_FILE = 3001;
              private static final int CREATE_BACKUP_FILE = 3002;
              private static final int PICK_BACKUP_FILE = 3003;
              private static final int PICK_ALARM_RINGTONE = 3004;
              private SharedPreferences pref;
              private final Handler handler = new Handler();
          
              private LinearLayout homePage, splitPage, textPage, linkPage, timerPage, pomoPage, alarmPage, aiPage, aiSettingsPage, backupPage;
              private LinearLayout splitResultList, savedTextList, linkList, alarmList, aiMessageList, aiInputArea;
              private FrameLayout rootFrame;
              private ScrollView rootScroll;
              private ScrollView aiMessageScroll;
              private LinearLayout rootContainer;
              private EditText longTextInput, splitSizeInput, titleInput, contentInput, linkTitleInput, linkUrlInput;
              private EditText aiInput, apiUrlInput, apiKeyInput, modelInput, systemPromptInput;
              private TextView statusText, timerDisplay, pomoDisplay, pomoStateText, pomoCountText, alarmStatusText;
              private Button stopwatchTab, countdownTab, timerStartPause, aiSendButton, textSaveButton, linkSaveButton, textCancelEditButton, linkCancelEditButton;
              private CheckBox pomoLoopCheck, alarmRepeatCheck;
              private EditText timerMinuteInput, timerSecondInput, pomoFocusInput, pomoRestInput, alarmHourInput, alarmMinuteInput, alarmLabelInput;
          
              private String timerMode = "stopwatch";
              private boolean stopwatchRunning = false;
              private long stopwatchElapsed = 0;
              private long stopwatchStartedAt = 0;
              private boolean countdownRunning = false;
              private long countdownDuration = 5 * 60 * 1000L;
              private long countdownElapsed = 0;
              private long countdownStartedAt = 0;
          
              private boolean pomoRunning = false;
              private boolean pomoFocus = true;
              private long pomoDuration = 25 * 60 * 1000L;
              private long pomoElapsed = 0;
              private long pomoStartedAt = 0;
          
              private String selectedAlarmToneUri = "";
          
              private JSONArray aiMessages = new JSONArray();
              private boolean aiSending = false;
              private int rootBaseBottomPadding = 28;
              private int aiBaseBottomPadding = 20;
              private String currentPage = "home";
              private int streamingAssistantIndex = -1;
              private int editingTextIndex = -1;
              private int editingLinkIndex = -1;
              private long lastBackPressedAt = 0;
              private final Runnable hideStatusRunnable = this::hideStatus;
          
              private final Runnable tick = new Runnable() {
                  @Override
                  public void run() {
                      updateTimerDisplay();
                      updatePomoDisplay();
                      handler.postDelayed(this, 250);
                  }
              };
          
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setSoftInputMode(WindowManager.LayoutParams.SOFT_INPUT_ADJUST_RESIZE);
                  pref = getSharedPreferences(PREF, MODE_PRIVATE);
                  ensureDefaults();
                  refreshDefaultContentFor17();
                  refreshDefaultContentFor171();
                  restoreTimerState();
                  restorePomoState();
                  selectedAlarmToneUri = RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM).toString();
                  rescheduleEnabledAlarms();
                  loadAiMessages();
                  buildUi();
                  renderSavedTexts();
                  renderLinks();
                  handler.post(tick);
              }
          
              @Override
              protected void onPause() {
                  super.onPause();
                  saveTimerState();
                  savePomoState();
              }
          
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  saveTimerState();
                  savePomoState();
                  handler.removeCallbacks(tick);
              }
          
              private void buildUi() {
                  rootFrame = new FrameLayout(this);
                  rootFrame.setBackgroundColor(Color.rgb(7, 17, 31));
          
                  rootScroll = new ScrollView(this);
                  rootScroll.setFillViewport(false);
                  rootScroll.setClipToPadding(false);
                  rootScroll.setBackgroundColor(Color.rgb(7, 17, 31));
                  rootContainer = new LinearLayout(this);
                  rootContainer.setOrientation(LinearLayout.VERTICAL);
                  rootContainer.setPadding(24, 120, 24, rootBaseBottomPadding);
                  rootScroll.addView(rootContainer);
          
                  statusText = text("", 14, Color.rgb(52, 211, 153));
                  statusText.setVisibility(View.GONE);
                  rootContainer.addView(statusText);
          
                  homePage = page();
                  splitPage = page();
                  textPage = page();
                  linkPage = page();
                  timerPage = page();
                  pomoPage = page();
                  alarmPage = page();
                  aiPage = page();
                  aiSettingsPage = page();
                  backupPage = page();
                  rootContainer.addView(homePage);
                  rootContainer.addView(splitPage);
                  rootContainer.addView(textPage);
                  rootContainer.addView(linkPage);
                  rootContainer.addView(timerPage);
                  rootContainer.addView(pomoPage);
                  rootContainer.addView(alarmPage);
                  rootContainer.addView(aiSettingsPage);
                  rootContainer.addView(backupPage);
          
                  buildHomePage();
                  buildSplitPage();
                  buildTextPage();
                  buildLinkPage();
                  buildTimerPage();
                  buildPomoPage();
                  buildAlarmPage();
                  buildAiPage();
                  buildAiSettingsPage();
                  buildBackupPage();
          
                  rootFrame.addView(rootScroll, new FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.MATCH_PARENT
                  ));
                  rootFrame.addView(aiPage, new FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.MATCH_PARENT
                  ));
          
                  setContentView(rootFrame);
                  installKeyboardGuard();
                  showPage("home");
              }
          
              private void buildHomePage() {
                  TextView homeTitle = text("手机助手工具箱", 30, Color.WHITE);
                  homeTitle.setTypeface(Typeface.DEFAULT_BOLD);
                  homeTitle.setGravity(Gravity.CENTER_HORIZONTAL);
                  homePage.addView(homeTitle);
                  TextView homeTip = text("选择一个工具", 14, Color.rgb(148, 163, 184));
                  homeTip.setGravity(Gravity.CENTER_HORIZONTAL);
                  homePage.addView(homeTip);
                  homePage.addView(sectionTitle("常用工具"));
                  homePage.addView(homeButton("分段复制", "把长代码、长提示词、工作流自动拆成多段复制", "split"));
                  homePage.addView(homeButton("常用文本", "保存 API 地址、模型名、提交信息等常用内容", "text"));
                  homePage.addView(homeButton("快捷打开", "一键打开 GitHub、OpenRouter 等常用网页", "link"));
                  homePage.addView(homeButton("数据备份", "导出或导入常用文本和快捷链接", "backup"));
                  homePage.addView(sectionTitle("学习工具"));
                  homePage.addView(homeButton("计时器", "正计时、倒计时和快速倒计时", "timer"));
                  homePage.addView(homeButton("番茄钟", "专注 25 分钟，休息 5 分钟，记录今日完成数", "pomo"));
                  homePage.addView(homeButton("闹钟", "设置几点几分提醒，适合 App 打开时使用", "alarm"));
                  homePage.addView(sectionTitle("AI工具"));
                  homePage.addView(homeButton("AI聊天", "接入 OpenAI 兼容接口，支持 openrouter/free", "ai"));
                  homePage.addView(homeButton("AI设置", "填写 API 地址、API Key、模型名和智能体设定", "aiSettings"));
              }
          
              private View homeButton(String title, String desc, String pageName) {
                  LinearLayout card = card();
                  TextView t = text(title, 18, Color.WHITE);
                  t.setTypeface(Typeface.DEFAULT_BOLD);
                  card.addView(t);
                  card.addView(text(desc, 13, Color.rgb(148, 163, 184)));
                  TextView hint = text("点按进入", 13, Color.rgb(52, 211, 153));
                  hint.setGravity(Gravity.RIGHT);
                  card.addView(hint);
                  card.setClickable(true);
                  card.setOnClickListener(v -> showPage(pageName));
                  return card;
              }
          
              private void buildSplitPage() {
                  splitPage.addView(sectionTitle("长文本分段复制"));
                  splitPage.addView(infoCard("把很长的代码、工作流、提示词粘到这里，App 会自动分段，每段都有复制按钮。"));
                  longTextInput = inputBox("粘贴长文本");
                  longTextInput.setMinLines(8);
                  longTextInput.setGravity(Gravity.TOP);
                  splitPage.addView(longTextInput);
                  splitSizeInput = inputBox("每段最大字数，默认 3000");
                  splitSizeInput.setText("3000");
                  splitSizeInput.setSingleLine(true);
                  splitPage.addView(labelWrap("分段长度", splitSizeInput));
                  LinearLayout actions = row();
                  Button importFile = button("从文件导入");
                  Button generate = button("生成分段");
                  Button clear = button("清空");
                  actions.addView(importFile, weight());
                  actions.addView(generate, weight());
                  actions.addView(clear, weight());
                  splitPage.addView(actions);
                  splitResultList = new LinearLayout(this);
                  splitResultList.setOrientation(LinearLayout.VERTICAL);
                  splitPage.addView(splitResultList);
                  importFile.setOnClickListener(v -> chooseTextFile());
                  generate.setOnClickListener(v -> generateChunks());
                  clear.setOnClickListener(v -> {
                      longTextInput.setText("");
                      splitResultList.removeAllViews();
                      showStatus("已清空");
                  });
              }
          
              private void buildTextPage() {
                  textPage.addView(sectionTitle("常用文本"));
                  textPage.addView(infoCard("保存常用路径、API 地址、模型名、提交信息。以后点一下就能复制。"));
                  titleInput = inputBox("标题，例如 OpenRouter API 地址");
                  titleInput.setSingleLine(true);
                  contentInput = inputBox("内容");
                  contentInput.setMinLines(3);
                  contentInput.setGravity(Gravity.TOP);
                  textPage.addView(labelWrap("标题", titleInput));
                  textPage.addView(labelWrap("内容", contentInput));
                  textSaveButton = button("添加常用文本");
                  textPage.addView(textSaveButton);
                  textCancelEditButton = button("取消编辑");
                  textCancelEditButton.setVisibility(View.GONE);
                  textPage.addView(textCancelEditButton);
                  savedTextList = new LinearLayout(this);
                  savedTextList.setOrientation(LinearLayout.VERTICAL);
                  textPage.addView(savedTextList);
                  textSaveButton.setOnClickListener(v -> addSavedText());
                  textCancelEditButton.setOnClickListener(v -> cancelTextEdit());
              }
          
              private void buildLinkPage() {
                  linkPage.addView(sectionTitle("快捷打开"));
                  linkPage.addView(infoCard("保存常用网站，一键打开 GitHub、OpenRouter、Actions 等页面。"));
                  linkTitleInput = inputBox("标题，例如 GitHub");
                  linkTitleInput.setSingleLine(true);
                  linkUrlInput = inputBox("网址，例如 https://github.com");
                  linkUrlInput.setSingleLine(true);
                  linkPage.addView(labelWrap("标题", linkTitleInput));
                  linkPage.addView(labelWrap("网址", linkUrlInput));
                  linkSaveButton = button("添加快捷链接");
                  linkPage.addView(linkSaveButton);
                  linkCancelEditButton = button("取消编辑");
                  linkCancelEditButton.setVisibility(View.GONE);
                  linkPage.addView(linkCancelEditButton);
                  linkList = new LinearLayout(this);
                  linkList.setOrientation(LinearLayout.VERTICAL);
                  linkPage.addView(linkList);
                  linkSaveButton.setOnClickListener(v -> addLink());
                  linkCancelEditButton.setOnClickListener(v -> cancelLinkEdit());
              }
          
              private void buildTimerPage() {
                  timerPage.addView(sectionTitle("计时器"));
                  timerPage.addView(infoCard("包含正计时、倒计时和快速倒计时。适合临时计时，不替代闹钟。"));
                  LinearLayout modeRow = row();
                  stopwatchTab = button("正计时");
                  countdownTab = button("倒计时");
                  modeRow.addView(stopwatchTab, weight());
                  modeRow.addView(countdownTab, weight());
                  timerPage.addView(modeRow);
                  timerDisplay = text("00:00.0", 56, Color.WHITE);
                  timerDisplay.setGravity(Gravity.CENTER);
                  timerDisplay.setPadding(0, 28, 0, 20);
                  timerPage.addView(timerDisplay);
                  LinearLayout edit = row();
                  timerMinuteInput = inputBox("分钟");
                  timerMinuteInput.setText("5");
                  timerMinuteInput.setSingleLine(true);
                  timerSecondInput = inputBox("秒");
                  timerSecondInput.setText("0");
                  timerSecondInput.setSingleLine(true);
                  edit.addView(labelWrap("分钟", timerMinuteInput), weight());
                  edit.addView(labelWrap("秒", timerSecondInput), weight());
                  timerPage.addView(edit);
                  Button set = button("设定倒计时");
                  timerPage.addView(set);
                  LinearLayout controls = row();
                  timerStartPause = button("开始");
                  Button reset = button("重置");
                  controls.addView(timerStartPause, weight());
                  controls.addView(reset, weight());
                  timerPage.addView(controls);
                  LinearLayout quick1 = row();
                  quick1.addView(quickTimerButton("1 分钟", 1), weight());
                  quick1.addView(quickTimerButton("3 分钟", 3), weight());
                  timerPage.addView(quick1);
                  LinearLayout quick2 = row();
                  quick2.addView(quickTimerButton("5 分钟", 5), weight());
                  quick2.addView(quickTimerButton("10 分钟", 10), weight());
                  timerPage.addView(quick2);
                  stopwatchTab.setOnClickListener(v -> {
                      timerMode = "stopwatch";
                      updateTimerDisplay();
                      saveTimerState();
                  });
                  countdownTab.setOnClickListener(v -> {
                      timerMode = "countdown";
                      updateTimerDisplay();
                      saveTimerState();
                  });
                  set.setOnClickListener(v -> setCountdownFromInput());
                  timerStartPause.setOnClickListener(v -> toggleTimer());
                  reset.setOnClickListener(v -> resetTimer());
              }
          
              private void buildPomoPage() {
                  pomoPage.addView(sectionTitle("番茄钟"));
                  pomoPage.addView(infoCard("默认专注 25 分钟、休息 5 分钟。适合学习节奏管理。"));
                  pomoStateText = text("准备开始专注", 18, Color.rgb(125, 211, 252));
                  pomoStateText.setGravity(Gravity.CENTER);
                  pomoPage.addView(pomoStateText);
                  pomoDisplay = text("25:00", 60, Color.WHITE);
                  pomoDisplay.setGravity(Gravity.CENTER);
                  pomoPage.addView(pomoDisplay);
                  pomoCountText = text("今日完成 0 个番茄", 16, Color.rgb(52, 211, 153));
                  pomoCountText.setGravity(Gravity.CENTER);
                  pomoPage.addView(pomoCountText);
                  pomoLoopCheck = new CheckBox(this);
                  pomoLoopCheck.setText("休息结束后自动进入下一轮专注");
                  pomoLoopCheck.setTextColor(Color.WHITE);
                  pomoLoopCheck.setTextSize(16);
                  pomoLoopCheck.setChecked(pref.getBoolean("pomoLoop", true));
                  pomoPage.addView(pomoLoopCheck);
                  LinearLayout edit = row();
                  pomoFocusInput = inputBox("专注分钟");
                  pomoFocusInput.setText("25");
                  pomoFocusInput.setSingleLine(true);
                  pomoRestInput = inputBox("休息分钟");
                  pomoRestInput.setText("5");
                  pomoRestInput.setSingleLine(true);
                  edit.addView(labelWrap("专注", pomoFocusInput), weight());
                  edit.addView(labelWrap("休息", pomoRestInput), weight());
                  pomoPage.addView(edit);
                  Button apply = button("应用番茄钟设置");
                  pomoPage.addView(apply);
                  LinearLayout controls = row();
                  Button startPause = button("开始/暂停");
                  Button reset = button("重置");
                  Button done = button("完成一个");
                  controls.addView(startPause, weight());
                  controls.addView(reset, weight());
                  controls.addView(done, weight());
                  pomoPage.addView(controls);
                  apply.setOnClickListener(v -> applyPomoSettings());
                  startPause.setOnClickListener(v -> togglePomo());
                  reset.setOnClickListener(v -> resetPomo());
                  done.setOnClickListener(v -> finishOnePomo());
                  pomoLoopCheck.setOnCheckedChangeListener((buttonView, isChecked) -> {
                      pref.edit().putBoolean("pomoLoop", isChecked).apply();
                      showStatus(isChecked ? "休息结束后会自动进入下一轮专注" : "休息结束后会暂停，等待手动开始");
                  });
                  updatePomoDisplay();
              }
          
              private void buildAlarmPage() {
                  alarmPage.addView(sectionTitle("系统级闹钟"));
                  alarmPage.addView(infoCard("支持多个系统闹钟、每日重复和系统铃声选择器。铃声选择器会显示手机系统和主题商店已安装的闹钟铃声。"));
          
                  alarmStatusText = text("", 16, Color.rgb(125, 211, 252));
                  alarmStatusText.setGravity(Gravity.CENTER);
                  alarmPage.addView(alarmStatusText);
          
                  Calendar calendar = Calendar.getInstance();
                  calendar.add(Calendar.HOUR_OF_DAY, 1);
                  alarmHourInput = inputBox("小时 0-23");
                  alarmHourInput.setSingleLine(true);
                  alarmHourInput.setText(String.valueOf(calendar.get(Calendar.HOUR_OF_DAY)));
                  alarmMinuteInput = inputBox("分钟 0-59");
                  alarmMinuteInput.setSingleLine(true);
                  alarmMinuteInput.setText(String.valueOf(calendar.get(Calendar.MINUTE)));
                  alarmLabelInput = inputBox("提醒内容，例如 起床 / 学习 / 喝水");
                  alarmLabelInput.setSingleLine(true);
                  alarmLabelInput.setText("闹钟");
          
                  LinearLayout timeRow = row();
                  timeRow.addView(labelWrap("小时", alarmHourInput), weight());
                  timeRow.addView(labelWrap("分钟", alarmMinuteInput), weight());
                  alarmPage.addView(timeRow);
                  alarmPage.addView(labelWrap("提醒内容", alarmLabelInput));
          
                  alarmRepeatCheck = new CheckBox(this);
                  alarmRepeatCheck.setText("每天重复");
                  alarmRepeatCheck.setTextColor(Color.WHITE);
                  alarmRepeatCheck.setTextSize(16);
                  alarmPage.addView(alarmRepeatCheck);
          
                  LinearLayout actions = row();
                  Button tone = button("选择铃声");
                  Button add = button("添加闹钟");
                  actions.addView(tone, weight());
                  actions.addView(add, weight());
