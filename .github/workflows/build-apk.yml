      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK with version info
        id: rename
        run: |
          mkdir -p dist
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_NAME="PhoneHelperToolbox-debug-${SHORT_SHA}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "dist/${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_path=dist/${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: ${{ steps.rename.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Build release APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename release APK with version info
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: rename-release
        run: |
          mkdir -p dist
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_NAME="PhoneHelperToolbox-release-${SHORT_SHA}.apk"
          cp app/build/outputs/apk/release/app-release.apk "dist/${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_path=dist/${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload release APK artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename-release.outputs.apk_name }}
          path: ${{ steps.rename-release.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/outputs/logs/
          if-no-files-found: ignore
          retention-days: 7
